<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager.io Customer Quick Add Extension</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  :root{
    --bg:#ffffff;
    --panel:#f6f8fa;
    --border:#d0d7de;
    --text:#24292f;
    --muted:#57606a;
    --primary:#0969da;
    --primary-hover:#0550ae;
    --danger:#cf222e;
    --success:#1a7f37;
    --shadow:0 2px 10px rgba(0,0,0,.06);
  }

  body{
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:20px;
  }

  .ctrl-bar{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:12px 16px;
    margin-bottom:18px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    box-shadow:var(--shadow);
  }

  .load-btn,
  .primary-btn,
  .secondary-btn{
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    transition:all .15s ease;
  }

  .load-btn,
  .primary-btn{
    padding:9px 18px;
    background:var(--primary);
    color:#fff;
  }

  .load-btn:hover,
  .primary-btn:hover{
    background:var(--primary-hover);
  }

  .load-btn:disabled,
  .primary-btn:disabled{
    opacity:.5;
    cursor:not-allowed;
  }

  .secondary-btn{
    padding:9px 14px;
    background:#fff;
    color:var(--text);
    border:1px solid var(--border);
  }

  .secondary-btn:hover{
    background:#f3f4f6;
  }

  .prog-wrap{
    flex:1;
    min-width:120px;
    height:6px;
    background:#d8dee4;
    border-radius:999px;
    overflow:hidden;
  }

  .prog-bar{
    height:100%;
    width:0%;
    background:var(--primary);
    transition:width .25s ease;
  }

  .status-txt{
    font-size:12px;
    color:var(--muted);
    white-space:nowrap;
  }

  .err-box{
    color:var(--danger);
    background:#fff5f5;
    border:1px solid #ffd8d8;
    border-radius:10px;
    padding:14px 16px;
    font-size:13px;
    margin-bottom:16px;
  }

  .layout{
    display:grid;
    grid-template-columns:380px 1fr;
    gap:18px;
  }

  @media (max-width: 980px){
    .layout{
      grid-template-columns:1fr;
    }
  }

  .card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:14px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  .card-head{
    padding:16px 18px;
    border-bottom:1px solid var(--border);
    background:#fbfbfc;
  }

  .card-title{
    font-size:16px;
    font-weight:700;
    margin-bottom:4px;
  }

  .card-sub{
    color:var(--muted);
    font-size:12px;
  }

  .card-body{
    padding:18px;
  }

  .form-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .field label{
    font-size:12px;
    color:var(--muted);
    font-weight:600;
  }

  .field input,
  .field textarea,
  .field select{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--border);
    border-radius:10px;
    font-size:14px;
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
    background:#fff;
  }

  .field textarea{
    resize:vertical;
    min-height:80px;
  }

  .field input:focus,
  .field textarea:focus,
  .field select:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(9,105,218,.15);
  }

  .invoice-row{
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    align-items:end;
  }

  .mini-note{
    margin-top:8px;
    color:var(--muted);
    font-size:12px;
    line-height:1.5;
  }

  .actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:8px;
  }

  .success-box{
    background:#edfdf3;
    color:var(--success);
    border:1px solid #aceebb;
    padding:12px 14px;
    border-radius:10px;
    font-size:13px;
    margin-bottom:14px;
  }

  .stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:14px;
    margin-bottom:18px;
  }

  .stat{
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
    background:#fff;
  }

  .stat-label{
    font-size:12px;
    color:var(--muted);
    margin-bottom:8px;
  }

  .stat-value{
    font-size:24px;
    font-weight:800;
  }

  .table-wrap{
    overflow:auto;
    border:1px solid var(--border);
    border-radius:12px;
  }

  table{
    width:100%;
    border-collapse:collapse;
    min-width:800px;
  }

  th{
    text-align:left;
    font-size:12px;
    color:var(--muted);
    background:#f9fafb;
    padding:12px 14px;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    z-index:1;
  }

  td{
    padding:12px 14px;
    border-bottom:1px solid #edf1f4;
    font-size:13px;
    vertical-align:top;
  }

  tr:hover td{
    background:#fafcff;
  }

  .pill{
    display:inline-flex;
    align-items:center;
    padding:4px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
    background:#e7f3ff;
    color:var(--primary);
  }

  .search-wrap{
    margin-bottom:14px;
  }

  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--muted);
  }

  .spinner{
    width:16px;
    height:16px;
    border:2px solid rgba(255,255,255,.4);
    border-top-color:#fff;
    border-radius:50%;
    display:inline-block;
    animation:spin .8s linear infinite;
    vertical-align:middle;
    margin-right:8px;
  }

  @keyframes spin{
    to{ transform:rotate(360deg); }
  }
</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>

  <div class="prog-wrap">
    <div class="prog-bar" id="prog-bar"></div>
  </div>

  <span class="status-txt" id="status-txt">
    Press Load to fetch data from Manager
  </span>
</div>

<div id="app"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getCustomerBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;

    if (onProgress) {
      onProgress(allItems.length, apiTotal, pageNum);
    }

    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Global state
══════════════════════════════════ */
let ALL_CUSTOMERS = [];

/* ══════════════════════════════════
   Utilities
══════════════════════════════════ */
function escapeHtml(str) {
  return String(str ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function customerDisplayName(item) {
  return (
    item?.name ??
    item?.customer ??
    item?.display_name ??
    item?.business_name ??
    item?.full_name ??
    item?.code ??
    'Unnamed Customer'
  );
}

function formatDate(date) {
  if (!date) return '—';

  try {
    return new Date(date).toLocaleDateString(undefined, {
      year:'numeric',
      month:'short',
      day:'numeric'
    });
  } catch {
    return date;
  }
}

/* ══════════════════════════════════
   Create customer (WRITE OPERATION)
══════════════════════════════════ */
async function createCustomer(event) {
  event.preventDefault();

  const form = document.getElementById('customer-form');
  const submitBtn = document.getElementById('save-btn');
  const msgBox = document.getElementById('message-box');

  msgBox.innerHTML = '';

  const payload = {
    name: document.getElementById('customer-name')?.value?.trim() || '',
    code: document.getElementById('customer-code')?.value?.trim() || '',
    email: document.getElementById('customer-email')?.value?.trim() || '',
    phone: document.getElementById('customer-phone')?.value?.trim() || '',
    address_line_1: document.getElementById('customer-address1')?.value?.trim() || '',
    address_line_2: document.getElementById('customer-address2')?.value?.trim() || '',
    city: document.getElementById('customer-city')?.value?.trim() || '',
    state: document.getElementById('customer-state')?.value?.trim() || '',
    zip_code: document.getElementById('customer-zip')?.value?.trim() || '',
    country: document.getElementById('customer-country')?.value?.trim() || '',
    notes: document.getElementById('customer-notes')?.value?.trim() || ''
  };

  if (!payload.name) {
    msgBox.innerHTML = `
      <div class="err-box">
        Customer name is required.
      </div>
    `;
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span>Creating Customer...';

  try {

    /* Primary write endpoint */
    const result = await postMessageWithResponse({
      type: 'api-request',
      method: 'POST',
      path: '/api4/customer-form',
      body: payload
    });

    msgBox.innerHTML = `
      <div class="success-box">
        ✓ Customer created successfully and added to the database.
      </div>
    `;

    form.reset();

    /* Reload customer list */
    await loadAllRecords();

    console.log('Customer create response:', result);

  } catch (primaryErr) {

    try {

      /* Fallback create endpoint */
      const fallbackResult = await postMessageWithResponse({
        type: 'api-request',
        method: 'POST',
        path: '/api4/customers',
        body: payload
      });

      msgBox.innerHTML = `
        <div class="success-box">
          ✓ Customer created successfully using fallback endpoint.
        </div>
      `;

      form.reset();

      await loadAllRecords();

      console.log('Fallback customer response:', fallbackResult);

    } catch (fallbackErr) {

      console.error(primaryErr);
      console.error(fallbackErr);

      msgBox.innerHTML = `
        <div class="err-box">
          <strong>Unable to create customer.</strong><br><br>
          Primary Error: ${escapeHtml(primaryErr?.message || 'Unknown error')}<br>
          Fallback Error: ${escapeHtml(fallbackErr?.message || 'Unknown error')}<br><br>
          Ensure your Manager.io API version allows POST write operations.
        </div>
      `;
    }

  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '💾 Save Customer';
  }
}

/* ══════════════════════════════════
   Search filter
══════════════════════════════════ */
function filterCustomers() {
  const q = document.getElementById('search-input')?.value?.toLowerCase() || '';

  const filtered = ALL_CUSTOMERS.filter(item => {
    const values = [
      item?.name,
      item?.customer,
      item?.email,
      item?.phone,
      item?.code
    ].join(' ').toLowerCase();

    return values.includes(q);
  });

  renderTable(filtered);
}

/* ══════════════════════════════════
   Invoice customer select helper
══════════════════════════════════ */
function syncSelectedCustomer() {
  const select = document.getElementById('invoice-customer-select');
  const preview = document.getElementById('selected-customer-preview');

  const option = select?.selectedOptions?.[0];

  preview.innerHTML = option
    ? `<span class="pill">Selected: ${escapeHtml(option.textContent)}</span>`
    : '';
}

/* ══════════════════════════════════
   Render customer table
══════════════════════════════════ */
function renderTable(items) {
  const target = document.getElementById('table-container');

  if (!items.length) {
    target.innerHTML = `
      <div class="empty">
        <h3 style="margin-bottom:8px">No customers found</h3>
        <p>Try adjusting your search or create a new customer.</p>
      </div>
    `;
    return;
  }

  const rows = items.map((item, index) => {

    const name = customerDisplayName(item);

    return `
      <tr>
        <td>${index + 1}</td>
        <td>
          <strong>${escapeHtml(name)}</strong>
        </td>
        <td>${escapeHtml(item?.email ?? '—')}</td>
        <td>${escapeHtml(item?.phone ?? '—')}</td>
        <td>${escapeHtml(item?.code ?? '—')}</td>
        <td>${escapeHtml(item?._links?.self?.href ?? '—')}</td>
        <td>${formatDate(item?.created_at ?? item?.created ?? item?.date)}</td>
      </tr>
    `;
  }).join('');

  target.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Customer</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Code</th>
            <th>API Resource</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {

  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true;
  btn.textContent = 'Loading…';

  bar.style.width = '0%';

  try {

    const items = await getCustomerBatch((loaded, total, page) => {

      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()} records`
        : `Page ${page} · ${loaded.toLocaleString()} records loaded…`;

      if (total) {
        bar.style.width = Math.min(95, Math.round(loaded / total * 100)) + '%';
      }
    });

    ALL_CUSTOMERS = Array.isArray(items) ? items : [];

    bar.style.width = '100%';

    status.textContent =
      `✓ ${ALL_CUSTOMERS.length.toLocaleString()} records loaded`;

    btn.textContent = '↺ Reload';
    btn.disabled = false;

    render(ALL_CUSTOMERS);

  } catch (err) {

    status.textContent = '⚠ ' + err.message;

    btn.textContent = '↺ Retry';
    btn.disabled = false;

    app.innerHTML = `
      <div class="err-box">
        ⚠ ${escapeHtml(err.message)}
        <br><br>
        <small>
          Make sure this extension is running inside Manager.io and API access is enabled.
        </small>
      </div>
    `;
  }
}

/* ══════════════════════════════════
   render(items)
══════════════════════════════════ */
function render(items) {

  const app = document.getElementById('app');

  const total = items.length;

  const sorted = [...items].sort((a,b) => {
    return customerDisplayName(a).localeCompare(customerDisplayName(b));
  });

  const options = sorted.map(item => {
    const name = customerDisplayName(item);

    return `
      <option value="${escapeHtml(name)}">
        ${escapeHtml(name)}
      </option>
    `;
  }).join('');

  app.innerHTML = `
    <div class="layout">

      <!-- LEFT PANEL -->
      <div class="card">

        <div class="card-head">
          <div class="card-title">
            Quick Customer Add
          </div>

          <div class="card-sub">
            Add new customers directly from the sales invoice workflow.
          </div>
        </div>

        <div class="card-body">

          <div id="message-box"></div>

          <!-- Simulated invoice customer row -->
          <div class="field" style="margin-bottom:18px">

            <label>
              Sales Invoice — Customer Selection
            </label>

            <div class="invoice-row">

              <select id="invoice-customer-select" onchange="syncSelectedCustomer()">
                <option value="">Select Customer...</option>
                ${options}
              </select>

              <button
                type="button"
                class="primary-btn"
                onclick="document.getElementById('customer-name').focus()"
              >
                ➕ New Customer
              </button>

            </div>

            <div id="selected-customer-preview" class="mini-note"></div>

            <div class="mini-note">
              This mimics the placement to the right of the customer dropdown
              inside the sales invoice form.
            </div>

          </div>

          <!-- Create Customer Form -->
          <form id="customer-form" onsubmit="createCustomer(event)">

            <div class="form-grid">

              <div class="field">
                <label>Customer Name *</label>
                <input
                  id="customer-name"
                  type="text"
                  required
                  placeholder="Acme Corporation"
                >
              </div>

              <div class="field">
                <label>Customer Code</label>
                <input
                  id="customer-code"
                  type="text"
                  placeholder="CUST-001"
                >
              </div>

              <div class="field">
                <label>Email Address</label>
                <input
                  id="customer-email"
                  type="email"
                  placeholder="customer@example.com"
                >
              </div>

              <div class="field">
                <label>Phone Number</label>
                <input
                  id="customer-phone"
                  type="text"
                  placeholder="+1 555-123-4567"
                >
              </div>

              <div class="field">
                <label>Address Line 1</label>
                <input
                  id="customer-address1"
                  type="text"
                  placeholder="123 Main Street"
                >
              </div>

              <div class="field">
                <label>Address Line 2</label>
                <input
                  id="customer-address2"
                  type="text"
                  placeholder="Suite 200"
                >
              </div>

              <div class="field">
                <label>City</label>
                <input
                  id="customer-city"
                  type="text"
                  placeholder="New York"
                >
              </div>

              <div class="field">
                <label>State / Province</label>
                <input
                  id="customer-state"
                  type="text"
                  placeholder="NY"
                >
              </div>

              <div class="field">
                <label>ZIP / Postal Code</label>
                <input
                  id="customer-zip"
                  type="text"
                  placeholder="10001"
                >
              </div>

              <div class="field">
                <label>Country</label>
                <input
                  id="customer-country"
                  type="text"
                  placeholder="United States"
                >
              </div>

              <div class="field">
                <label>Notes</label>
                <textarea
                  id="customer-notes"
                  placeholder="Additional notes or billing instructions..."
                ></textarea>

```
          </div>

        </div>

        <div class="actions">

          <button
            id="save-btn"
            type="submit"
            class="primary-btn"
          >
            💾 Save Customer
          </button>

          <button
            type="reset"
            class="secondary-btn"
          >
            Reset
          </button>

        </div>

      </form>

    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div>

    <div class="stats">

      <div class="stat">
        <div class="stat-label">Total Customers</div>
        <div class="stat-value">
          ${total.toLocaleString()}
        </div>
      </div>

      <div class="stat">
        <div class="stat-label">API Endpoint</div>
        <div class="stat-value" style="font-size:15px">
          /api4/customer-batch
        </div>
      </div>

      <div class="stat">
        <div class="stat-label">Write Access</div>
        <div class="stat-value" style="font-size:15px">
          ENABLED
        </div>
      </div>

    </div>

    <div class="card">

      <div class="card-head">
        <div class="card-title">
          Customer Database
        </div>

        <div class="card-sub">
          Live records loaded through the paginated Manager.io API.
        </div>
      </div>

      <div class="card-body">

        <div class="search-wrap">
          <input
            id="search-input"
            type="text"
            placeholder="Search customers..."
            oninput="filterCustomers()"
            style="
              width:100%;
              padding:11px 12px;
              border:1px solid var(--border);
              border-radius:10px;
              font-size:14px;
            "
          >
        </div>

        <div id="table-container"></div>

      </div>
    </div>

  </div>

</div>
```

`;

renderTable(sorted);
} </script>

</body>
</html>
