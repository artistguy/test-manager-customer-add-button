<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager.io Customer Quick Add Extension</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  body{
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#ffffff;
    color:#24292f;
    min-height:100vh;
    padding:20px;
  }

  .ctrl-bar{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:12px 16px;
    margin-bottom:20px;
    background:#f6f8fa;
    border:1px solid #d0d7de;
    border-radius:12px;
    box-shadow:0 1px 2px rgba(27,31,36,.04);
  }

  .load-btn,
  .primary-btn,
  .secondary-btn{
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
    transition:all .18s ease;
  }

  .load-btn{
    padding:9px 20px;
    font-size:13px;
    background:#0969da;
    color:#fff;
  }

  .load-btn:hover,
  .primary-btn:hover{
    filter:brightness(.95);
  }

  .load-btn:disabled,
  .primary-btn:disabled{
    opacity:.55;
    cursor:not-allowed;
  }

  .primary-btn{
    background:#1a7f37;
    color:#fff;
    padding:10px 16px;
    font-size:14px;
  }

  .secondary-btn{
    background:#f6f8fa;
    color:#24292f;
    border:1px solid #d0d7de;
    padding:10px 16px;
    font-size:14px;
  }

  .prog-wrap{
    flex:1;
    min-width:120px;
    height:6px;
    background:#d8dee4;
    border-radius:999px;
    overflow:hidden;
  }

  .prog-bar{
    height:100%;
    width:0%;
    background:#0969da;
    border-radius:999px;
    transition:width .25s;
  }

  .status-txt{
    font-size:12px;
    color:#57606a;
    white-space:nowrap;
  }

  .err-box{
    color:#cf222e;
    background:#fff8f8;
    border:1px solid #ffcecb;
    border-radius:10px;
    padding:14px 16px;
    font-size:13px;
    margin-bottom:16px;
  }

  .layout{
    display:grid;
    grid-template-columns: 1.1fr .9fr;
    gap:20px;
  }

  @media (max-width: 980px){
    .layout{
      grid-template-columns:1fr;
    }
  }

  .card{
    background:#fff;
    border:1px solid #d0d7de;
    border-radius:14px;
    padding:18px;
    box-shadow:0 2px 8px rgba(27,31,36,.05);
  }

  .card-title{
    font-size:18px;
    font-weight:800;
    margin-bottom:14px;
  }

  .invoice-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }

  .invoice-label{
    font-size:14px;
    font-weight:700;
    color:#24292f;
  }

  .customer-select{
    flex:1;
    min-width:260px;
    border:1px solid #d0d7de;
    border-radius:10px;
    padding:12px 14px;
    background:#fff;
    font-size:14px;
    color:#24292f;
  }

  .customer-select:focus,
  input:focus,
  textarea:focus{
    outline:none;
    border-color:#0969da;
    box-shadow:0 0 0 3px rgba(9,105,218,.12);
  }

  .quick-add-btn{
    background:#1f883d;
    color:#fff;
    border:none;
    border-radius:10px;
    padding:12px 16px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
  }

  .quick-add-btn:hover{
    filter:brightness(.96);
  }

  .customer-preview{
    background:#f6f8fa;
    border:1px solid #d0d7de;
    border-radius:10px;
    padding:14px;
    margin-top:8px;
  }

  .preview-row{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-bottom:8px;
    font-size:13px;
  }

  .preview-label{
    color:#57606a;
    font-weight:600;
  }

  .preview-value{
    color:#24292f;
    font-weight:700;
    text-align:right;
    word-break:break-word;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  @media (max-width:640px){
    .grid{
      grid-template-columns:1fr;
    }
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .field label{
    font-size:13px;
    font-weight:700;
    color:#24292f;
  }

  .field input,
  .field textarea{
    border:1px solid #d0d7de;
    border-radius:10px;
    padding:12px;
    font-size:14px;
    background:#fff;
    resize:vertical;
  }

  textarea{
    min-height:90px;
  }

  .actions{
    display:flex;
    gap:10px;
    margin-top:16px;
    flex-wrap:wrap;
  }

  .table-wrap{
    overflow:auto;
    border:1px solid #d0d7de;
    border-radius:12px;
  }

  table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }

  thead{
    background:#f6f8fa;
  }

  th, td{
    padding:12px 14px;
    border-bottom:1px solid #d8dee4;
    text-align:left;
    vertical-align:top;
  }

  th{
    font-weight:800;
    color:#24292f;
    white-space:nowrap;
  }

  tbody tr:hover{
    background:#fafbfc;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:4px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:800;
  }

  .badge-active{
    background:#dafbe1;
    color:#116329;
  }

  .badge-inactive{
    background:#ffebe9;
    color:#cf222e;
  }

  .empty{
    text-align:center;
    padding:48px 20px;
    color:#57606a;
    border:1px dashed #d0d7de;
    border-radius:12px;
    background:#fafbfc;
  }

  .success-box{
    margin-top:16px;
    background:#dafbe1;
    border:1px solid #7ee787;
    color:#116329;
    border-radius:10px;
    padding:14px 16px;
    font-size:14px;
    font-weight:700;
  }

  .search-input{
    width:100%;
    margin-bottom:14px;
    border:1px solid #d0d7de;
    border-radius:10px;
    padding:12px 14px;
    font-size:14px;
  }

  .stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-bottom:18px;
  }

  @media (max-width:640px){
    .stats{
      grid-template-columns:1fr;
    }
  }

  .stat{
    background:#f6f8fa;
    border:1px solid #d0d7de;
    border-radius:12px;
    padding:16px;
  }

  .stat-label{
    font-size:12px;
    color:#57606a;
    margin-bottom:8px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.04em;
  }

  .stat-value{
    font-size:24px;
    font-weight:900;
    color:#24292f;
  }
</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>

  <div class="prog-wrap">
    <div class="prog-bar" id="prog-bar"></div>
  </div>

  <span class="status-txt" id="status-txt">
    Press Load to fetch customer records from Manager.io
  </span>
</div>

<div id="app"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getCustomerBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;

    if (onProgress) {
      onProgress(allItems.length, apiTotal, pageNum);
    }

    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Global state
══════════════════════════════════ */
let CUSTOMER_CACHE = [];
let FILTERED_CACHE = [];
let CURRENT_SELECTED = null;

/* ══════════════════════════════════
   Utility helpers
══════════════════════════════════ */
function safe(v, fallback='—'){
  return v ?? fallback;
}

function fmtMoney(v){
  return '$' + Number(v || 0).toLocaleString(undefined,{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  });
}

function escapeHtml(str){
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ══════════════════════════════════
   Create customer (WRITE OPERATION)
══════════════════════════════════ */
async function createCustomer() {
  const saveBtn = document.getElementById('save-btn');
  const successBox = document.getElementById('success-box');

  const name = document.getElementById('cust-name').value.trim();
  const code = document.getElementById('cust-code').value.trim();
  const email = document.getElementById('cust-email').value.trim();
  const billingAddress = document.getElementById('cust-billing').value.trim();
  const deliveryAddress = document.getElementById('cust-delivery').value.trim();
  const creditLimit = Number(document.getElementById('cust-credit').value || 0);

  if (!name) {
    alert('Customer name is required.');
    return;
  }

  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';

  try {
    const payload = {
      item: {
        name,
        code: code || null,
        email: email || null,
        billingAddress: billingAddress || '',
        deliveryAddress: deliveryAddress || '',
        defaultBillingAddress: billingAddress || '',
        defaultDeliveryAddress: deliveryAddress || '',
        hasDefaultBillingAddress: !!billingAddress,
        hasDefaultDeliveryAddress: !!deliveryAddress,
        creditLimit,
        inactive: false,
        hasDefaultDueDateDays: false,
        defaultDueDateDays: null,
        hasDefaultHourlyRate: false,
        defaultHourlyRate: 0,
        currency: null,
        division: null,
        controlAccount: null
      }
    };

    /* WRITE CAPABILITY */
    await postMessageWithResponse({
      type: 'api-request',
      method: 'POST',
      path: '/api4/customer',
      body: payload
    });

    if (successBox) {
      successBox.innerHTML = '✓ Customer created successfully. Reloading records…';
      successBox.style.display = 'block';
    }

    document.getElementById('customer-form').reset();

    await loadAllRecords();

  } catch (err) {
    alert('Unable to create customer.\n\n' + err.message);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = '💾 Save Customer';
  }
}

/* ══════════════════════════════════
   Search/filter customers
══════════════════════════════════ */
function filterCustomers() {
  const query = document.getElementById('search-input').value.trim().toLowerCase();

  FILTERED_CACHE = CUSTOMER_CACHE.filter(customer => {
    const item = customer?.item || {};

    return [
      item?.name,
      item?.email,
      item?.code,
      item?.billingAddress
    ]
    .filter(Boolean)
    .join(' ')
    .toLowerCase()
    .includes(query);
  });

  renderCustomerTable(FILTERED_CACHE);
}

/* ══════════════════════════════════
   Update selected customer preview
══════════════════════════════════ */
function handleCustomerSelect() {
  const select = document.getElementById('customer-select');
  const value = select.value;

  CURRENT_SELECTED = CUSTOMER_CACHE.find(c =>
    c?.key === value ||
    c?.item?.name === value
  );

  const preview = document.getElementById('customer-preview');

  if (!CURRENT_SELECTED) {
    preview.innerHTML = '<div style="color:#57606a;">No customer selected.</div>';
    return;
  }

  const item = CURRENT_SELECTED?.item || {};

  preview.innerHTML = `
    <div class="preview-row">
      <span class="preview-label">Customer</span>
      <span class="preview-value">${escapeHtml(item?.name)}</span>
    </div>

    <div class="preview-row">
      <span class="preview-label">Email</span>
      <span class="preview-value">${escapeHtml(safe(item?.email))}</span>
    </div>

    <div class="preview-row">
      <span class="preview-label">Code</span>
      <span class="preview-value">${escapeHtml(safe(item?.code))}</span>
    </div>

    <div class="preview-row">
      <span class="preview-label">Credit Limit</span>
      <span class="preview-value">${fmtMoney(item?.creditLimit)}</span>
    </div>

    <div class="preview-row">
      <span class="preview-label">Billing Address</span>
      <span class="preview-value">${escapeHtml(safe(item?.billingAddress))}</span>
    </div>
  `;
}

/* ══════════════════════════════════
   Open quick add area
══════════════════════════════════ */
function focusQuickAdd() {
  const formCard = document.getElementById('form-card');

  if (formCard) {
    formCard.scrollIntoView({
      behavior:'smooth',
      block:'start'
    });
  }

  setTimeout(() => {
    const input = document.getElementById('cust-name');
    if (input) input.focus();
  }, 300);
}

/* ══════════════════════════════════
   Customer table renderer
══════════════════════════════════ */
function renderCustomerTable(items) {
  const tableWrap = document.getElementById('table-wrap');

  if (!items.length) {
    tableWrap.innerHTML = `
      <div class="empty">
        <div style="font-size:18px;font-weight:800;margin-bottom:8px;">
          No customers found
        </div>
        <div>
          Try adjusting your search or create a new customer.
        </div>
      </div>
    `;
    return;
  }

  tableWrap.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Customer</th>
          <th>Email</th>
          <th>Billing Address</th>
          <th>Credit Limit</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        ${items.map(customer => {
          const item = customer?.item || {};

          return `
            <tr>
              <td>
                <div style="font-weight:800;">
                  ${escapeHtml(item?.name || 'Unnamed')}
                </div>

                <div style="font-size:12px;color:#57606a;margin-top:4px;">
                  ${escapeHtml(item?.code || 'No Code')}
                </div>
              </td>

              <td>
                ${escapeHtml(item?.email || '—')}
              </td>

              <td>
                ${escapeHtml(item?.billingAddress || '—')}
              </td>

              <td>
                ${fmtMoney(item?.creditLimit)}
              </td>

              <td>
                <span class="badge ${item?.inactive ? 'badge-inactive' : 'badge-active'}">
                  ${item?.inactive ? 'Inactive' : 'Active'}
                </span>
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';
  app.innerHTML = '';

  try {
    const items = await getCustomerBatch((loaded, total, page) => {
      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()} records`
        : `Page ${page} · ${loaded.toLocaleString()} records loaded…`;

      if (total) {
        bar.style.width = Math.min(95, Math.round(loaded / total * 100)) + '%';
      }
    });

    bar.style.width = '100%';
    status.textContent = `✓ ${items.length.toLocaleString()} customer records loaded`;

    btn.textContent = '↺ Reload';
    btn.disabled = false;

    render(items);

  } catch (err) {
    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry';
    btn.disabled = false;

    app.innerHTML = `
      <div class="err-box">
        <div style="font-weight:800;margin-bottom:8px;">
          Unable to load Manager.io data
        </div>

        <div style="margin-bottom:6px;">
          ${escapeHtml(err.message)}
        </div>

        <small>
          Make sure this extension is running inside Manager.io.
        </small>
      </div>
    `;
  }
}

/* ══════════════════════════════════
   render(items)
══════════════════════════════════ */
function render(items) {
  const app = document.getElementById('app');

  CUSTOMER_CACHE = Array.isArray(items) ? items : [];
  FILTERED_CACHE = [...CUSTOMER_CACHE];

  const totalCustomers = CUSTOMER_CACHE.length;

  const activeCustomers = CUSTOMER_CACHE.filter(i =>
    !i?.item?.inactive
  ).length;

  const totalCredit = CUSTOMER_CACHE.reduce((sum, customer) => {
    return sum + Number(customer?.item?.creditLimit || 0);
  }, 0);

  const customerOptions = CUSTOMER_CACHE
    .sort((a,b) => {
      const an = a?.item?.name || '';
      const bn = b?.item?.name || '';
      return an.localeCompare(bn);
    })
    .map(customer => {
      const name = customer?.item?.name || 'Unnamed';
      const key = customer?.key || name;

      return `
        <option value="${escapeHtml(key)}">
          ${escapeHtml(name)}
        </option>
      `;
    })
    .join('');

  app.innerHTML = `
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total Customers</div>
        <div class="stat-value">
          ${totalCustomers.toLocaleString()}
        </div>
      </div>

      <div class="stat">
        <div class="stat-label">Active Customers</div>
        <div class="stat-value">
          ${activeCustomers.toLocaleString()}
        </div>
      </div>

      <div class="stat">
        <div class="stat-label">Combined Credit Limit</div>
        <div class="stat-value">
          ${fmtMoney(totalCredit)}
        </div>
      </div>
    </div>

    <div class="layout">

      <!-- LEFT -->
      <div class="card">

        <div class="card-title">
          Sales Invoice Form Integration
        </div>

        <div class="invoice-row">
          <button class="quick-add-btn" onclick="focusQuickAdd()">
            ➕ Add Customer
          </button>

          <div style="display:flex;flex-direction:column;gap:6px;flex:1;">
            <span class="invoice-label">
              Choose Customer
            </span>

            <select
              class="customer-select"
              id="customer-select"
              onchange="handleCustomerSelect()"
            >
              <option value="">
                Select a customer…
              </option>

              ${customerOptions}
            </select>
          </div>
        </div>

        <div id="customer-preview" class="customer-preview">
          <div style="color:#57606a;">
            Select a customer to preview details.
          </div>
        </div>

        <div style="margin-top:22px;">
          <input
            id="search-input"
            class="search-input"
            type="text"
            placeholder="Search customers by name, email, code, or address…"
            oninput="filterCustomers()"
          >

          <div id="table-wrap" class="table-wrap"></div>
        </div>

      </div>

      <!-- RIGHT -->
      <div class="card" id="form-card">

        <div class="card-title">
          Quick Add Customer
        </div>

        <form id="customer-form" onsubmit="event.preventDefault(); createCustomer();">

          <div class="grid">

            <div class="field">
              <label>Customer Name *</label>
              <input
                id="cust-name"
                type="text"
                placeholder="Acme Corporation"
                required
              >
            </div>

            <div class="field">
              <label>Customer Code</label>
              <input
                id="cust-code"
                type="text"
                placeholder="ACM-100"
              >
            </div>

            <div class="field">
              <label>Email Address</label>
              <input
                id="cust-email"
                type="email"
                placeholder="billing@example.com"
              >
            </div>

            <div class="field">
              <label>Credit Limit</label>
              <input
                id="cust-credit"
                type="number"
                min="0"
                step="0.01"
                placeholder="0.00"
              >
            </div>

          </div>

          <div class="field" style="margin-top:14px;">
            <label>Billing Address</label>

            <textarea
              id="cust-billing"
              placeholder="Enter billing address"
            ></textarea>

```
      </div>

      <div class="field" style="margin-top:14px;">
        <label>Delivery Address</label>

        <textarea
          id="cust-delivery"
          placeholder="Enter delivery address"
        ></textarea>
      </div>

      <div class="actions">
        <button
          type="submit"
          class="primary-btn"
          id="save-btn"
        >
          💾 Save Customer
        </button>

        <button
          type="reset"
          class="secondary-btn"
        >
          Reset Form
        </button>
      </div>

    </form>

    <div
      id="success-box"
      class="success-box"
      style="display:none;"
    >
      ✓ Customer saved successfully
    </div>

  </div>

</div>
```

`;

renderCustomerTable(FILTERED_CACHE);

if (!CUSTOMER_CACHE.length) {
document.getElementById('table-wrap').innerHTML = ` <div class="empty"> <div style="font-size:20px;font-weight:900;margin-bottom:10px;">
No customers available </div>

```
    <div style="margin-bottom:14px;">
      Create your first customer using the quick add form.
    </div>
  </div>
`;
```

}
} </script>

</body>
</html>
