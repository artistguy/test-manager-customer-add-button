<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Customer Manager</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  body {
    font-family: system-ui, sans-serif;
    background:#ffffff;
    color:#24292f;
    min-height:100vh;
    padding:20px;
  }

  .ctrl-bar {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:12px 16px;
    margin-bottom:18px;
    background:#f6f8fa;
    border:1px solid #d0d7de;
    border-radius:10px;
  }

  .load-btn {
    padding:8px 18px;
    border:none;
    border-radius:7px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    background:#0969da;
    color:#fff;
  }

  .load-btn:disabled { opacity:.5; cursor:not-allowed; }

  .prog-wrap {
    flex:1;
    min-width:120px;
    height:6px;
    background:#d0d7de;
    border-radius:4px;
    overflow:hidden;
  }

  .prog-bar {
    height:100%;
    width:0%;
    background:#0969da;
    transition:width .2s;
  }

  .status-txt {
    font-size:12px;
    color:#57606a;
    white-space:nowrap;
  }

  .err-box {
    padding:12px 14px;
    border:1px solid #d0d7de;
    border-radius:8px;
    background:#fff5f5;
    color:#cf222e;
    margin-bottom:12px;
  }

  .layout {
    display:grid;
    grid-template-columns: 1fr 1.2fr;
    gap:16px;
  }

  .panel {
    border:1px solid #d0d7de;
    border-radius:10px;
    background:#fff;
    overflow:hidden;
  }

  .panel-header {
    padding:10px 12px;
    background:#f6f8fa;
    border-bottom:1px solid #d0d7de;
    font-weight:700;
    font-size:13px;
  }

  .search {
    width:100%;
    padding:10px;
    border:none;
    border-bottom:1px solid #d0d7de;
    outline:none;
  }

  .table {
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }

  .table tr {
    cursor:pointer;
  }

  .table tr:hover {
    background:#f6f8fa;
  }

  .table td {
    padding:8px 10px;
    border-bottom:1px solid #f0f0f0;
  }

  .selected {
    background:#e7f1ff !important;
  }

  .form {
    padding:12px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .form label {
    font-size:12px;
    color:#57606a;
    margin-bottom:4px;
    display:block;
  }

  .field {
    display:flex;
    flex-direction:column;
  }

  input {
    padding:8px;
    border:1px solid #d0d7de;
    border-radius:6px;
    outline:none;
  }

  input:focus {
    border-color:#0969da;
  }

  .full { grid-column:1 / -1; }

  .actions {
    grid-column:1 / -1;
    display:flex;
    gap:10px;
    margin-top:6px;
  }

  .btn {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    font-weight:700;
    font-size:13px;
  }

  .btn-primary { background:#0969da; color:#fff; }
  .btn-secondary { background:#f6f8fa; border:1px solid #d0d7de; }

  .hint {
    font-size:12px;
    color:#57606a;
    margin-top:6px;
  }

  .empty {
    padding:20px;
    color:#57606a;
    text-align:center;
  }
</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch customers</span>
</div>

<div id="app"></div>

<script>
/* ══════════════════════════════════
   DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);

    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }

    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   PAGINATION LOOP (DO NOT CHANGE)
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   GLOBAL STATE
══════════════════════════════════ */
window.__state = {
  customers: [],
  filtered: [],
  selected: null,
  search: ''
};

/* ══════════════════════════════════
   LOAD DATA
══════════════════════════════════ */
async function loadAllRecords() {
  const btn = document.getElementById('load-btn');
  const bar = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';

  try {
    const items = await getCustomerBatch((loaded, total, page) => {
      status.textContent = total
        ? `Page ${page} · ${loaded} / ${total}`
        : `Page ${page} · ${loaded} loaded`;
      if (total) bar.style.width = Math.min(95, (loaded / total) * 100) + '%';
    });

    window.__state.customers = items;
    window.__state.filtered = items;

    bar.style.width = '100%';
    status.textContent = `✓ ${items.length} customers loaded`;

    btn.textContent = '↺ Reload';
    btn.disabled = false;

    render(items);

  } catch (err) {
    status.textContent = 'Error: ' + err.message;
    btn.textContent = '↺ Retry';
    btn.disabled = false;
    document.getElementById('app').innerHTML =
      `<div class="err-box">${err.message}</div>`;
  }
}

/* ══════════════════════════════════
   VALIDATION
══════════════════════════════════ */
function validateCustomer(c) {
  const errors = [];

  if (!c.name || c.name.trim().length === 0) {
    errors.push("Name is required");
  }

  if (c.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(c.email)) {
    errors.push("Invalid email format");
  }

  if (c.creditLimit != null && c.creditLimit < 0) {
    errors.push("Credit limit cannot be negative");
  }

  return errors;
}

/* ══════════════════════════════════
   SELECT CUSTOMER
══════════════════════════════════ */
function selectCustomer(index) {
  window.__state.selected = index;
  render(window.__state.customers);
}

/* ══════════════════════════════════
   UPDATE FIELD
══════════════════════════════════ */
function updateField(field, value) {
  const idx = window.__state.selected;
  if (idx == null) return;

  const raw = window.__state.customers[idx];
  const c = raw.item || raw;

  c[field] = field === 'creditLimit' ? Number(value) : value;

  render(window.__state.customers);
}

/* ══════════════════════════════════
   RENDER UI
══════════════════════════════════ */
function render(items) {
  const app = document.getElementById('app');

  const normalized = items.map(x => x.item ? x.item : x);

  const state = window.__state;

  const selectedItem = state.selected != null ? normalized[state.selected] : null;

  const filtered = state.search
    ? normalized.filter(c =>
        (c.name || '').toLowerCase().includes(state.search.toLowerCase()) ||
        (c.email || '').toLowerCase().includes(state.search.toLowerCase())
      )
    : normalized;

  let html = `
  <div class="layout">

    <div class="panel">
      <div class="panel-header">Customers (${filtered.length})</div>
      <input class="search" placeholder="Search name or email..."
        oninput="window.__state.search=this.value; render(window.__state.customers)" />

      <table class="table">
        ${filtered.length === 0 ? `<tr><td class="empty">No customers found</td></tr>` : filtered.map((c, i) => {
          const globalIndex = normalized.indexOf(c);
          const isSel = state.selected === globalIndex;
          return `
            <tr class="${isSel ? 'selected' : ''}" onclick="selectCustomer(${globalIndex})">
              <td><strong>${c.name || 'Unnamed'}</strong><br><small>${c.email || ''}</small></td>
            </tr>
          `;
        }).join('')}
      </table>
    </div>

    <div class="panel">
      <div class="panel-header">Customer Editor</div>

      ${selectedItem ? `
        ${(() => {
          const errors = validateCustomer(selectedItem);

          return `
          ${errors.length ? `<div class="err-box">${errors.join('<br>')}</div>` : ''}

          <div class="form">

            <div class="field full">
              <label>Name *</label>
              <input value="${selectedItem.name || ''}" oninput="updateField('name', this.value)">
            </div>

            <div class="field">
              <label>Email</label>
              <input value="${selectedItem.email || ''}" oninput="updateField('email', this.value)">
            </div>

            <div class="field">
              <label>Credit Limit</label>
              <input type="number" value="${selectedItem.creditLimit || 0}"
                oninput="updateField('creditLimit', this.value)">
            </div>

            <div class="field full">
              <label>Billing Address</label>
              <input value="${selectedItem.billingAddress || ''}"
                oninput="updateField('billingAddress', this.value)">
            </div>

            <div class="field full">
              <label>Delivery Address</label>
              <input value="${selectedItem.deliveryAddress || ''}"
                oninput="updateField('deliveryAddress', this.value)">
            </div>

            <div class="field">
              <label>Inactive</label>
              <input type="checkbox" ${selectedItem.inactive ? 'checked' : ''}
                onchange="updateField('inactive', this.checked)">
            </div>

            <div class="actions">
              <button class="btn btn-secondary" onclick="render(window.__state.customers)">Reset View</button>
              <button class="btn btn-primary" onclick="alert('Read-only mode: changes are local only')">Save</button>
            </div>

            <div class="hint">Read-only extension — edits are not persisted to Manager.io</div>

          </div>`;
        })()}
      ` : `<div class="empty">Select a customer to view or edit</div>`}

    </div>

  </div>
  `;

  app.innerHTML = html;
}

/* initial empty render */
render([]);
</script>

</body>
</html>
