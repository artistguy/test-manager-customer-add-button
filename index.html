<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Form to create a new customer directly from the sales invoice form.</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,sans-serif; background:#fafafa; color:#111827; min-height:100vh; padding:20px; }

.ctrl-bar {
display:flex; align-items:center; gap:10px; flex-wrap:wrap;
padding:12px 16px; margin-bottom:18px;
background:#ffffff; border:1px solid #e5e7eb; border-radius:10px;
}
.load-btn {
padding:8px 20px; border:none; border-radius:7px; cursor:pointer;
font-size:13px; font-weight:700; background:#6366f1; color:#fff; transition:opacity .15s;
}
.load-btn:disabled { opacity:.45; cursor:not-allowed; }
.prog-wrap { flex:1; min-width:100px; height:5px; background:#e5e7eb; border-radius:3px; overflow:hidden; }
.prog-bar  { height:100%; width:0%; background:#6366f1; border-radius:3px; transition:width .25s; }
.status-txt { font-size:12px; color:#6b7280; white-space:nowrap; }
.err-box { color:#dc2626; background:#ffffff; border:1px solid #e5e7eb; border-radius:8px; padding:12px 16px; font-size:13px; margin-bottom:16px; }

/* Minimal UI components */
.panel {
background:#fff;
border:1px solid #e5e7eb;
border-radius:10px;
padding:14px;
margin-bottom:14px;
}
.row {
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
justify-content:space-between;
}
.search {
flex:1;
min-width:220px;
padding:10px 12px;
border:1px solid #e5e7eb;
border-radius:8px;
font-size:13px;
}
.stat {
font-size:12px;
color:#6b7280;
padding:6px 10px;
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:8px;
}
table {
width:100%;
border-collapse:collapse;
font-size:13px;
}
th, td {
text-align:left;
padding:10px;
border-bottom:1px solid #e5e7eb;
vertical-align:top;
}
th {
font-size:12px;
color:#6b7280;
font-weight:600;
background:#fafafa;
}
tr:hover td { background:#fafafa; }
.badge {
display:inline-block;
padding:3px 8px;
border-radius:999px;
font-size:11px;
border:1px solid #e5e7eb;
background:#f9fafb;
color:#374151;
}
.inactive { opacity:.6; }
.empty {
padding:20px;
text-align:center;
color:#6b7280;
} </style>

</head>
<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch data from Manager</span>
</div>

<div id="app"></div>

<script>
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';
  app.innerHTML = '';

  try {
    const items = await getCustomerBatch((loaded, total, page) => {
      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()} records`
        : `Page ${page} · ${loaded.toLocaleString()} records loaded…`;
      if (total) bar.style.width = Math.min(95, Math.round(loaded / total * 100)) + '%';
    });

    bar.style.width = '100%';
    status.textContent = `✓ ${items.length.toLocaleString()} records loaded`;
    btn.textContent = '↺ Reload';
    btn.disabled = false;
    render(items);

  } catch (err) {
    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry';
    btn.disabled = false;
    app.innerHTML = `<div class="err-box">⚠ ${err.message}<br><small>Make sure this is running inside Manager.io</small></div>`;
  }
}

/* ===========================
   render(items) IMPLEMENTED
=========================== */
function render(items) {
  const app = document.getElementById('app');

  if (!items || items.length === 0) {
    app.innerHTML = `<div class="panel empty">No customers found. Load data to begin.</div>`;
    return;
  }

  const customers = items.map(x => x?.item).filter(Boolean);

  const total = customers.length;
  const active = customers.filter(c => !c?.inactive).length;
  const inactive = total - active;

  let query = "";

  const container = document.createElement('div');

  container.innerHTML = `
    <div class="panel">
      <div class="row">
        <input class="search" id="searchBox" placeholder="Search customers by name, email, or address..." />
        <div class="stat">Total: ${total.toLocaleString()}</div>
        <div class="stat">Active: ${active.toLocaleString()}</div>
        <div class="stat">Inactive: ${inactive.toLocaleString()}</div>
      </div>
    </div>

    <div class="panel">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Billing Address</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="emptyState" class="empty" style="display:none;">No matching customers</div>
    </div>
  `;

  app.innerHTML = "";
  app.appendChild(container);

  const tbody = container.querySelector('#tableBody');
  const emptyState = container.querySelector('#emptyState');
  const searchBox = container.querySelector('#searchBox');

  function draw(list) {
    tbody.innerHTML = "";

    if (!list.length) {
      emptyState.style.display = "block";
      return;
    }
    emptyState.style.display = "none";

    for (const c of list) {
      const tr = document.createElement('tr');

      const name = c?.nameWithCode || c?.name || c?.text || "—";
      const email = c?.email || "—";
      const address = c?.billingAddress || "—";
      const inactive = c?.inactive ? true : false;

      tr.className = inactive ? "inactive" : "";

      tr.innerHTML = `
        <td><strong>${name}</strong></td>
        <td>${email}</td>
        <td>${address}</td>
        <td>${inactive ? '<span class="badge">Inactive</span>' : '<span class="badge">Active</span>'}</td>
      `;

      tbody.appendChild(tr);
    }
  }

  function filter(val) {
    query = val.toLowerCase().trim();

    const filtered = customers.filter(c => {
      const name = (c?.nameWithCode || c?.name || c?.text || "").toLowerCase();
      const email = (c?.email || "").toLowerCase();
      const addr = (c?.billingAddress || "").toLowerCase();

      return name.includes(query) || email.includes(query) || addr.includes(query);
    });

    draw(filtered);
  }

  searchBox.addEventListener('input', e => filter(e.target.value));

  draw(customers);
}
</script>

</body>
</html>
