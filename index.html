<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager.io Customer Quick Add Extension</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  body{
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#ffffff;
    color:#24292f;
    min-height:100vh;
    padding:20px;
  }

  .ctrl-bar{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    padding:14px 16px;
    margin-bottom:18px;
    background:#f6f8fa;
    border:1px solid #d0d7de;
    border-radius:12px;
    box-shadow:0 1px 2px rgba(27,31,36,.04);
  }

  .load-btn{
    padding:9px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    background:#0969da;
    color:#fff;
    transition:.15s ease;
  }

  .load-btn:hover{
    opacity:.92;
  }

  .load-btn:disabled{
    opacity:.45;
    cursor:not-allowed;
  }

  .prog-wrap{
    flex:1;
    min-width:120px;
    height:6px;
    background:#d0d7de;
    border-radius:999px;
    overflow:hidden;
  }

  .prog-bar{
    height:100%;
    width:0%;
    background:#0969da;
    border-radius:999px;
    transition:width .25s;
  }

  .status-txt{
    font-size:12px;
    color:#57606a;
    white-space:nowrap;
  }

  .err-box{
    color:#cf222e;
    background:#fff8f8;
    border:1px solid #ffcecb;
    border-radius:10px;
    padding:14px 16px;
    font-size:13px;
    margin-bottom:16px;
  }

  .main-grid{
    display:grid;
    grid-template-columns:360px 1fr;
    gap:18px;
    align-items:start;
  }

  .panel{
    background:#fff;
    border:1px solid #d0d7de;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 1px 3px rgba(27,31,36,.05);
  }

  .panel-head{
    padding:16px 18px;
    border-bottom:1px solid #d8dee4;
    background:#f6f8fa;
  }

  .panel-title{
    font-size:15px;
    font-weight:700;
    margin-bottom:4px;
  }

  .panel-sub{
    color:#57606a;
    font-size:12px;
    line-height:1.4;
  }

  .panel-body{
    padding:18px;
  }

  .invoice-toolbar{
    display:flex;
    align-items:flex-end;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:16px;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
    flex:1;
    min-width:180px;
  }

  .field label{
    font-size:12px;
    font-weight:600;
    color:#57606a;
  }

  .field input,
  .field textarea,
  .field select{
    width:100%;
    border:1px solid #d0d7de;
    background:#fff;
    border-radius:8px;
    padding:10px 12px;
    font-size:13px;
    color:#24292f;
    transition:border-color .15s ease, box-shadow .15s ease;
  }

  .field textarea{
    min-height:74px;
    resize:vertical;
  }

  .field input:focus,
  .field textarea:focus,
  .field select:focus{
    outline:none;
    border-color:#0969da;
    box-shadow:0 0 0 3px rgba(9,105,218,.12);
  }

  .quick-add-btn{
    height:40px;
    border:none;
    background:#1a7f37;
    color:#fff;
    padding:0 16px;
    border-radius:8px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    transition:.15s ease;
    white-space:nowrap;
  }

  .quick-add-btn:hover{
    opacity:.92;
  }

  .save-btn{
    width:100%;
    border:none;
    background:#0969da;
    color:#fff;
    border-radius:10px;
    padding:12px 14px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:.15s ease;
    margin-top:14px;
  }

  .save-btn:hover{
    opacity:.92;
  }

  .save-btn:disabled{
    opacity:.55;
    cursor:not-allowed;
  }

  .success-box{
    margin-top:14px;
    background:#dafbe1;
    border:1px solid #aceebb;
    color:#116329;
    padding:12px 14px;
    border-radius:10px;
    font-size:13px;
    line-height:1.5;
  }

  .stat-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:14px;
    margin-bottom:18px;
  }

  .stat-card{
    border:1px solid #d8dee4;
    border-radius:12px;
    padding:16px;
    background:#fff;
  }

  .stat-label{
    color:#57606a;
    font-size:12px;
    margin-bottom:8px;
  }

  .stat-value{
    font-size:26px;
    font-weight:800;
    letter-spacing:-0.02em;
  }

  .search-wrap{
    margin-bottom:14px;
  }

  .customer-table-wrap{
    overflow:auto;
    border:1px solid #d8dee4;
    border-radius:12px;
  }

  table{
    width:100%;
    border-collapse:collapse;
    min-width:860px;
  }

  thead{
    background:#f6f8fa;
  }

  th{
    text-align:left;
    padding:12px 14px;
    font-size:12px;
    color:#57606a;
    border-bottom:1px solid #d8dee4;
    white-space:nowrap;
  }

  td{
    padding:12px 14px;
    border-bottom:1px solid #eef2f6;
    font-size:13px;
    vertical-align:top;
  }

  tbody tr:hover{
    background:#f9fbfd;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:4px 9px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
  }

  .badge.active{
    background:#dafbe1;
    color:#116329;
  }

  .badge.inactive{
    background:#fff1e5;
    color:#9a6700;
  }

  .muted{
    color:#57606a;
  }

  .empty-state{
    padding:48px 20px;
    text-align:center;
    color:#57606a;
  }

  .small{
    font-size:12px;
  }

  @media (max-width:980px){
    .main-grid{
      grid-template-columns:1fr;
    }
  }
</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>

  <div class="prog-wrap">
    <div class="prog-bar" id="prog-bar"></div>
  </div>

  <span class="status-txt" id="status-txt">
    Press Load to fetch customer records from Manager.io
  </span>
</div>

<div id="app"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getCustomerBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Global cache
══════════════════════════════════ */
let ALL_CUSTOMERS = [];

/* ══════════════════════════════════
   Formatters
══════════════════════════════════ */
function fmtCurrency(v){
  return new Intl.NumberFormat(undefined,{
    style:'currency',
    currency:'USD',
    minimumFractionDigits:2
  }).format(Number(v || 0));
}

function escapeHtml(str){
  return String(str ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

/* ══════════════════════════════════
   Create customer (WRITE OPERATION)
══════════════════════════════════ */
async function createCustomer() {

  const btn = document.getElementById('save-customer-btn');
  const msg = document.getElementById('save-message');

  const name = document.getElementById('cust-name')?.value?.trim();
  const code = document.getElementById('cust-code')?.value?.trim();
  const email = document.getElementById('cust-email')?.value?.trim();
  const billing = document.getElementById('cust-billing')?.value?.trim();
  const delivery = document.getElementById('cust-delivery')?.value?.trim();
  const creditLimit = Number(document.getElementById('cust-credit')?.value || 0);

  msg.innerHTML = '';

  if (!name) {
    msg.innerHTML = '<div class="err-box">Customer name is required.</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {

    const payload = {
      item: {
        name,
        code: code || null,
        email: email || null,
        billingAddress: billing || '',
        deliveryAddress: delivery || '',
        creditLimit: creditLimit || 0,
        currency: null,
        division: null,
        controlAccount: null,
        inactive: false,
        hasDefaultDueDateDays: false,
        defaultDueDateDays: null,
        hasDefaultHourlyRate: false,
        defaultHourlyRate: 0,
        customFields: null,
        customFields2: {
          strings: null,
          decimals: null,
          dates: null,
          booleans: null,
          stringArrays: null,
          images: null
        },
        hasDefaultBillingAddress: !!billing,
        defaultBillingAddress: billing || '',
        hasDefaultDeliveryAddress: !!delivery,
        defaultDeliveryAddress: delivery || ''
      }
    };

    /* WRITE OPERATION */
    const response = await postMessageWithResponse({
      type: 'api-request',
      method: 'POST',
      path: '/api4/customer',
      body: payload
    });

    msg.innerHTML = `
      <div class="success-box">
        ✓ Customer created successfully.<br>
        <strong>${escapeHtml(name)}</strong> was added to Manager.io.
      </div>
    `;

    document.getElementById('cust-name').value = '';
    document.getElementById('cust-code').value = '';
    document.getElementById('cust-email').value = '';
    document.getElementById('cust-billing').value = '';
    document.getElementById('cust-delivery').value = '';
    document.getElementById('cust-credit').value = '0';

    await loadAllRecords();

  } catch (err) {

    msg.innerHTML = `
      <div class="err-box">
        ⚠ Failed to create customer.<br>
        <small>${escapeHtml(err.message || 'Unknown API error')}</small>
      </div>
    `;
  }

  btn.disabled = false;
  btn.textContent = '➕ Save Customer';
}

/* ══════════════════════════════════
   Filter customer table
══════════════════════════════════ */
function filterCustomers() {

  const q = document.getElementById('customer-search')
    ?.value
    ?.toLowerCase()
    ?.trim() || '';

  const filtered = ALL_CUSTOMERS.filter(row => {

    const item = row?.item || {};

    return [
      item?.name,
      item?.email,
      item?.code,
      item?.billingAddress,
      item?.deliveryAddress
    ]
    .join(' ')
    .toLowerCase()
    .includes(q);

  });

  renderCustomerRows(filtered);
}

/* ══════════════════════════════════
   Render customer table rows
══════════════════════════════════ */
function renderCustomerRows(items){

  const tbody = document.getElementById('customer-table-body');

  if (!tbody) return;

  if (!items.length){
    tbody.innerHTML = `
      <tr>
        <td colspan="7">
          <div class="empty-state">
            No customers matched your search.
          </div>
        </td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = items.map((row,index) => {

    const item = row?.item || {};

    return `
      <tr>
        <td>${index + 1}</td>

        <td>
          <strong>${escapeHtml(item?.name ?? '—')}</strong>
        </td>

        <td class="muted">
          ${escapeHtml(item?.email ?? '—')}
        </td>

        <td>
          ${escapeHtml(item?.code ?? '—')}
        </td>

        <td>
          ${fmtCurrency(item?.creditLimit || 0)}
        </td>

        <td class="small">
          ${escapeHtml(item?.billingAddress ?? '—')}
        </td>

        <td>
          <span class="badge ${item?.inactive ? 'inactive' : 'active'}">
            ${item?.inactive ? 'Inactive' : 'Active'}
          </span>
        </td>
      </tr>
    `;
  }).join('');
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {

  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';
  app.innerHTML = '';

  try {

    const items = await getCustomerBatch((loaded, total, page) => {

      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()} records`
        : `Page ${page} · ${loaded.toLocaleString()} records loaded…`;

      if (total) {
        bar.style.width = Math.min(95, Math.round(loaded / total * 100)) + '%';
      }
    });

    ALL_CUSTOMERS = items;

    bar.style.width = '100%';
    status.textContent = `✓ ${items.length.toLocaleString()} customer records loaded`;

    btn.textContent = '↺ Reload';
    btn.disabled = false;

    render(items);

  } catch (err) {

    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry';
    btn.disabled = false;

    app.innerHTML = `
      <div class="err-box">
        ⚠ ${escapeHtml(err.message)}
        <br>
        <small>Make sure this extension is running inside Manager.io.</small>
      </div>
    `;
  }
}

/* ══════════════════════════════════
   render(items)
══════════════════════════════════ */
function render(items) {

  const app = document.getElementById('app');

  if (!Array.isArray(items) || items.length === 0){

    app.innerHTML = `
      <div class="panel">
        <div class="empty-state">
          <h2 style="margin-bottom:10px;">No Customers Found</h2>
          <p>No customer records were returned from /api4/customer-batch.</p>
        </div>
      </div>
    `;

    return;
  }

  const totalCustomers = items.length;

  const activeCustomers = items.filter(i => !i?.item?.inactive).length;

  const inactiveCustomers = items.filter(i => i?.item?.inactive).length;

  const withEmail = items.filter(i => i?.item?.email).length;

  app.innerHTML = `
    <div class="main-grid">

      <!-- LEFT PANEL -->
      <div class="panel">

        <div class="panel-head">
          <div class="panel-title">
            Sales Invoice Customer Quick Add
          </div>

          <div class="panel-sub">
            Adds a customer creation button to the left side of the customer selector area inside the sales invoice workflow.
          </div>
        </div>

        <div class="panel-body">

          <!-- Simulated Sales Invoice Toolbar -->
          <div class="invoice-toolbar">

            <!-- BUTTON TO LEFT OF CUSTOMER DROPDOWN -->
            <button class="quick-add-btn" onclick="document.getElementById('cust-name').focus()">
              ➕ New Customer
            </button>

            <div class="field">
              <label>Choose Customer</label>

              <select>
                ${items.slice(0,100).map(row => `
                  <option>
                    ${escapeHtml(row?.item?.name ?? 'Unnamed Customer')}
                  </option>
                `).join('')}
              </select>
            </div>

          </div>

          <div class="field" style="margin-bottom:12px;">
            <label>Customer Name *</label>
            <input id="cust-name" type="text" placeholder="Enter customer name">
          </div>

          <div class="field" style="margin-bottom:12px;">
            <label>Customer Code</label>
            <input id="cust-code" type="text" placeholder="Optional internal code">
          </div>

          <div class="field" style="margin-bottom:12px;">
            <label>Email</label>
            <input id="cust-email" type="email" placeholder="customer@example.com">
          </div>

          <div class="field" style="margin-bottom:12px;">
            <label>Credit Limit</label>
            <input id="cust-credit" type="number" value="0" min="0" step="0.01">
          </div>

          <div class="field" style="margin-bottom:12px;">
            <label>Billing Address</label>
            <textarea id="cust-billing" placeholder="Billing address"></textarea>

```
      </div>

      <div class="field">
        <label>Delivery Address</label>
        <textarea id="cust-delivery" placeholder="Delivery address"></textarea>
      </div>

      <button id="save-customer-btn" class="save-btn" onclick="createCustomer()">
        ➕ Save Customer
      </button>

      <div id="save-message"></div>

    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div>

    <!-- STATS -->
    <div class="stat-grid">

      <div class="stat-card">
        <div class="stat-label">Total Customers</div>
        <div class="stat-value">
          ${totalCustomers.toLocaleString()}
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Active Customers</div>
        <div class="stat-value">
          ${activeCustomers.toLocaleString()}
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Inactive Customers</div>
        <div class="stat-value">
          ${inactiveCustomers.toLocaleString()}
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Customers With Email</div>
        <div class="stat-value">
          ${withEmail.toLocaleString()}
        </div>
      </div>

    </div>

    <!-- TABLE -->
    <div class="panel">

      <div class="panel-head">
        <div class="panel-title">
          Customer Directory
        </div>

        <div class="panel-sub">
          Live customer records loaded from /api4/customer-batch
        </div>
      </div>

      <div class="panel-body">

        <div class="search-wrap">
          <input
            id="customer-search"
            type="text"
            placeholder="Search customers..."
            oninput="filterCustomers()"
            style="
              width:100%;
              border:1px solid #d0d7de;
              border-radius:10px;
              padding:12px 14px;
              font-size:13px;
            "
          >
        </div>

        <div class="customer-table-wrap">

          <table>

            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Code</th>
                <th>Credit Limit</th>
                <th>Billing Address</th>
                <th>Status</th>
              </tr>
            </thead>

            <tbody id="customer-table-body"></tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

</div>
```

`;

renderCustomerRows(items);
}

/* ══════════════════════════════════
Auto-load on startup
══════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
loadAllRecords();
}); </script>

</body>
</html>
