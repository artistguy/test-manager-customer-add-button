<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager.io Customer Quick Add Extension</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  body{
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#ffffff;
    color:#24292f;
    min-height:100vh;
    padding:20px;
  }

  .ctrl-bar{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:12px 16px;
    margin-bottom:18px;
    background:#f6f8fa;
    border:1px solid #d0d7de;
    border-radius:12px;
    box-shadow:0 1px 2px rgba(0,0,0,.04);
  }

  .load-btn,
  .action-btn{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    transition:all .15s ease;
  }

  .load-btn{
    background:#0969da;
    color:#fff;
  }

  .load-btn:hover,
  .action-btn:hover{
    transform:translateY(-1px);
  }

  .load-btn:disabled,
  .action-btn:disabled{
    opacity:.5;
    cursor:not-allowed;
    transform:none;
  }

  .prog-wrap{
    flex:1;
    min-width:100px;
    height:6px;
    background:#d0d7de;
    border-radius:999px;
    overflow:hidden;
  }

  .prog-bar{
    height:100%;
    width:0%;
    background:#0969da;
    border-radius:999px;
    transition:width .25s;
  }

  .status-txt{
    font-size:12px;
    color:#57606a;
    white-space:nowrap;
  }

  .err-box{
    color:#cf222e;
    background:#fff1f2;
    border:1px solid #fecdd3;
    border-radius:12px;
    padding:16px;
    font-size:13px;
    margin-bottom:16px;
  }

  .success-box{
    color:#166534;
    background:#f0fdf4;
    border:1px solid #bbf7d0;
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:16px;
    font-size:13px;
  }

  .layout{
    display:grid;
    grid-template-columns: 400px 1fr;
    gap:20px;
  }

  @media (max-width: 1000px){
    .layout{
      grid-template-columns:1fr;
    }
  }

  .card{
    background:#fff;
    border:1px solid #d0d7de;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 1px 2px rgba(0,0,0,.04);
  }

  .card-header{
    padding:16px 18px;
    border-bottom:1px solid #d8dee4;
    background:#f6f8fa;
  }

  .card-title{
    font-size:15px;
    font-weight:700;
  }

  .card-sub{
    margin-top:4px;
    color:#57606a;
    font-size:12px;
  }

  .card-body{
    padding:18px;
  }

  .stats-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-bottom:18px;
  }

  .stat{
    padding:14px;
    background:#f6f8fa;
    border-radius:12px;
    border:1px solid #d8dee4;
  }

  .stat-label{
    font-size:11px;
    color:#57606a;
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.04em;
  }

  .stat-value{
    font-size:24px;
    font-weight:800;
    color:#0969da;
  }

  .form-grid{
    display:grid;
    gap:14px;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .field label{
    font-size:12px;
    font-weight:700;
    color:#374151;
  }

  .field input,
  .field textarea{
    width:100%;
    padding:11px 12px;
    border:1px solid #d0d7de;
    border-radius:10px;
    font-size:14px;
    outline:none;
    transition:border-color .15s;
    background:#fff;
  }

  .field input:focus,
  .field textarea:focus{
    border-color:#0969da;
    box-shadow:0 0 0 3px rgba(9,105,218,.12);
  }

  textarea{
    resize:vertical;
    min-height:80px;
  }

  .inline-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:6px;
  }

  .primary{
    background:#16a34a;
    color:#fff;
  }

  .secondary{
    background:#ffffff;
    border:1px solid #d0d7de;
    color:#24292f;
  }

  .toolbar{
    display:flex;
    gap:10px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }

  .search-input{
    flex:1;
    min-width:240px;
    padding:12px 14px;
    border:1px solid #d0d7de;
    border-radius:10px;
    font-size:14px;
  }

  .customer-list{
    display:grid;
    gap:10px;
    max-height:720px;
    overflow:auto;
    padding-right:4px;
  }

  .customer-item{
    border:1px solid #d8dee4;
    border-radius:14px;
    padding:16px;
    transition:all .15s ease;
    background:#fff;
  }

  .customer-item:hover{
    border-color:#0969da;
    box-shadow:0 2px 10px rgba(9,105,218,.08);
  }

  .customer-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:10px;
  }

  .customer-name{
    font-size:16px;
    font-weight:700;
    color:#111827;
  }

  .customer-email{
    font-size:13px;
    color:#57606a;
    margin-top:4px;
  }

  .badge{
    background:#e0f2fe;
    color:#075985;
    border-radius:999px;
    padding:5px 10px;
    font-size:11px;
    font-weight:700;
    white-space:nowrap;
  }

  .meta-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:12px;
  }

  .meta{
    background:#f6f8fa;
    border-radius:10px;
    padding:10px;
    border:1px solid #d8dee4;
  }

  .meta-label{
    font-size:10px;
    color:#57606a;
    text-transform:uppercase;
    margin-bottom:4px;
  }

  .meta-value{
    font-size:13px;
    color:#111827;
    word-break:break-word;
  }

  .customer-actions{
    display:flex;
    gap:8px;
    margin-top:14px;
    flex-wrap:wrap;
  }

  .mini-btn{
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
    font-weight:700;
  }

  .edit-btn{
    background:#dbeafe;
    color:#1d4ed8;
  }

  .delete-btn{
    background:#fee2e2;
    color:#b91c1c;
  }

  .empty{
    padding:40px 20px;
    text-align:center;
    color:#6b7280;
    border:2px dashed #d1d5db;
    border-radius:14px;
    background:#f9fafb;
  }

  .quick-add-banner{
    background:linear-gradient(135deg,#0969da,#3b82f6);
    color:#fff;
    padding:18px;
    border-radius:16px;
    margin-bottom:20px;
  }

  .quick-add-title{
    font-size:18px;
    font-weight:800;
    margin-bottom:6px;
  }

  .quick-add-desc{
    font-size:13px;
    opacity:.95;
    line-height:1.5;
  }

</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <button class="action-btn primary" onclick="injectInvoiceButton()">➕ Inject Invoice Form Button</button>

  <div class="prog-wrap">
    <div class="prog-bar" id="prog-bar"></div>
  </div>

  <span class="status-txt" id="status-txt">
    Press Load to fetch data from Manager
  </span>
</div>

<div id="messages"></div>
<div id="app"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getCustomerBatch
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;

    if (onProgress) {
      onProgress(allItems.length, apiTotal, pageNum);
    }

    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Global state
══════════════════════════════════ */
let CUSTOMER_DATA = [];
let FILTERED_DATA = [];

/* ══════════════════════════════════
   Utility functions
══════════════════════════════════ */
function safe(v, fallback = '—') {
  return v ?? fallback;
}

function escapeHtml(str) {
  return String(str ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}

function showMessage(type, message) {
  const box = document.getElementById('messages');

  box.innerHTML = `
    <div class="${type === 'success' ? 'success-box' : 'err-box'}">
      ${message}
    </div>
  `;

  setTimeout(() => {
    box.innerHTML = '';
  }, 5000);
}

/* ══════════════════════════════════
   Create customer (WRITE OPERATION)
══════════════════════════════════ */
async function createCustomer() {

  const payload = {
    name: document.getElementById('cust-name').value.trim(),
    email: document.getElementById('cust-email').value.trim() || null,
    billingAddress: document.getElementById('cust-billing').value.trim() || '',
    deliveryAddress: document.getElementById('cust-delivery').value.trim() || '',
    code: document.getElementById('cust-code').value.trim() || null,
    creditLimit: Number(document.getElementById('cust-credit').value || 0),
    inactive: false
  };

  if (!payload.name) {
    showMessage('error', 'Customer name is required.');
    return;
  }

  const saveBtn = document.getElementById('save-btn');

  try {

    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';

    /* WRITE CAPABILITY */
    await postMessageWithResponse({
      type: 'api-request',
      method: 'POST',
      path: '/api4/customer',
      body: payload
    });

    showMessage('success', `✓ Customer "${escapeHtml(payload.name)}" created successfully.`);

    document.getElementById('cust-name').value = '';
    document.getElementById('cust-email').value = '';
    document.getElementById('cust-billing').value = '';
    document.getElementById('cust-delivery').value = '';
    document.getElementById('cust-code').value = '';
    document.getElementById('cust-credit').value = '0';

    await loadAllRecords();

  } catch (err) {

    showMessage(
      'error',
      'Unable to create customer. ' + escapeHtml(err.message)
    );

  } finally {

    saveBtn.disabled = false;
    saveBtn.textContent = '💾 Save Customer';

  }
}

/* ══════════════════════════════════
   Delete customer (WRITE OPERATION)
══════════════════════════════════ */
async function deleteCustomer(deleteHref, customerName) {

  if (!deleteHref) {
    showMessage('error', 'Delete endpoint unavailable.');
    return;
  }

  const ok = confirm(`Delete customer "${customerName}"?`);

  if (!ok) return;

  try {

    await postMessageWithResponse({
      type: 'api-request',
      method: 'DELETE',
      path: deleteHref
    });

    showMessage('success', `✓ Deleted "${escapeHtml(customerName)}"`);

    await loadAllRecords();

  } catch (err) {

    showMessage(
      'error',
      'Delete failed. ' + escapeHtml(err.message)
    );

  }
}

/* ══════════════════════════════════
   Inject invoice form button
══════════════════════════════════ */
function injectInvoiceButton() {

  try {

    const iframeDoc =
      window.parent.document ||
      window.top.document;

    const selects = iframeDoc.querySelectorAll('select,input,[role="combobox"]');

    let injected = false;

    selects.forEach(el => {

      if (injected) return;

      const parentText = (el.parentElement?.textContent || '').toLowerCase();

      if (
        parentText.includes('customer') ||
        parentText.includes('choose customer')
      ) {

        if (el.parentElement.querySelector('.manager-quick-add-btn')) {
          injected = true;
          return;
        }

        const btn = iframeDoc.createElement('button');

        btn.type = 'button';
        btn.className = 'manager-quick-add-btn';
        btn.innerHTML = '➕ New Customer';

        btn.style.marginLeft = '8px';
        btn.style.padding = '8px 12px';
        btn.style.borderRadius = '8px';
        btn.style.border = 'none';
        btn.style.background = '#16a34a';
        btn.style.color = '#fff';
        btn.style.fontWeight = '700';
        btn.style.cursor = 'pointer';

        btn.onclick = () => {
          alert('Customer Quick Add Extension Loaded Below. Use the left panel to create a customer.');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        el.parentElement.appendChild(btn);

        injected = true;
      }

    });

    if (injected) {
      showMessage('success', '✓ Invoice form button injected successfully.');
    } else {
      showMessage('error', 'Could not locate customer dropdown field.');
    }

  } catch (err) {

    showMessage(
      'error',
      'Injection failed. ' + escapeHtml(err.message)
    );

  }
}

/* ══════════════════════════════════
   Search customers
══════════════════════════════════ */
function filterCustomers(value) {

  const q = value.trim().toLowerCase();

  FILTERED_DATA = CUSTOMER_DATA.filter(item => {

    const customer = item?.item || {};

    return [
      customer?.name,
      customer?.email,
      customer?.billingAddress,
      customer?.deliveryAddress,
      customer?.code
    ]
    .join(' ')
    .toLowerCase()
    .includes(q);

  });

  renderCustomerList(FILTERED_DATA);
}

/* ══════════════════════════════════
   Render customer list
══════════════════════════════════ */
function renderCustomerList(items) {

  const target = document.getElementById('customer-list');

  if (!items.length) {

    target.innerHTML = `
      <div class="empty">
        <div style="font-size:40px;margin-bottom:12px">📭</div>
        <div style="font-weight:700;margin-bottom:6px">No customers found</div>
        <div>Try another search term or create a new customer.</div>
      </div>
    `;

    return;
  }

  target.innerHTML = items.map(row => {

    const customer = row?.item || {};

    const deleteHref =
      row?._actions?.delete?.href || '';

    return `
      <div class="customer-item">

        <div class="customer-top">

          <div>
            <div class="customer-name">
              ${escapeHtml(customer?.name || 'Unnamed')}
            </div>

            <div class="customer-email">
              ${escapeHtml(customer?.email || 'No email')}
            </div>
          </div>

          <div class="badge">
            ${customer?.inactive ? 'Inactive' : 'Active'}
          </div>

        </div>

        <div class="meta-grid">

          <div class="meta">
            <div class="meta-label">Code</div>
            <div class="meta-value">
              ${escapeHtml(customer?.code || '—')}
            </div>
          </div>

          <div class="meta">
            <div class="meta-label">Credit Limit</div>
            <div class="meta-value">
              ${(customer?.creditLimit ?? 0).toLocaleString(undefined,{
                minimumFractionDigits:2,
                maximumFractionDigits:2
              })}
            </div>
          </div>

          <div class="meta">
            <div class="meta-label">Billing Address</div>
            <div class="meta-value">
              ${escapeHtml(customer?.billingAddress || '—')}
            </div>
          </div>

          <div class="meta">
            <div class="meta-label">Delivery Address</div>
            <div class="meta-value">
              ${escapeHtml(customer?.deliveryAddress || '—')}
            </div>
          </div>

        </div>

        <div class="customer-actions">

          <button
            class="mini-btn delete-btn"
            onclick='deleteCustomer(${JSON.stringify(deleteHref)}, ${JSON.stringify(customer?.name || "")})'
          >
            🗑 Delete
          </button>

        </div>

      </div>
    `;

  }).join('');
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {

  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true;
  btn.textContent = 'Loading…';

  bar.style.width = '0%';

  try {

    const items = await getCustomerBatch((loaded, total, page) => {

      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()} records`
        : `Page ${page} · ${loaded.toLocaleString()} records loaded…`;

      if (total) {
        bar.style.width = Math.min(
          95,
          Math.round(loaded / total * 100)
        ) + '%';
      }

    });

    CUSTOMER_DATA = items;
    FILTERED_DATA = items;

    bar.style.width = '100%';

    status.textContent =
      `✓ ${items.length.toLocaleString()} customer records loaded`;

    btn.textContent = '↺ Reload';
    btn.disabled = false;

    render(items);

  } catch (err) {

    status.textContent = '⚠ ' + err.message;

    btn.textContent = '↺ Retry';
    btn.disabled = false;

    app.innerHTML = `
      <div class="err-box">
        ⚠ ${escapeHtml(err.message)}
        <br><br>
        <small>
          Make sure this extension is running inside Manager.io
        </small>
      </div>
    `;

  }
}

/* ══════════════════════════════════
   Main render
══════════════════════════════════ */
function render(items) {

  const app = document.getElementById('app');

  if (!Array.isArray(items) || items.length === 0) {

    app.innerHTML = `
      <div class="empty">
        <div style="font-size:48px;margin-bottom:14px">📂</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px">
          No customer records found
        </div>
        <div>
          Create your first customer using the quick-add form.
        </div>
      </div>
    `;

    return;
  }

  const totalCustomers = items.length;

  const activeCustomers = items.filter(
    x => !x?.item?.inactive
  ).length;

  const inactiveCustomers = items.filter(
    x => x?.item?.inactive
  ).length;

  const withEmails = items.filter(
    x => x?.item?.email
  ).length;

  app.innerHTML = `
    <div class="quick-add-banner">
      <div class="quick-add-title">
        Customer Quick Add for Sales Invoice Form
      </div>

      <div class="quick-add-desc">
        This extension adds write-capable customer management directly inside Manager.io.
        Use the green "Inject Invoice Form Button" action above to add a customer button
        beside the invoice customer selector.
      </div>
    </div>

    <div class="layout">

      <div class="card">

        <div class="card-header">
          <div class="card-title">
            ➕ Create New Customer
          </div>

          <div class="card-sub">
            Write-enabled Manager.io customer creation
          </div>
        </div>

        <div class="card-body">

          <div class="stats-grid">

            <div class="stat">
              <div class="stat-label">Total Customers</div>
              <div class="stat-value">
                ${totalCustomers.toLocaleString()}
              </div>
            </div>

            <div class="stat">
              <div class="stat-label">Active</div>
              <div class="stat-value">
                ${activeCustomers.toLocaleString()}
              </div>
            </div>

            <div class="stat">
              <div class="stat-label">Inactive</div>
              <div class="stat-value">
                ${inactiveCustomers.toLocaleString()}
              </div>
            </div>

            <div class="stat">
              <div class="stat-label">With Email</div>
              <div class="stat-value">
                ${withEmails.toLocaleString()}
              </div>
            </div>

          </div>

          <div class="form-grid">

            <div class="field">
              <label>Customer Name *</label>
              <input id="cust-name" placeholder="Acme Corporation">
            </div>

            <div class="field">
              <label>Email</label>
              <input id="cust-email" type="email" placeholder="billing@example.com">
            </div>

            <div class="field">
              <label>Customer Code</label>
              <input id="cust-code" placeholder="CUST-001">
            </div>

            <div class="field">
              <label>Credit Limit</label>
              <input id="cust-credit" type="number" value="0" min="0" step="0.01">
            </div>

            <div class="field">
              <label>Billing Address</label>
              <textarea id="cust-billing" placeholder="Billing address"></textarea>

```
        </div>

        <div class="field">
          <label>Delivery Address</label>
          <textarea id="cust-delivery" placeholder="Delivery address"></textarea>
        </div>

        <div class="inline-actions">

          <button
            id="save-btn"
            class="action-btn primary"
            onclick="createCustomer()"
          >
            💾 Save Customer
          </button>

          <button
            class="action-btn secondary"
            onclick="injectInvoiceButton()"
          >
            ➕ Inject Invoice Button
          </button>

        </div>

      </div>

    </div>

  </div>

  <div class="card">

    <div class="card-header">
      <div class="card-title">
        👥 Customer Directory
      </div>

      <div class="card-sub">
        Loaded from /api4/customer-batch
      </div>
    </div>

    <div class="card-body">

      <div class="toolbar">

        <input
          class="search-input"
          placeholder="Search customers by name, email, address, or code…"
          oninput="filterCustomers(this.value)"
        >

      </div>

      <div id="customer-list" class="customer-list"></div>

    </div>

  </div>

</div>
```

`;

renderCustomerList(items);
}

/* ══════════════════════════════════
Auto load on startup
══════════════════════════════════ */
window.addEventListener('load', () => {
loadAllRecords();
}); </script>

</body>
</html>
