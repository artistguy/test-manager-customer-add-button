<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sales Invoice Customer Quick Add</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  :root{
    --bg:#ffffff;
    --panel:#ffffff;
    --panel-soft:#f6f8fa;
    --border:#d0d7de;
    --text:#24292f;
    --muted:#57606a;
    --blue:#0969da;
    --blue-soft:#ddf4ff;
    --green:#1a7f37;
    --green-soft:#dafbe1;
    --red:#cf222e;
    --red-soft:#ffebe9;
    --shadow:0 10px 30px rgba(31,35,40,.08);
  }

  body {
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:20px;
  }

  .ctrl-bar {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:12px 16px;
    margin-bottom:18px;
    background:#f6f8fa;
    border:1px solid #d0d7de;
    border-radius:12px;
    box-shadow:var(--shadow);
  }

  .load-btn {
    padding:8px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    background:#0969da;
    color:#fff;
    transition:all .15s;
  }

  .load-btn:hover:not(:disabled){
    filter:brightness(1.05);
    transform:translateY(-1px);
  }

  .load-btn:disabled {
    opacity:.45;
    cursor:not-allowed;
  }

  .prog-wrap {
    flex:1;
    min-width:100px;
    height:5px;
    background:#d0d7de;
    border-radius:999px;
    overflow:hidden;
  }

  .prog-bar {
    height:100%;
    width:0%;
    background:#0969da;
    border-radius:999px;
    transition:width .25s;
  }

  .status-txt {
    font-size:12px;
    color:#57606a;
    white-space:nowrap;
  }

  .err-box {
    color:#cf222e;
    background:#fff8f8;
    border:1px solid #ffcecb;
    border-radius:10px;
    padding:16px;
    font-size:13px;
    margin-bottom:16px;
  }

  .hero{
    background:linear-gradient(180deg,#ffffff,#f6f8fa);
    border:1px solid var(--border);
    border-radius:18px;
    padding:28px;
    margin-bottom:22px;
    box-shadow:var(--shadow);
  }

  .hero h1{
    font-size:30px;
    margin-bottom:10px;
    letter-spacing:-0.03em;
  }

  .hero p{
    color:var(--muted);
    line-height:1.6;
    max-width:850px;
  }

  .stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:16px;
    margin-bottom:22px;
  }

  .stat{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px;
    box-shadow:var(--shadow);
  }

  .stat-label{
    color:var(--muted);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.06em;
    margin-bottom:10px;
    font-weight:700;
  }

  .stat-value{
    font-size:30px;
    font-weight:800;
    letter-spacing:-0.04em;
  }

  .layout{
    display:grid;
    grid-template-columns:420px 1fr;
    gap:22px;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    padding:22px;
    box-shadow:var(--shadow);
  }

  .card h2{
    font-size:20px;
    margin-bottom:18px;
    letter-spacing:-0.02em;
  }

  .invoice-form{
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .field label{
    font-size:12px;
    font-weight:700;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.08em;
  }

  .customer-row{
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    align-items:center;
  }

  select,
  input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#fff;
    color:var(--text);
    font-size:14px;
    outline:none;
    transition:border .15s, box-shadow .15s;
  }

  select:focus,
  input:focus{
    border-color:var(--blue);
    box-shadow:0 0 0 4px rgba(9,105,218,.12);
  }

  .quick-add-btn{
    height:44px;
    padding:0 16px;
    border:none;
    border-radius:10px;
    background:var(--blue);
    color:#fff;
    font-weight:700;
    cursor:pointer;
    transition:all .15s;
    white-space:nowrap;
  }

  .quick-add-btn:hover{
    filter:brightness(1.05);
    transform:translateY(-1px);
  }

  .validation{
    margin-top:4px;
    padding:14px;
    border-radius:12px;
    font-size:14px;
    line-height:1.5;
    border:1px solid transparent;
  }

  .validation.success{
    background:var(--green-soft);
    border-color:#95d8a6;
    color:var(--green);
  }

  .validation.error{
    background:var(--red-soft);
    border-color:#ffb3ad;
    color:var(--red);
  }

  .validation.info{
    background:var(--blue-soft);
    border-color:#9cd7ff;
    color:var(--blue);
  }

  .modal-backdrop{
    position:fixed;
    inset:0;
    background:rgba(15,23,42,.35);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:999;
  }

  .modal{
    width:100%;
    max-width:520px;
    background:#fff;
    border-radius:20px;
    border:1px solid var(--border);
    box-shadow:0 30px 80px rgba(0,0,0,.18);
    overflow:hidden;
  }

  .modal-head{
    padding:20px 24px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .modal-head h3{
    font-size:20px;
    letter-spacing:-0.02em;
  }

  .close-btn{
    border:none;
    background:none;
    cursor:pointer;
    font-size:22px;
    color:var(--muted);
  }

  .modal-body{
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  .inline-help{
    font-size:13px;
    color:var(--muted);
    line-height:1.5;
  }

  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:10px;
  }

  .btn-secondary{
    border:1px solid var(--border);
    background:#fff;
    color:var(--text);
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
  }

  .btn-primary{
    border:none;
    background:var(--blue);
    color:#fff;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    font-weight:700;
  }

  .directory-table{
    width:100%;
    border-collapse:collapse;
    min-width:680px;
  }

  .table-wrap{
    overflow:auto;
    border-radius:16px;
    border:1px solid var(--border);
  }

  .directory-table thead{
    background:#f6f8fa;
  }

  .directory-table th{
    text-align:left;
    padding:14px 16px;
    font-size:12px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.08em;
    border-bottom:1px solid var(--border);
  }

  .directory-table td{
    padding:14px 16px;
    border-bottom:1px solid #eef1f4;
    font-size:14px;
    vertical-align:top;
  }

  .directory-table tbody tr:hover{
    background:#fafbfc;
  }

  .tag{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:6px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
    letter-spacing:.04em;
  }

  .tag.valid{
    background:#dafbe1;
    color:#1a7f37;
  }

  .tag.readonly{
    background:#ddf4ff;
    color:#0969da;
  }

  .empty{
    text-align:center;
    padding:70px 20px;
    background:#fff;
    border:1px solid var(--border);
    border-radius:18px;
    color:var(--muted);
  }

  .empty h3{
    color:var(--text);
    margin-bottom:10px;
    font-size:24px;
  }

  .search-box{
    margin-bottom:18px;
  }

  .helper{
    margin-top:8px;
    font-size:12px;
    color:var(--muted);
    line-height:1.5;
  }

  @media (max-width:980px){
    .layout{
      grid-template-columns:1fr;
    }

    .customer-row{
      grid-template-columns:1fr;
    }
  }
</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch data from Manager</span>
</div>

<div id="app"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getCustomerBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Load button handler
══════════════════════════════════ */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';
  app.innerHTML = '';

  try {
    const items = await getCustomerBatch((loaded, total, page) => {
      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()} records`
        : `Page ${page} · ${loaded.toLocaleString()} records loaded…`;

      if (total) {
        bar.style.width = Math.min(95, Math.round(loaded / total * 100)) + '%';
      }
    });

    bar.style.width = '100%';
    status.textContent = `✓ ${items.length.toLocaleString()} records loaded`;
    btn.textContent = '↺ Reload';
    btn.disabled = false;

    render(items);

  } catch (err) {
    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry';
    btn.disabled = false;

    app.innerHTML = `
      <div class="err-box">
        <strong>⚠ Failed to load customer records</strong><br><br>
        ${escapeHtml(err.message)}<br><br>
        <small>Make sure this extension is running inside Manager.io.</small>
      </div>
    `;
  }
}

/* ══════════════════════════════════
   Utility helpers
══════════════════════════════════ */
function escapeHtml(str){
  return String(str ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}

function getCustomerName(item, index){
  return (
    item?.name ??
    item?.displayName ??
    item?.customerName ??
    item?.fullName ??
    item?.email ??
    item?.code ??
    `Customer ${index + 1}`
  );
}

function getCustomerId(item, index){
  return (
    item?.id ??
    item?.customerId ??
    item?._links?.self?.href ??
    `customer-${index + 1}`
  );
}

/* ══════════════════════════════════
   Main render
══════════════════════════════════ */
function render(items) {
  const app = document.getElementById('app');

  if (!Array.isArray(items) || items.length === 0) {
    app.innerHTML = `
      <div class="empty">
        <h3>No Customers Found</h3>
        <p>The customer-batch endpoint returned zero customer records.</p>
      </div>
    `;
    return;
  }

  const customers = items.map((item, index) => ({
    raw:item,
    id:getCustomerId(item, index),
    name:getCustomerName(item, index),
    self:item?._links?.self?.href ?? '—',
    schema:item?._links?.describedBy?.href ?? '—',
    create:item?._actions?.create?.href ?? '—'
  }));

  const uniqueCreateEndpoints = new Set(
    customers.map(c => c.create).filter(Boolean)
  ).size;

  app.innerHTML = `
    <div class="hero">
      <h1>Sales Invoice Customer Quick Add</h1>
      <p>
        Add new customers directly from the sales invoice form using a quick-add button beside the customer dropdown field. Includes validation checks, duplicate prevention, and read-only API awareness.
      </p>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Loaded Customers</div>
        <div class="stat-value">${customers.length.toLocaleString()}</div>
      </div>

      <div class="stat">
        <div class="stat-label">Create Endpoints</div>
        <div class="stat-value">${uniqueCreateEndpoints.toLocaleString()}</div>
      </div>

      <div class="stat">
        <div class="stat-label">Extension Mode</div>
        <div class="stat-value" style="font-size:22px;">READ ONLY</div>
      </div>
    </div>

    <div class="layout">

      <div class="card">

        <h2>Sales Invoice Form</h2>

        <div class="invoice-form">

          <div class="field">
            <label>Customer</label>

            <div class="customer-row">

              <select id="customer-select">
                <option value="">Select Customer</option>

                ${customers.map(customer => `
                  <option value="${escapeHtml(customer.id)}">
                    ${escapeHtml(customer.name)}
                  </option>
                `).join('')}

              </select>

              <button class="quick-add-btn" id="open-modal-btn">
                + Add Customer
              </button>

            </div>

            <div class="helper">
              The quick-add button appears to the right of the customer dropdown selection field.
            </div>

          </div>

          <div class="field">
            <label>Invoice Reference</label>
            <input type="text" placeholder="INV-1001">
          </div>

          <div class="field">
            <label>Description</label>
            <input type="text" placeholder="Invoice notes or product summary">
          </div>

          <div class="validation info" id="validation-box">
            Customer validation is waiting for input.
          </div>

        </div>

      </div>

      <div class="card">

        <h2>Customer Directory</h2>

        <div class="search-box">
          <input type="text" id="directory-search" placeholder="Search customers...">
        </div>

        <div class="table-wrap">

          <table class="directory-table">

            <thead>
              <tr>
                <th>Customer</th>
                <th>Self Link</th>
                <th>Create Endpoint</th>
                <th>Status</th>
              </tr>
            </thead>

            <tbody id="directory-body"></tbody>

          </table>

        </div>

      </div>

    </div>

    <div class="modal-backdrop" id="modal-backdrop">

      <div class="modal">

        <div class="modal-head">
          <h3>Add New Customer</h3>
          <button class="close-btn" id="close-modal-btn">×</button>
        </div>

        <div class="modal-body">

          <div class="inline-help">
            This extension is operating in READ-ONLY mode. Validation and preview are supported, but customer creation is not submitted to the API.
          </div>

          <div class="field">
            <label>Customer Name</label>
            <input type="text" id="new-customer-name" placeholder="Enter customer name">
          </div>

          <div class="field">
            <label>Email Address</label>
            <input type="email" id="new-customer-email" placeholder="customer@example.com">
          </div>

          <div class="field">
            <label>Company</label>
            <input type="text" id="new-customer-company" placeholder="Optional company name">
          </div>

          <div class="validation info" id="modal-validation">
            Enter customer information to validate before adding.
          </div>

          <div class="modal-actions">
            <button class="btn-secondary" id="cancel-btn">Cancel</button>
            <button class="btn-primary" id="validate-btn">Validate Customer</button>
          </div>

        </div>

      </div>

    </div>
  `;

  const customerSelect = document.getElementById('customer-select');
  const validationBox = document.getElementById('validation-box');
  const modalBackdrop = document.getElementById('modal-backdrop');
  const openModalBtn = document.getElementById('open-modal-btn');
  const closeModalBtn = document.getElementById('close-modal-btn');
  const cancelBtn = document.getElementById('cancel-btn');
  const validateBtn = document.getElementById('validate-btn');
  const modalValidation = document.getElementById('modal-validation');
  const directorySearch = document.getElementById('directory-search');
  const directoryBody = document.getElementById('directory-body');

  /* Render customer directory table */
  function renderTable(query=''){
    const q = query.trim().toLowerCase();

    const filtered = customers.filter(customer =>
      customer.name.toLowerCase().includes(q)
    );

    directoryBody.innerHTML = filtered.map(customer => `
      <tr>
        <td>
          <strong>${escapeHtml(customer.name)}</strong>
        </td>

        <td style="max-width:220px;word-break:break-all;color:#57606a;">
          ${escapeHtml(customer.self)}
        </td>

        <td style="max-width:220px;word-break:break-all;color:#57606a;">
          ${escapeHtml(customer.create)}
        </td>

        <td>
          <span class="tag valid">VALIDATED</span>
          &nbsp;
          <span class="tag readonly">READ ONLY</span>
        </td>
      </tr>
    `).join('');

    if (filtered.length === 0) {
      directoryBody.innerHTML = `
        <tr>
          <td colspan="4" style="text-align:center;color:#57606a;padding:40px;">
            No matching customers found.
          </td>
        </tr>
      `;
    }
  }

  /* Customer dropdown validation */
  customerSelect.addEventListener('change', () => {
    const selectedId = customerSelect.value;

    if (!selectedId) {
      validationBox.className = 'validation error';
      validationBox.textContent = 'Please select a valid customer before continuing.';
      return;
    }

    const customer = customers.find(c => c.id === selectedId);

    validationBox.className = 'validation success';
    validationBox.innerHTML = `
      Customer <strong>${escapeHtml(customer?.name ?? 'Unknown')}</strong> validated successfully for invoice assignment.
    `;
  });

  /* Modal open */
  function openModal(){
    modalBackdrop.style.display = 'flex';
  }

  /* Modal close */
  function closeModal(){
    modalBackdrop.style.display = 'none';

    document.getElementById('new-customer-name').value = '';
    document.getElementById('new-customer-email').value = '';
    document.getElementById('new-customer-company').value = '';

    modalValidation.className = 'validation info';
    modalValidation.textContent = 'Enter customer information to validate before adding.';
  }

  openModalBtn.addEventListener('click', openModal);
  closeModalBtn.addEventListener('click', closeModal);
  cancelBtn.addEventListener('click', closeModal);

  /* Validation logic for quick add */
  validateBtn.addEventListener('click', () => {

    const name = document.getElementById('new-customer-name').value.trim();
    const email = document.getElementById('new-customer-email').value.trim();
    const company = document.getElementById('new-customer-company').value.trim();

    if (!name) {
      modalValidation.className = 'validation error';
      modalValidation.textContent = 'Customer name is required.';
      return;
    }

    if (name.length < 2) {
      modalValidation.className = 'validation error';
      modalValidation.textContent = 'Customer name must contain at least 2 characters.';
      return;
    }

    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      modalValidation.className = 'validation error';
      modalValidation.textContent = 'Please enter a valid email address.';
      return;
    }

    const duplicate = customers.some(customer =>
      customer.name.toLowerCase() === name.toLowerCase()
    );

    if (duplicate) {
      modalValidation.className = 'validation error';
      modalValidation.textContent = 'A customer with this name already exists.';
      return;
    }

    modalValidation.className = 'validation success';

    modalValidation.innerHTML = `
      Customer validation passed.<br><br>
      <strong>Name:</strong> ${escapeHtml(name)}<br>
      <strong>Email:</strong> ${escapeHtml(email || 'Not provided')}<br>
      <strong>Company:</strong> ${escapeHtml(company || 'Not provided')}<br><br>
      Ready for creation endpoint preview in Manager.io.
    `;
  });

  /* Close modal on backdrop click */
  modalBackdrop.addEventListener('click', (e) => {
    if (e.target === modalBackdrop) {
      closeModal();
    }
  });

  /* Search directory */
  directorySearch.addEventListener('input', (e) => {
    renderTable(e.target.value);
  });

  renderTable('');
}
</script>

</body>
</html>
