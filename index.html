<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Form to create or edit a record with validation</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family: system-ui, sans-serif;
    background:#ffffff;
    color:#24292f;
    min-height:100vh;
    padding:20px;
  }

  .ctrl-bar {
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:12px 16px; margin-bottom:18px;
    background:#f6f8fa; border:1px solid #d0d7de; border-radius:10px;
  }
  .load-btn {
    padding:8px 20px; border:none; border-radius:7px; cursor:pointer;
    font-size:13px; font-weight:700; background:#0969da; color:#fff;
  }
  .load-btn:disabled { opacity:.45; cursor:not-allowed; }

  .prog-wrap { flex:1; min-width:120px; height:5px; background:#d0d7de; border-radius:3px; overflow:hidden; }
  .prog-bar { height:100%; width:0%; background:#0969da; transition:width .25s; }

  .status-txt { font-size:12px; color:#57606a; white-space:nowrap; }

  .err-box {
    color:#cf222e; background:#fff5f5;
    border:1px solid #ffd0d0;
    border-radius:8px;
    padding:12px;
    margin-bottom:12px;
  }

  /* Layout */
  .layout {
    display:grid;
    grid-template-columns: 320px 1fr;
    gap:16px;
  }

  .panel {
    border:1px solid #d0d7de;
    border-radius:10px;
    background:#fff;
    overflow:hidden;
  }

  .panel-header {
    padding:10px 12px;
    background:#f6f8fa;
    border-bottom:1px solid #d0d7de;
    font-size:13px;
    font-weight:700;
  }

  /* List */
  .search {
    width:100%;
    padding:10px;
    border:none;
    border-bottom:1px solid #d0d7de;
    outline:none;
  }

  .list {
    max-height:65vh;
    overflow:auto;
  }

  .item {
    padding:10px 12px;
    border-bottom:1px solid #f0f0f0;
    cursor:pointer;
  }
  .item:hover { background:#f6f8fa; }
  .item.active { background:#eaf2ff; }

  .muted { color:#57606a; font-size:12px; }

  /* Form */
  .form {
    padding:12px;
    display:grid;
    gap:10px;
  }

  .row {
    display:grid;
    grid-template-columns: 160px 1fr;
    gap:10px;
    align-items:center;
  }

  label { font-size:13px; color:#24292f; }

  input, textarea {
    width:100%;
    padding:8px 10px;
    border:1px solid #d0d7de;
    border-radius:6px;
    font-size:13px;
    outline:none;
  }

  input:focus, textarea:focus {
    border-color:#0969da;
  }

  textarea { min-height:70px; resize:vertical; }

  .actions {
    display:flex;
    gap:10px;
    margin-top:8px;
  }

  .btn {
    padding:8px 12px;
    border-radius:7px;
    border:1px solid #d0d7de;
    background:#f6f8fa;
    cursor:pointer;
    font-weight:600;
    font-size:13px;
  }

  .btn.primary {
    background:#0969da;
    color:#fff;
    border:none;
  }

  .error {
    color:#cf222e;
    font-size:12px;
  }

  .empty {
    padding:20px;
    color:#57606a;
    text-align:center;
  }
</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch data from Manager</span>
</div>

<div id="app"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);

    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }

    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   pagination — DO NOT MODIFY
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════ */
let state = {
  items: [],
  selectedIndex: null,
  errors: {}
};

/* Load */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';
  app.innerHTML = '';

  try {
    const items = await getCustomerBatch((loaded, total, page) => {
      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()}`
        : `Page ${page} · ${loaded.toLocaleString()} loaded…`;

      if (total) bar.style.width = Math.min(95, Math.round(loaded / total * 100)) + '%';
    });

    state.items = items || [];
    bar.style.width = '100%';

    status.textContent = `✓ ${state.items.length.toLocaleString()} records loaded`;
    btn.textContent = '↺ Reload';
    btn.disabled = false;

    render(state.items);

  } catch (err) {
    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry';
    btn.disabled = false;

    app.innerHTML = `<div class="err-box">⚠ ${err.message}</div>`;
  }
}

/* ══════════════════════════════════
   Validation
══════════════════════════════════ */
function validate(customer) {
  const errors = {};

  if (!customer.name?.trim()) {
    errors.name = "Name is required";
  }

  if (customer.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(customer.email)) {
    errors.email = "Invalid email format";
  }

  if (customer.creditLimit != null && customer.creditLimit < 0) {
    errors.creditLimit = "Credit limit cannot be negative";
  }

  return errors;
}

/* ══════════════════════════════════
   Render UI
══════════════════════════════════ */
function render(items) {
  const app = document.getElementById('app');

  if (!items || items.length === 0) {
    app.innerHTML = `<div class="empty">No customers found</div>`;
    return;
  }

  const selected = state.selectedIndex != null ? items[state.selectedIndex] : items[0];
  if (state.selectedIndex == null) state.selectedIndex = 0;

  const listHtml = items.map((it, idx) => {
    const name = it?.item?.name || 'Unnamed';
    const code = it?.item?.code || '';
    return `
      <div class="item ${idx === state.selectedIndex ? 'active' : ''}"
           onclick="selectItem(${idx})">
        <div><b>${name}</b></div>
        <div class="muted">${code}</div>
      </div>
    `;
  }).join('');

  const formErrors = state.errors || {};

  const c = selected?.item || {};

  app.innerHTML = `
    <div class="layout">

      <div class="panel">
        <div class="panel-header">Customers</div>
        <input class="search" placeholder="Search..." oninput="filterList(this.value)">
        <div class="list" id="list">
          ${listHtml}
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">Edit Customer (local only)</div>

        <div class="form">
          <div class="row">
            <label>Name *</label>
            <div>
              <input id="name" value="${c.name || ''}" oninput="updateField('name', this.value)">
              <div class="error">${formErrors.name || ''}</div>
            </div>
          </div>

          <div class="row">
            <label>Email</label>
            <div>
              <input id="email" value="${c.email || ''}" oninput="updateField('email', this.value)">
              <div class="error">${formErrors.email || ''}</div>
            </div>
          </div>

          <div class="row">
            <label>Code</label>
            <input id="code" value="${c.code || ''}" oninput="updateField('code', this.value)">
          </div>

          <div class="row">
            <label>Credit Limit</label>
            <div>
              <input type="number" id="creditLimit" value="${c.creditLimit || 0}"
                oninput="updateField('creditLimit', Number(this.value))">
              <div class="error">${formErrors.creditLimit || ''}</div>
            </div>
          </div>

          <div class="row">
            <label>Billing Address</label>
            <textarea oninput="updateField('billingAddress', this.value)">${c.billingAddress || ''}</textarea>

```
      </div>

      <div class="row">
        <label>Delivery Address</label>
        <textarea oninput="updateField('deliveryAddress', this.value)">${c.deliveryAddress || ''}</textarea>
      </div>

      <div class="row">
        <label>Inactive</label>
        <input type="checkbox" ${c.inactive ? 'checked' : ''} onclick="updateField('inactive', this.checked)">
      </div>

      <div class="actions">
        <button class="btn" onclick="revalidate()">Validate</button>
        <button class="btn primary" onclick="resetLocal()">Reset</button>
      </div>
    </div>
  </div>

</div>
```

`;
}

/* ══════════════════════════════════
Interaction
══════════════════════════════════ */
function selectItem(idx) {
state.selectedIndex = idx;
state.errors = {};
render(state.items);
}

function updateField(field, value) {
const item = state.items[state.selectedIndex]?.item;
if (!item) return;

item[field] = value;
}

function revalidate() {
const item = state.items[state.selectedIndex]?.item;
state.errors = validate(item);
render(state.items);
}

function resetLocal() {
state.errors = {};
render(state.items);
}

function filterList(q) {
const list = document.querySelectorAll('.item');
list.forEach(el => {
el.style.display = el.innerText.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
});
}

/* initial empty render */
document.getElementById('app').innerHTML =
`<div class="empty">Load records to begin editing</div>`;

</script>

</body>
</html>
