<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager.io Customer Quick Add Extension</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family: system-ui, sans-serif;
    background:#ffffff;
    color:#24292f;
    min-height:100vh;
    padding:20px;
  }

  .ctrl-bar {
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:12px 16px; margin-bottom:18px;
    background:#f6f8fa; border:1px solid #d0d7de; border-radius:10px;
  }

  .load-btn {
    padding:8px 20px;
    border:none;
    border-radius:7px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    background:#0969da;
    color:#fff;
  }

  .load-btn:disabled { opacity:.5; cursor:not-allowed; }

  .prog-wrap {
    flex:1; min-width:120px; height:5px;
    background:#d0d7de; border-radius:3px; overflow:hidden;
  }

  .prog-bar {
    height:100%;
    width:0%;
    background:#0969da;
    transition:width .2s;
  }

  .status-txt { font-size:12px; color:#57606a; }

  .err-box {
    padding:12px;
    border:1px solid #d0d7de;
    border-radius:8px;
    background:#fff5f5;
    color:#cf222e;
    margin:10px 0;
  }

  /* ===== Invoice UI ===== */
  .invoice {
    border:1px solid #d0d7de;
    border-radius:12px;
    padding:16px;
    background:#fff;
  }

  .invoice h2 {
    font-size:14px;
    margin-bottom:12px;
    color:#1f2328;
  }

  .row {
    display:flex;
    align-items:center;
    gap:10px;
  }

  select, input {
    padding:8px;
    border:1px solid #d0d7de;
    border-radius:8px;
    font-size:13px;
    flex:1;
  }

  .add-btn {
    padding:8px 10px;
    border:none;
    background:#1a7f37;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
  }

  .add-btn:hover { opacity:.9; }

  /* ===== Modal ===== */
  .modal-bg {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
  }

  .modal {
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:12px;
    padding:16px;
    border:1px solid #d0d7de;
  }

  .modal h3 {
    font-size:14px;
    margin-bottom:10px;
  }

  .modal .grid {
    display:grid;
    gap:8px;
  }

  .modal button {
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
  }

  .primary { background:#0969da; color:#fff; }
  .ghost { background:#f6f8fa; }
</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load Customers</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <div class="status-txt" id="status-txt">Ready</div>
</div>

<div id="app"></div>

<!-- Modal -->

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Create Customer</h3>
    <div class="grid">
      <input id="c_name" placeholder="Name">
      <input id="c_email" placeholder="Email">
      <input id="c_bill" placeholder="Billing Address">
      <input id="c_del" placeholder="Delivery Address">

    <button class="primary" onclick="createCustomer()">Create</button>
    <button class="ghost" onclick="closeModal()">Cancel</button>
  </div>

  <div id="modal_status" style="font-size:12px;color:#57606a;"></div>
</div>

  </div>
</div>

<script>
/* ================================
   DO NOT MODIFY
================================ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);

    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }

    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ================================
   PAGINATION (DO NOT MODIFY)
================================ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type:'api-request', method:'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ================================
   LOAD
================================ */
async function loadAllRecords() {
  const btn = document.getElementById('load-btn');
  const bar = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';

  try {
    const items = await getCustomerBatch((loaded,total,page)=>{
      status.textContent = `Page ${page} · ${loaded} loaded`;
      bar.style.width = Math.min(95, loaded/Math.max(total||loaded,1)*100) + '%';
    });

    bar.style.width = '100%';
    status.textContent = `Loaded ${items.length} customers`;
    btn.textContent = 'Reload';
    btn.disabled = false;

    render(items);

  } catch (e) {
    status.textContent = e.message;
    btn.disabled = false;
  }
}

/* ================================
   STATE
================================ */
let CUSTOMERS = [];

/* ================================
   RENDER (MAIN UI)
================================ */
function render(items) {
  const app = document.getElementById('app');
  CUSTOMERS = items || [];

  const options = CUSTOMERS.map(c => {
    const name = c?.item?.name || 'Unnamed';
    const id = name;
    return `<option value="${id}">${name}</option>`;
  }).join('');

  app.innerHTML = `
    <div class="invoice">
      <h2>Sales Invoice</h2>

      <div class="row">
        <select id="customer_select">
          <option value="">Choose customer</option>
          ${options}
        </select>

        <button class="add-btn" onclick="openModal()">+ New</button>
      </div>

      <div style="margin-top:12px;font-size:12px;color:#57606a">
        Customers loaded: ${CUSTOMERS.length}
      </div>
    </div>
  `;
}

/* ================================
   MODAL
================================ */
function openModal() {
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

/* ================================
   CREATE CUSTOMER
================================ */
async function createCustomer() {
  const status = document.getElementById('modal_status');

  const payload = {
    item: {
      name: document.getElementById('c_name').value,
      email: document.getElementById('c_email').value,
      billingAddress: document.getElementById('c_bill').value,
      deliveryAddress: document.getElementById('c_del').value,
      creditLimit: 0
    }
  };

  try {
    status.textContent = 'Creating...';

    await postMessageWithResponse({
      type: 'api-request',
      method: 'POST',
      path: '/openapi/put-customer',
      body: payload
    });

    status.textContent = 'Customer created ✓';
    closeModal();
    await loadAllRecords();

  } catch (e) {
    status.textContent = 'Error: ' + e.message;
  }
}
</script>

</body>
</html>
