<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager.io Customer Quick Add Extension</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  :root{
    --bg:#ffffff;
    --card:#ffffff;
    --muted:#57606a;
    --text:#24292f;
    --border:#d0d7de;
    --soft:#f6f8fa;
    --blue:#0969da;
    --blue2:#1f6feb;
    --green:#1a7f37;
    --red:#cf222e;
    --shadow:0 2px 8px rgba(27,31,36,.08);
  }

  body{
    font-family:system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:20px;
  }

  .ctrl-bar {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:12px 16px;
    margin-bottom:18px;
    background:var(--soft);
    border:1px solid var(--border);
    border-radius:12px;
    box-shadow:var(--shadow);
  }

  .load-btn,
  .primary-btn,
  .secondary-btn{
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:.15s ease;
    font-weight:700;
  }

  .load-btn{
    padding:8px 20px;
    font-size:13px;
    background:var(--blue);
    color:#fff;
  }

  .load-btn:hover,
  .primary-btn:hover{
    opacity:.92;
  }

  .load-btn:disabled,
  .primary-btn:disabled{
    opacity:.45;
    cursor:not-allowed;
  }

  .prog-wrap{
    flex:1;
    min-width:120px;
    height:5px;
    background:#d8dee4;
    border-radius:3px;
    overflow:hidden;
  }

  .prog-bar{
    height:100%;
    width:0%;
    background:var(--blue);
    border-radius:3px;
    transition:width .25s;
  }

  .status-txt{
    font-size:12px;
    color:var(--muted);
    white-space:nowrap;
  }

  .err-box{
    color:var(--red);
    background:#fff8f8;
    border:1px solid #ffd8d3;
    border-radius:10px;
    padding:14px 16px;
    font-size:13px;
    margin-bottom:16px;
  }

  .layout{
    display:grid;
    grid-template-columns:420px 1fr;
    gap:18px;
    align-items:start;
  }

  @media (max-width:980px){
    .layout{
      grid-template-columns:1fr;
    }
  }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    box-shadow:var(--shadow);
  }

  .card-header{
    padding:16px 18px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }

  .card-title{
    font-size:17px;
    font-weight:800;
  }

  .card-sub{
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
  }

  .form-wrap{
    padding:18px;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .field.full{
    grid-column:1/-1;
  }

  .field label{
    font-size:12px;
    font-weight:700;
    color:#374151;
  }

  .field input,
  .field textarea{
    width:100%;
    border:1px solid var(--border);
    border-radius:10px;
    padding:11px 12px;
    font-size:14px;
    background:#fff;
    transition:border-color .15s, box-shadow .15s;
  }

  .field textarea{
    resize:vertical;
    min-height:80px;
  }

  .field input:focus,
  .field textarea:focus{
    outline:none;
    border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(9,105,218,.12);
  }

  .actions{
    margin-top:18px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }

  .primary-btn{
    background:var(--blue);
    color:#fff;
    padding:11px 18px;
    font-size:14px;
  }

  .secondary-btn{
    background:#fff;
    border:1px solid var(--border);
    color:#24292f;
    padding:11px 18px;
    font-size:14px;
  }

  .helper{
    margin-top:12px;
    font-size:12px;
    color:var(--muted);
    line-height:1.5;
  }

  .success{
    margin-top:14px;
    background:#ecfdf3;
    border:1px solid #a6e3b8;
    color:#166534;
    padding:12px 14px;
    border-radius:10px;
    font-size:13px;
  }

  .stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    padding:18px;
    border-bottom:1px solid var(--border);
  }

  @media (max-width:760px){
    .stats{
      grid-template-columns:repeat(2,1fr);
    }

    .grid{
      grid-template-columns:1fr;
    }
  }

  .stat{
    background:var(--soft);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
  }

  .stat-label{
    font-size:11px;
    color:var(--muted);
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.04em;
  }

  .stat-value{
    font-size:22px;
    font-weight:800;
  }

  .toolbar{
    padding:16px 18px;
    border-bottom:1px solid var(--border);
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }

  .search{
    flex:1;
    min-width:220px;
    position:relative;
  }

  .search input{
    width:100%;
    border:1px solid var(--border);
    border-radius:10px;
    padding:11px 14px;
    font-size:14px;
  }

  .table-wrap{
    overflow:auto;
    max-height:650px;
  }

  table{
    width:100%;
    border-collapse:collapse;
  }

  th{
    position:sticky;
    top:0;
    z-index:1;
    background:#f3f4f6;
    text-align:left;
    font-size:12px;
    color:#4b5563;
    padding:12px 14px;
    border-bottom:1px solid var(--border);
  }

  td{
    padding:13px 14px;
    border-bottom:1px solid #edf0f2;
    font-size:13px;
    vertical-align:top;
  }

  tr:hover{
    background:#fafbfc;
  }

  .pill{
    display:inline-flex;
    align-items:center;
    padding:4px 8px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
    background:#ddf4ff;
    color:#0969da;
  }

  .inactive{
    background:#fff1f0;
    color:#cf222e;
  }

  .empty{
    padding:40px 20px;
    text-align:center;
    color:var(--muted);
  }

  .mini-btn{
    border:none;
    background:#e7f3ff;
    color:#0969da;
    padding:7px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
    font-weight:700;
  }

  .mini-btn:hover{
    background:#d8ecff;
  }

  .invoice-banner{
    margin-bottom:18px;
    border:1px solid #bfd8ff;
    background:#f0f7ff;
    color:#0b4ea2;
    border-radius:12px;
    padding:16px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    flex-wrap:wrap;
  }

  .invoice-banner strong{
    display:block;
    margin-bottom:5px;
  }

  .floating-add-btn{
    background:var(--blue);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:11px 14px;
    font-weight:800;
    cursor:pointer;
    box-shadow:var(--shadow);
  }

  .floating-add-btn:hover{
    background:var(--blue2);
  }

  .muted{
    color:var(--muted);
  }
</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch data from Manager</span>
</div>

<div id="app"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getCustomerBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   State
══════════════════════════════════ */
let ALL_CUSTOMERS = [];
let FILTERED_CUSTOMERS = [];

/* ══════════════════════════════════
   Utility helpers
══════════════════════════════════ */
function escapeHtml(value){
  return String(value ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function fmtCurrency(v){
  return '$' + Number(v || 0).toLocaleString(undefined,{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  });
}

function setStatus(message){
  const el = document.getElementById('status-txt');
  if(el) el.textContent = message;
}

/* ══════════════════════════════════
   Customer creation
══════════════════════════════════ */
async function createCustomer(){
  const saveBtn = document.getElementById('save-btn');
  const success = document.getElementById('success-box');

  const payload = {
    name: document.getElementById('customer-name')?.value?.trim() || '',
    code: document.getElementById('customer-code')?.value?.trim() || null,
    email: document.getElementById('customer-email')?.value?.trim() || null,
    billingAddress: document.getElementById('billing-address')?.value?.trim() || '',
    deliveryAddress: document.getElementById('delivery-address')?.value?.trim() || '',
    creditLimit: Number(document.getElementById('credit-limit')?.value || 0),
    inactive: false,
    hasDefaultBillingAddress: true,
    defaultBillingAddress: document.getElementById('billing-address')?.value?.trim() || '',
    hasDefaultDeliveryAddress: true,
    defaultDeliveryAddress: document.getElementById('delivery-address')?.value?.trim() || ''
  };

  if(!payload.name){
    alert('Customer name is required.');
    return;
  }

  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';
  success.style.display = 'none';

  try{
    const response = await postMessageWithResponse({
      type:'api-request',
      method:'POST',
      path:'/api4/customer-batch',
      body:[payload]
    });

    success.style.display = 'block';
    success.innerHTML = '✓ Customer created successfully. Reloading records…';

    document.getElementById('customer-form').reset();

    setStatus('Refreshing customer records…');

    const items = await getCustomerBatch((loaded,total,page)=>{
      setStatus(
        total
          ? `Reloading · ${loaded.toLocaleString()} / ${total.toLocaleString()}`
          : `Reloading · ${loaded.toLocaleString()}`
      );
    });

    render(items);

  }catch(err){
    alert('Unable to create customer.\n\n' + err.message);
  }finally{
    saveBtn.disabled = false;
    saveBtn.textContent = '➕ Create Customer';
  }
}

/* ══════════════════════════════════
   Search customers
══════════════════════════════════ */
function applySearch(){
  const q = document.getElementById('search-input')?.value?.trim()?.toLowerCase() || '';

  FILTERED_CUSTOMERS = ALL_CUSTOMERS.filter(row=>{
    const item = row?.item || {};
    return [
      item?.name,
      item?.email,
      item?.billingAddress,
      item?.deliveryAddress,
      item?.code
    ]
    .filter(Boolean)
    .some(v => String(v).toLowerCase().includes(q));
  });

  renderTable();
}

/* ══════════════════════════════════
   Fill form from table
══════════════════════════════════ */
function useCustomer(index){
  const row = FILTERED_CUSTOMERS[index];
  const item = row?.item || {};

  document.getElementById('customer-name').value = item?.name || '';
  document.getElementById('customer-code').value = item?.code || '';
  document.getElementById('customer-email').value = item?.email || '';
  document.getElementById('billing-address').value = item?.billingAddress || '';
  document.getElementById('delivery-address').value = item?.deliveryAddress || '';
  document.getElementById('credit-limit').value = item?.creditLimit || 0;

  window.scrollTo({
    top:0,
    behavior:'smooth'
  });
}

/* ══════════════════════════════════
   Render table
══════════════════════════════════ */
function renderTable(){
  const tbody = document.getElementById('customer-tbody');
  const empty = document.getElementById('empty-state');

  if(!tbody) return;

  if(!FILTERED_CUSTOMERS.length){
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';

  tbody.innerHTML = FILTERED_CUSTOMERS.map((row,index)=>{
    const item = row?.item || {};

    return `
      <tr>
        <td>
          <div style="font-weight:700">${escapeHtml(item?.name || 'Unnamed')}</div>
          <div class="muted" style="font-size:12px;margin-top:4px">
            ${escapeHtml(item?.email || 'No email')}
          </div>
        </td>

        <td>${escapeHtml(item?.code || '—')}</td>

        <td>${fmtCurrency(item?.creditLimit || 0)}</td>

        <td>
          <div style="max-width:240px;white-space:pre-wrap">
            ${escapeHtml(item?.billingAddress || '—')}
          </div>
        </td>

        <td>
          ${
            item?.inactive
            ? '<span class="pill inactive">Inactive</span>'
            : '<span class="pill">Active</span>'
          }
        </td>

        <td>
          <button class="mini-btn" onclick="useCustomer(${index})">
            Use
          </button>
        </td>
      </tr>
    `;
  }).join('');
}

/* ══════════════════════════════════
   render(items)
══════════════════════════════════ */
function render(items) {
  const app = document.getElementById('app');

  ALL_CUSTOMERS = Array.isArray(items) ? items : [];
  FILTERED_CUSTOMERS = [...ALL_CUSTOMERS];

  const total = ALL_CUSTOMERS.length;

  const activeCount = ALL_CUSTOMERS.filter(x => !x?.item?.inactive).length;
  const inactiveCount = ALL_CUSTOMERS.filter(x => x?.item?.inactive).length;

  const emailCount = ALL_CUSTOMERS.filter(x => x?.item?.email).length;

  if(!total){
    app.innerHTML = `
      <div class="card">
        <div class="empty">
          <div style="font-size:48px;margin-bottom:10px">📭</div>
          <h2 style="margin-bottom:8px">No customers found</h2>
          <p class="muted">
            Use the quick-add form below to create your first customer directly from the invoice workflow.
          </p>
        </div>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div class="invoice-banner">
      <div>
        <strong>Invoice Form Integration</strong>
        This extension adds a customer quick-create workflow designed for the
        <strong>Create Sales Invoice</strong> screen in Manager.io.
      </div>

      <button class="floating-add-btn" onclick="document.getElementById('customer-name').focus()">
        ➕ Add Customer
      </button>
    </div>

    <div class="layout">

      <!-- LEFT PANEL -->
      <div class="card">

        <div class="card-header">
          <div>
            <div class="card-title">
              Quick Add Customer
            </div>

            <div class="card-sub">
              Add customers directly while creating a new invoice
            </div>
          </div>
        </div>

        <div class="form-wrap">

          <form id="customer-form" onsubmit="event.preventDefault(); createCustomer();">

            <div class="grid">

              <div class="field full">
                <label>Customer Name *</label>
                <input
                  id="customer-name"
                  type="text"
                  placeholder="Enter customer name"
                  required
                >
              </div>

              <div class="field">
                <label>Customer Code</label>
                <input
                  id="customer-code"
                  type="text"
                  placeholder="Optional code"
                >
              </div>

              <div class="field">
                <label>Email</label>
                <input
                  id="customer-email"
                  type="email"
                  placeholder="customer@example.com"
                >
              </div>

              <div class="field full">
                <label>Billing Address</label>
                <textarea
                  id="billing-address"
                  placeholder="Billing address"
                ></textarea>

```
          </div>

          <div class="field full">
            <label>Delivery Address</label>
            <textarea
              id="delivery-address"
              placeholder="Delivery address"
            ></textarea>
          </div>

          <div class="field">
            <label>Credit Limit</label>
            <input
              id="credit-limit"
              type="number"
              step="0.01"
              min="0"
              value="0"
            >
          </div>

        </div>

        <div class="actions">
          <button type="submit" class="primary-btn" id="save-btn">
            ➕ Create Customer
          </button>

          <button
            type="button"
            class="secondary-btn"
            onclick="document.getElementById('customer-form').reset()"
          >
            Reset
          </button>
        </div>

        <div class="success" id="success-box" style="display:none"></div>

        <div class="helper">
          After creating a customer, reload or refresh the invoice customer
          dropdown in Manager.io to select the newly created customer.
        </div>

      </form>

    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="card">

    <div class="stats">

      <div class="stat">
        <div class="stat-label">Total Customers</div>
        <div class="stat-value">
          ${total.toLocaleString()}
        </div>
      </div>

      <div class="stat">
        <div class="stat-label">Active</div>
        <div class="stat-value">
          ${activeCount.toLocaleString()}
        </div>
      </div>

      <div class="stat">
        <div class="stat-label">Inactive</div>
        <div class="stat-value">
          ${inactiveCount.toLocaleString()}
        </div>
      </div>

      <div class="stat">
        <div class="stat-label">With Email</div>
        <div class="stat-value">
          ${emailCount.toLocaleString()}
        </div>
      </div>

    </div>

    <div class="toolbar">
      <div class="search">
        <input
          id="search-input"
          type="text"
          placeholder="Search customers…"
          oninput="applySearch()"
        >
      </div>
    </div>

    <div class="table-wrap">

      <table>
        <thead>
          <tr>
            <th>Customer</th>
            <th>Code</th>
            <th>Credit Limit</th>
            <th>Billing Address</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>

        <tbody id="customer-tbody"></tbody>
      </table>

      <div id="empty-state" class="empty" style="display:none">
        No matching customers found.
      </div>

    </div>

  </div>

</div>
```

`;

renderTable();
} </script>

</body>
</html>
