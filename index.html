<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager.io Customer Quick Add</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#ffffff;
  --panel:#ffffff;
  --panel-soft:#f6f8fa;
  --border:#d0d7de;
  --text:#24292f;
  --muted:#57606a;
  --blue:#0969da;
  --blue-soft:#ddf4ff;
  --green:#1a7f37;
  --green-soft:#dafbe1;
  --red:#cf222e;
  --red-soft:#ffebe9;
  --shadow:0 8px 24px rgba(140,149,159,.15);
}

body{
  font-family:system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:20px;
}

.ctrl-bar{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  padding:12px 16px;
  margin-bottom:18px;
  background:#f6f8fa;
  border:1px solid #d0d7de;
  border-radius:12px;
  box-shadow:var(--shadow);
}

.load-btn{
  padding:8px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  font-weight:700;
  background:#0969da;
  color:#fff;
}

.load-btn:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.prog-wrap{
  flex:1;
  min-width:100px;
  height:5px;
  background:#d0d7de;
  border-radius:3px;
  overflow:hidden;
}

.prog-bar{
  height:100%;
  width:0%;
  background:#0969da;
  transition:width .25s;
}

.status-txt{
  font-size:12px;
  color:#57606a;
  white-space:nowrap;
}

.err-box{
  color:#cf222e;
  background:#fff8f8;
  border:1px solid #ffcecb;
  border-radius:10px;
  padding:14px 16px;
  margin-bottom:16px;
}

.hero{
  background:linear-gradient(180deg,#fff,#f6f8fa);
  border:1px solid var(--border);
  border-radius:18px;
  padding:26px;
  margin-bottom:20px;
  box-shadow:var(--shadow);
}

.hero h1{
  font-size:28px;
  margin-bottom:8px;
}

.hero p{
  color:var(--muted);
  line-height:1.6;
}

.layout{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:20px;
}

.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  padding:22px;
  box-shadow:var(--shadow);
}

.card h2{
  margin-bottom:18px;
  font-size:20px;
}

.field{
  margin-bottom:18px;
}

.field label{
  display:block;
  margin-bottom:8px;
  font-size:12px;
  font-weight:700;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.08em;
}

.customer-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
}

select,input{
  width:100%;
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  color:var(--text);
  font-size:14px;
  outline:none;
}

select:focus,input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 4px rgba(9,105,218,.1);
}

.add-btn{
  padding:0 16px;
  border:none;
  border-radius:10px;
  background:var(--blue);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

.validation{
  border-radius:12px;
  padding:14px;
  font-size:14px;
  line-height:1.5;
  border:1px solid transparent;
}

.validation.info{
  background:var(--blue-soft);
  border-color:#9cd7ff;
  color:#0969da;
}

.validation.success{
  background:var(--green-soft);
  border-color:#95d8a6;
  color:#1a7f37;
}

.validation.error{
  background:var(--red-soft);
  border-color:#ffb3ad;
  color:#cf222e;
}

.table-wrap{
  overflow:auto;
  border:1px solid var(--border);
  border-radius:14px;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:720px;
}

thead{
  background:#f6f8fa;
}

th{
  text-align:left;
  padding:14px 16px;
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.08em;
  border-bottom:1px solid var(--border);
}

td{
  padding:14px 16px;
  border-bottom:1px solid #eef1f4;
  vertical-align:top;
  font-size:14px;
}

tbody tr:hover{
  background:#fafbfc;
}

.tag{
  display:inline-flex;
  align-items:center;
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}

.tag.readonly{
  background:#ddf4ff;
  color:#0969da;
}

.tag.valid{
  background:#dafbe1;
  color:#1a7f37;
}

.modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.35);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:999;
}

.modal{
  width:100%;
  max-width:520px;
  background:#fff;
  border-radius:20px;
  border:1px solid var(--border);
  overflow:hidden;
  box-shadow:0 25px 80px rgba(0,0,0,.2);
}

.modal-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 24px;
  border-bottom:1px solid var(--border);
}

.modal-body{
  padding:24px;
}

.close-btn{
  border:none;
  background:none;
  font-size:24px;
  cursor:pointer;
  color:var(--muted);
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:20px;
}

.btn-secondary{
  border:1px solid var(--border);
  background:#fff;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
}

.btn-primary{
  border:none;
  background:#0969da;
  color:#fff;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.helper{
  margin-top:8px;
  color:var(--muted);
  font-size:12px;
  line-height:1.5;
}

.empty{
  text-align:center;
  padding:60px 20px;
  border:1px solid var(--border);
  border-radius:16px;
  background:#fff;
}

@media(max-width:960px){
  .layout{
    grid-template-columns:1fr;
  }

  .customer-row{
    grid-template-columns:1fr;
  }
}
</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch data from Manager</span>
</div>

<div id="app"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getCustomerBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {
  const btn = document.getElementById('load-btn');
  const bar = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app = document.getElementById('app');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';
  app.innerHTML = '';

  try{
    const items = await getCustomerBatch((loaded,total,page)=>{
      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()} records`
        : `Page ${page} · ${loaded.toLocaleString()} records loaded…`;

      if(total){
        bar.style.width = Math.min(95,Math.round(loaded/total*100)) + '%';
      }
    });

    bar.style.width = '100%';
    status.textContent = `✓ ${items.length.toLocaleString()} records loaded`;
    btn.textContent = '↺ Reload';
    btn.disabled = false;

    render(items);

  }catch(err){
    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry';
    btn.disabled = false;

    app.innerHTML = `
      <div class="err-box">
        ⚠ ${escapeHtml(err.message)}
        <br><small>Make sure this is running inside Manager.io</small>
      </div>
    `;
  }
}

function escapeHtml(str){
  return String(str ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}

function getCustomerName(item,index){
  return (
    item?.name ??
    item?.displayName ??
    item?.customerName ??
    item?.fullName ??
    item?.email ??
    `Customer ${index+1}`
  );
}

function getCustomerId(item,index){
  return (
    item?.id ??
    item?._links?.self?.href ??
    `customer-${index+1}`
  );
}

/* ══════════════════════════════════
   render(items)
══════════════════════════════════ */
function render(items){
  const app = document.getElementById('app');

  if(!Array.isArray(items) || items.length === 0){
    app.innerHTML = `
      <div class="empty">
        <h2>No Customer Records Found</h2>
        <p style="margin-top:10px;color:#57606a;">
          The API returned zero customer records.
        </p>
      </div>
    `;
    return;
  }

  const customers = items.map((item,index)=>({
    id:getCustomerId(item,index),
    name:getCustomerName(item,index),
    self:item?._links?.self?.href ?? '—',
    schema:item?._links?.describedBy?.href ?? '—',
    create:item?._actions?.create?.href ?? '—'
  }));

  app.innerHTML = `
    <div class="hero">
      <h1>Sales Invoice Customer Quick Add</h1>
      <p>
        Add a quick-add button beside the customer dropdown inside the sales invoice form.
        This extension validates customer information and prepares records locally.
        Because this extension is restricted to GET-only operations, direct database writes are disabled.
      </p>
    </div>

    <div class="layout">

      <div class="card">

        <h2>Sales Invoice Form</h2>

        <div class="field">
          <label>Customer</label>

          <div class="customer-row">

            <select id="customer-select">
              <option value="">Select Customer</option>

              ${customers.map(customer=>`
                <option value="${escapeHtml(customer.id)}">
                  ${escapeHtml(customer.name)}
                </option>
              `).join('')}

            </select>

            <button class="add-btn" id="open-modal-btn">
              + Add Customer
            </button>

          </div>

          <div class="helper">
            Button placement simulates the Manager.io sales invoice customer selector layout.
          </div>
        </div>

        <div class="field">
          <label>Invoice Reference</label>
          <input type="text" placeholder="INV-1001">
        </div>

        <div class="validation info" id="validation-box">
          Waiting for customer selection.
        </div>

      </div>

      <div class="card">

        <h2>Customer Database Preview</h2>

        <div class="table-wrap">

          <table>

            <thead>
              <tr>
                <th>Customer</th>
                <th>Self Endpoint</th>
                <th>Create Endpoint</th>
                <th>Status</th>
              </tr>
            </thead>

            <tbody id="table-body"></tbody>

          </table>

        </div>

      </div>

    </div>

    <div class="modal-backdrop" id="modal-backdrop">

      <div class="modal">

        <div class="modal-head">
          <h3>Quick Add Customer</h3>
          <button class="close-btn" id="close-btn">×</button>
        </div>

        <div class="modal-body">

          <div class="field">
            <label>Customer Name</label>
            <input type="text" id="new-name" placeholder="Customer name">
          </div>

          <div class="field">
            <label>Email Address</label>
            <input type="email" id="new-email" placeholder="customer@example.com">
          </div>

          <div class="field">
            <label>Company</label>
            <input type="text" id="new-company" placeholder="Optional company">
          </div>

          <div class="validation info" id="modal-validation">
            Enter customer details for validation.
          </div>

          <div class="modal-actions">
            <button class="btn-secondary" id="cancel-btn">Cancel</button>
            <button class="btn-primary" id="validate-btn">Validate</button>
          </div>

        </div>

      </div>

    </div>
  `;

  const tableBody = document.getElementById('table-body');

  tableBody.innerHTML = customers.map(customer=>`
    <tr>
      <td><strong>${escapeHtml(customer.name)}</strong></td>

      <td style="max-width:220px;word-break:break-all;color:#57606a;">
        ${escapeHtml(customer.self)}
      </td>

      <td style="max-width:220px;word-break:break-all;color:#57606a;">
        ${escapeHtml(customer.create)}
      </td>

      <td>
        <span class="tag valid">VALID</span>
        <span class="tag readonly">GET ONLY</span>
      </td>
    </tr>
  `).join('');

  const customerSelect = document.getElementById('customer-select');
  const validationBox = document.getElementById('validation-box');

  customerSelect.addEventListener('change',()=>{
    const value = customerSelect.value;

    if(!value){
      validationBox.className = 'validation error';
      validationBox.textContent = 'Please select a customer.';
      return;
    }

    const customer = customers.find(c=>c.id === value);

    validationBox.className = 'validation success';
    validationBox.innerHTML = `
      Customer <strong>${escapeHtml(customer?.name ?? 'Unknown')}</strong>
      validated successfully for invoice usage.
    `;
  });

  const modalBackdrop = document.getElementById('modal-backdrop');
  const openModalBtn = document.getElementById('open-modal-btn');
  const closeBtn = document.getElementById('close-btn');
  const cancelBtn = document.getElementById('cancel-btn');
  const validateBtn = document.getElementById('validate-btn');
  const modalValidation = document.getElementById('modal-validation');

  function closeModal(){
    modalBackdrop.style.display = 'none';
  }

  function openModal(){
    modalBackdrop.style.display = 'flex';
  }

  openModalBtn.addEventListener('click',openModal);
  closeBtn.addEventListener('click',closeModal);
  cancelBtn.addEventListener('click',closeModal);

  modalBackdrop.addEventListener('click',(e)=>{
    if(e.target === modalBackdrop){
      closeModal();
    }
  });

  validateBtn.addEventListener('click',()=>{

    const name = document.getElementById('new-name').value.trim();
    const email = document.getElementById('new-email').value.trim();
    const company = document.getElementById('new-company').value.trim();

    if(!name){
      modalValidation.className = 'validation error';
      modalValidation.textContent = 'Customer name is required.';
      return;
    }

    if(name.length < 2){
      modalValidation.className = 'validation error';
      modalValidation.textContent = 'Customer name must contain at least 2 characters.';
      return;
    }

    if(email && !/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email)){
      modalValidation.className = 'validation error';
      modalValidation.textContent = 'Please enter a valid email address.';
      return;
    }

    const duplicate = customers.some(customer =>
      customer.name.toLowerCase() === name.toLowerCase()
    );

    if(duplicate){
      modalValidation.className = 'validation error';
      modalValidation.textContent = 'A customer with this name already exists.';
      return;
    }

    modalValidation.className = 'validation success';

    modalValidation.innerHTML = `
      Customer passed validation successfully.<br><br>
      <strong>Name:</strong> ${escapeHtml(name)}<br>
      <strong>Email:</strong> ${escapeHtml(email || 'Not provided')}<br>
      <strong>Company:</strong> ${escapeHtml(company || 'Not provided')}<br><br>

      This extension is restricted to GET-only operations,
      so database write operations are disabled by Manager.io extension rules.
    `;
  });
}
</script>

</body>
</html>
