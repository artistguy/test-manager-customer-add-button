<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager.io Customer Quick Add Extension</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  :root{
    --bg:#ffffff;
    --panel:#ffffff;
    --panel-soft:#f6f8fa;
    --border:#d0d7de;
    --text:#24292f;
    --muted:#57606a;
    --primary:#0969da;
    --primary-hover:#0550ae;
    --danger:#cf222e;
    --success:#1a7f37;
    --shadow:0 2px 8px rgba(0,0,0,.05);
  }

  body {
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:20px;
  }

  .ctrl-bar {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:12px 16px;
    margin-bottom:18px;
    background:var(--panel-soft);
    border:1px solid var(--border);
    border-radius:12px;
    box-shadow:var(--shadow);
  }

  .load-btn {
    padding:9px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    background:var(--primary);
    color:#fff;
    transition:.15s;
  }

  .load-btn:hover:not(:disabled){
    background:var(--primary-hover);
  }

  .load-btn:disabled {
    opacity:.45;
    cursor:not-allowed;
  }

  .prog-wrap {
    flex:1;
    min-width:120px;
    height:6px;
    background:#d8dee4;
    border-radius:999px;
    overflow:hidden;
  }

  .prog-bar {
    height:100%;
    width:0%;
    background:var(--primary);
    border-radius:999px;
    transition:width .25s;
  }

  .status-txt {
    font-size:12px;
    color:var(--muted);
    white-space:nowrap;
  }

  .err-box {
    color:var(--danger);
    background:#fff8f8;
    border:1px solid #ffcecb;
    border-radius:10px;
    padding:14px 16px;
    font-size:13px;
    margin-bottom:16px;
  }

  .layout{
    display:grid;
    grid-template-columns:380px 1fr;
    gap:20px;
    align-items:start;
  }

  @media (max-width:980px){
    .layout{
      grid-template-columns:1fr;
    }
  }

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px;
    box-shadow:var(--shadow);
  }

  .card-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:14px;
  }

  .card-sub{
    color:var(--muted);
    font-size:13px;
    margin-bottom:16px;
    line-height:1.45;
  }

  .field{
    margin-bottom:14px;
  }

  .field label{
    display:block;
    margin-bottom:6px;
    font-size:12px;
    color:var(--muted);
    font-weight:700;
    letter-spacing:.02em;
    text-transform:uppercase;
  }

  .field input,
  .field textarea,
  .field select{
    width:100%;
    border:1px solid var(--border);
    border-radius:10px;
    padding:11px 12px;
    background:#fff;
    color:var(--text);
    font-size:14px;
    transition:border-color .15s, box-shadow .15s;
  }

  .field textarea{
    min-height:82px;
    resize:vertical;
  }

  .field input:focus,
  .field textarea:focus,
  .field select:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(9,105,218,.12);
  }

  .inline{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }

  @media (max-width:600px){
    .inline{
      grid-template-columns:1fr;
    }
  }

  .toolbar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:6px;
  }

  .btn{
    border:none;
    border-radius:10px;
    padding:11px 14px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    transition:.15s;
  }

  .btn-primary{
    background:var(--primary);
    color:#fff;
  }

  .btn-primary:hover:not(:disabled){
    background:var(--primary-hover);
  }

  .btn-secondary{
    background:#f3f4f6;
    color:#111827;
    border:1px solid var(--border);
  }

  .btn-secondary:hover{
    background:#eaeef2;
  }

  .btn:disabled{
    opacity:.55;
    cursor:not-allowed;
  }

  .invoice-toolbar{
    display:flex;
    gap:10px;
    align-items:end;
    margin-bottom:18px;
    flex-wrap:wrap;
  }

  .invoice-customer{
    flex:1;
    min-width:260px;
  }

  .quick-add-btn{
    height:44px;
    white-space:nowrap;
  }

  .stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:12px;
    margin-bottom:18px;
  }

  .stat{
    background:var(--panel-soft);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
  }

  .stat .label{
    color:var(--muted);
    font-size:12px;
    margin-bottom:6px;
  }

  .stat .value{
    font-size:22px;
    font-weight:800;
  }

  .table-wrap{
    overflow:auto;
    border:1px solid var(--border);
    border-radius:14px;
  }

  table{
    width:100%;
    border-collapse:collapse;
    min-width:860px;
  }

  thead{
    background:#f6f8fa;
  }

  th{
    text-align:left;
    padding:13px 14px;
    border-bottom:1px solid var(--border);
    color:var(--muted);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.03em;
  }

  td{
    padding:14px;
    border-bottom:1px solid #eaeef2;
    font-size:14px;
    vertical-align:top;
  }

  tbody tr:hover{
    background:#fafbfc;
  }

  .pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
  }

  .pill-active{
    background:#dafbe1;
    color:#116329;
  }

  .pill-inactive{
    background:#ffebe9;
    color:#cf222e;
  }

  .search-row{
    display:flex;
    gap:10px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }

  .search-row input{
    flex:1;
    min-width:220px;
  }

  .empty-state{
    border:1px dashed var(--border);
    background:#fafbfc;
    padding:40px 20px;
    border-radius:14px;
    text-align:center;
    color:var(--muted);
  }

  .toast{
    position:fixed;
    right:20px;
    bottom:20px;
    min-width:260px;
    padding:14px 16px;
    border-radius:12px;
    color:#fff;
    font-size:14px;
    font-weight:700;
    box-shadow:0 10px 30px rgba(0,0,0,.18);
    z-index:9999;
    opacity:0;
    transform:translateY(20px);
    pointer-events:none;
    transition:.2s;
  }

  .toast.show{
    opacity:1;
    transform:translateY(0);
  }

  .toast.success{
    background:var(--success);
  }

  .toast.error{
    background:var(--danger);
  }

  .small{
    font-size:12px;
    color:var(--muted);
  }

  .section-divider{
    height:1px;
    background:#eaeef2;
    margin:18px 0;
  }
</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch data from Manager</span>
</div>

<div id="app"></div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getCustomerBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Global state
══════════════════════════════════ */
let CUSTOMER_CACHE = [];
let FILTERED_CACHE = [];
let SELECTED_CUSTOMER = null;

/* ══════════════════════════════════
   Toast notifications
══════════════════════════════════ */
function showToast(message, type='success'){
  const toast = document.getElementById('toast');

  toast.textContent = message;
  toast.className = 'toast ' + type + ' show';

  setTimeout(() => {
    toast.classList.remove('show');
  }, 3200);
}

/* ══════════════════════════════════
   Formatters
══════════════════════════════════ */
function fmtCurrency(v){
  return '$' + Number(v || 0).toLocaleString(undefined,{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  });
}

function escapeHtml(str=''){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

/* ══════════════════════════════════
   Customer create (WRITE capability)
══════════════════════════════════ */
async function createCustomer(){
  const btn = document.getElementById('create-btn');

  const payload = {
    name: document.getElementById('cust-name')?.value?.trim() || '',
    code: document.getElementById('cust-code')?.value?.trim() || null,
    email: document.getElementById('cust-email')?.value?.trim() || null,
    billingAddress: document.getElementById('cust-billing')?.value?.trim() || '',
    deliveryAddress: document.getElementById('cust-delivery')?.value?.trim() || '',
    creditLimit: Number(document.getElementById('cust-credit')?.value || 0),
    inactive: document.getElementById('cust-inactive')?.checked || false
  };

  if(!payload.name){
    showToast('Customer name is required','error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating…';

  try{
    /* Try common Manager.io write patterns */
    let response = null;

    try{
      response = await postMessageWithResponse({
        type:'api-request',
        method:'POST',
        path:'/api4/customer',
        body:payload
      });
    }catch(primaryError){

      /* Fallback */
      response = await postMessageWithResponse({
        type:'api-request',
        method:'PUT',
        path:'/api4/customer',
        body:payload
      });
    }

    showToast('Customer created successfully');

    document.getElementById('customer-form').reset();

    await loadAllRecords();

    return response;

  }catch(err){
    console.error(err);
    showToast('Unable to create customer: ' + (err?.message || 'Unknown error'),'error');
  }finally{
    btn.disabled = false;
    btn.textContent = '➕ Create Customer';
  }
}

/* ══════════════════════════════════
   Simulated invoice customer attach
══════════════════════════════════ */
async function attachCustomerToInvoice(){
  const customerKey = document.getElementById('invoice-customer-select')?.value;

  if(!customerKey){
    showToast('Select a customer first','error');
    return;
  }

  const customer = CUSTOMER_CACHE.find(c => c.key === customerKey);

  try{
    await postMessageWithResponse({
      type:'api-request',
      method:'GET',
      path:'/api4/sales-invoice-batch?PageSize=50'
    });

    SELECTED_CUSTOMER = customer;

    showToast(
      'Customer "' + (customer?.item?.name || 'Unknown') + '" attached to invoice'
    );

  }catch(err){
    showToast('Unable to access invoice endpoint','error');
  }
}

/* ══════════════════════════════════
   Search filtering
══════════════════════════════════ */
function filterCustomers(){
  const q = document.getElementById('search-input')?.value?.toLowerCase()?.trim() || '';

  FILTERED_CACHE = CUSTOMER_CACHE.filter(record => {
    const item = record?.item || {};

    return (
      item?.name?.toLowerCase()?.includes(q) ||
      item?.email?.toLowerCase()?.includes(q) ||
      item?.billingAddress?.toLowerCase()?.includes(q) ||
      item?.code?.toLowerCase()?.includes(q)
    );
  });

  renderTable();
}

/* ══════════════════════════════════
   Customer table render
══════════════════════════════════ */
function renderTable(){
  const tbody = document.getElementById('customer-table-body');

  if(!tbody) return;

  if(!FILTERED_CACHE.length){
    tbody.innerHTML = `
      <tr>
        <td colspan="7">
          <div class="empty-state">
            No matching customers found.
          </div>
        </td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = FILTERED_CACHE.map(record => {
    const item = record?.item || {};

    return `
      <tr>
        <td>
          <strong>${escapeHtml(item?.name || 'Unnamed')}</strong>
          <div class="small">${escapeHtml(item?.code || 'No code')}</div>
        </td>

        <td>${escapeHtml(item?.email || '—')}</td>

        <td>
          <div style="max-width:240px;white-space:pre-wrap">
            ${escapeHtml(item?.billingAddress || '—')}
          </div>
        </td>

        <td>${fmtCurrency(item?.creditLimit || 0)}</td>

        <td>${item?.currency || 'Default'}</td>

        <td>
          ${
            item?.inactive
              ? '<span class="pill pill-inactive">Inactive</span>'
              : '<span class="pill pill-active">Active</span>'
          }
        </td>

        <td>
          <button class="btn btn-secondary" onclick="selectCustomer('${record?.key || ''}')">
            Use
          </button>
        </td>
      </tr>
    `;
  }).join('');
}

/* ══════════════════════════════════
   Select customer into invoice
══════════════════════════════════ */
function selectCustomer(key){
  const select = document.getElementById('invoice-customer-select');

  if(select){
    select.value = key;
    attachCustomerToInvoice();
  }
}

/* ══════════════════════════════════
   Quick add toggle
══════════════════════════════════ */
function focusQuickAdd(){
  document.getElementById('cust-name')?.focus();

  window.scrollTo({
    top:0,
    behavior:'smooth'
  });
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';
  app.innerHTML = '';

  try {
    const items = await getCustomerBatch((loaded, total, page) => {
      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()} records`
        : `Page ${page} · ${loaded.toLocaleString()} records loaded…`;

      if (total) {
        bar.style.width = Math.min(95, Math.round(loaded / total * 100)) + '%';
      }
    });

    bar.style.width = '100%';
    status.textContent = `✓ ${items.length.toLocaleString()} customer records loaded`;
    btn.textContent = '↺ Reload';
    btn.disabled = false;

    CUSTOMER_CACHE = items;
    FILTERED_CACHE = [...items];

    render(items);

  } catch (err) {
    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry';
    btn.disabled = false;

    app.innerHTML = `
      <div class="err-box">
        <strong>⚠ Failed to load customer records</strong><br><br>
        ${escapeHtml(err.message)}<br><br>
        <small>
          Make sure this extension is running inside Manager.io and API access is available.
        </small>
      </div>
    `;
  }
}

/* ══════════════════════════════════
   render(items)
══════════════════════════════════ */
function render(items) {
  const app = document.getElementById('app');

  if(!Array.isArray(items) || !items.length){
    app.innerHTML = `
      <div class="empty-state">
        <h2 style="margin-bottom:10px">No Customers Found</h2>
        <p>
          No customer records were returned from
          <strong>/api4/customer-batch</strong>.
        </p>
      </div>
    `;
    return;
  }

  const activeCount = items.filter(i => !i?.item?.inactive).length;
  const inactiveCount = items.filter(i => i?.item?.inactive).length;

  const totalCredit = items.reduce((sum,record) => {
    return sum + Number(record?.item?.creditLimit || 0);
  },0);

  const customerOptions = items
    .sort((a,b) => {
      const an = a?.item?.name || '';
      const bn = b?.item?.name || '';
      return an.localeCompare(bn);
    })
    .map(record => {
      const item = record?.item || {};

      return `
        <option value="${record?.key || ''}">
          ${escapeHtml(item?.name || 'Unnamed')}
        </option>
      `;
    }).join('');

  app.innerHTML = `
    <div class="layout">

      <!-- Left Panel -->
      <div class="card">

        <div class="card-title">
          ➕ Quick Add Customer
        </div>

        <div class="card-sub">
          Add customers directly from the invoice workflow without leaving the sales invoice form.
        </div>

        <!-- Invoice Customer Selector -->
        <div class="field">
          <label>
            Choose Customer
          </label>

          <div class="invoice-toolbar">

            <div class="invoice-customer">
              <select id="invoice-customer-select">
                <option value="">Select customer…</option>
                ${customerOptions}
              </select>
            </div>

            <button class="btn btn-primary quick-add-btn" onclick="focusQuickAdd()">
              ➕ Add Customer
            </button>

          </div>
        </div>

        <button class="btn btn-secondary" style="width:100%;margin-bottom:18px" onclick="attachCustomerToInvoice()">
          Attach Selected Customer to Invoice
        </button>

        <div class="section-divider"></div>

        <!-- Customer Create Form -->
        <form id="customer-form" onsubmit="event.preventDefault(); createCustomer();">

          <div class="field">
            <label>Customer Name *</label>
            <input type="text" id="cust-name" placeholder="Acme Corporation" required>
          </div>

          <div class="inline">

            <div class="field">
              <label>Customer Code</label>
              <input type="text" id="cust-code" placeholder="CUST-001">
            </div>

            <div class="field">
              <label>Email</label>
              <input type="email" id="cust-email" placeholder="billing@example.com">
            </div>

          </div>

          <div class="field">
            <label>Billing Address</label>
            <textarea id="cust-billing" placeholder="123 Main Street&#10;City, State ZIP"></textarea>

```
      </div>

      <div class="field">
        <label>Delivery Address</label>
        <textarea id="cust-delivery" placeholder="Optional delivery address"></textarea>
      </div>

      <div class="inline">

        <div class="field">
          <label>Credit Limit</label>
          <input type="number" id="cust-credit" min="0" step="0.01" value="0">
        </div>

        <div class="field">
          <label>Status</label>
          <select id="cust-status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>

      </div>

      <div class="field">
        <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0">
          <input type="checkbox" id="cust-inactive">
          Mark customer as inactive
        </label>
      </div>

      <div class="toolbar">
        <button type="submit" class="btn btn-primary" id="create-btn">
          ➕ Create Customer
        </button>

        <button type="reset" class="btn btn-secondary">
          Reset Form
        </button>
      </div>

    </form>

  </div>

  <!-- Right Panel -->
  <div>

    <!-- Stats -->
    <div class="stats">

      <div class="stat">
        <div class="label">Total Customers</div>
        <div class="value">${items.length.toLocaleString()}</div>
      </div>

      <div class="stat">
        <div class="label">Active Customers</div>
        <div class="value">${activeCount.toLocaleString()}</div>
      </div>

      <div class="stat">
        <div class="label">Inactive Customers</div>
        <div class="value">${inactiveCount.toLocaleString()}</div>
      </div>

      <div class="stat">
        <div class="label">Combined Credit Limit</div>
        <div class="value">${fmtCurrency(totalCredit)}</div>
      </div>

    </div>

    <!-- Table -->
    <div class="card">

      <div class="card-title">
        Customer Directory
      </div>

      <div class="search-row">
        <input
          type="text"
          id="search-input"
          placeholder="Search customers by name, email, code, or address…"
          oninput="filterCustomers()"
        >
      </div>

      <div class="table-wrap">

        <table>

          <thead>
            <tr>
              <th>Customer</th>
              <th>Email</th>
              <th>Billing Address</th>
              <th>Credit Limit</th>
              <th>Currency</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="customer-table-body"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>
```

`;

renderTable();
} </script>

</body>
</html>
