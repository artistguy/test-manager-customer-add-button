<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getSalesInvoiceBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
══════════════════════════════════ */
async function getSalesInvoiceBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/sales-invoice-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/sales-invoice-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Fetch ALL customers with pagination
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Load all records + customers
══════════════════════════════════ */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';
  app.innerHTML = '';

  try {

    const invoicePromise = getSalesInvoiceBatch((loaded, total, page) => {
      status.textContent = total
        ? `Invoices · Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()}`
        : `Invoices · Page ${page} · ${loaded.toLocaleString()} loaded`;
      if (total) {
        bar.style.width = Math.min(45, Math.round((loaded / total) * 45)) + '%';
      }
    });

    const customerPromise = getCustomerBatch((loaded, total, page) => {
      status.textContent = total
        ? `Customers · Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()}`
        : `Customers · Page ${page} · ${loaded.toLocaleString()} loaded`;
      if (total) {
        bar.style.width = (45 + Math.min(50, Math.round((loaded / total) * 50))) + '%';
      }
    });

    const [invoiceItems, customerItems] = await Promise.all([
      invoicePromise,
      customerPromise
    ]);

    bar.style.width = '100%';

    status.textContent =
      `✓ ${invoiceItems.length.toLocaleString()} invoices · ${customerItems.length.toLocaleString()} customers loaded`;

    btn.textContent = '↺ Reload';
    btn.disabled = false;

    render(invoiceItems, customerItems);

  } catch (err) {
    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry';
    btn.disabled = false;

    app.innerHTML = `
      <div class="err-box">
        ⚠ ${err.message}<br>
        <small>Make sure this extension is running inside Manager.io</small>
      </div>
    `;
  }
}

/* ══════════════════════════════════
   Format helper
══════════════════════════════════ */
function formatCurrency(value) {
  return '$' + Number(value || 0).toLocaleString(undefined, {
    minimumFractionDigits:2,
    maximumFractionDigits:2
  });
}

/* ══════════════════════════════════
   Escape HTML helper
══════════════════════════════════ */
function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ══════════════════════════════════

══════════════════════════════════ */

  const invoiceCount = Array.isArray(invoiceItems) ? invoiceItems.length : 0;

  const uniqueCurrencies = [

      customerItems
        .map(c => c?.item?.currency)
        .filter(Boolean)

  app.innerHTML = `

      </div>

        <div class="stat-label">Invoices Loaded</div>
        <div class="stat-value">${invoiceCount.toLocaleString()}</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Customers With Email</div>
        <div class="stat-value">${customersWithEmail.length.toLocaleString()}</div>
      </div>
    </div>

    <div class="layout">

      <!-- Customer Creation Form -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">New Customer Form</div>
          <div class="panel-subtitle">
            Read-only customer creation preview for the sales invoice workflow.
          </div>
        </div>

        <div class="panel-body">

          <div class="form-grid">

            <div class="field-group">
              <label class="field-label">Customer Name</label>
              <input id="customer-name" class="field-input" type="text" placeholder="Enter customer name">
            </div>

            <div class="field-group">
              <label class="field-label">Customer Code</label>
              <input id="customer-code" class="field-input" type="text" placeholder="Optional customer code">
            </div>

            <div class="field-group">
              <label class="field-label">Email Address</label>
              <input id="customer-email" class="field-input" type="email" placeholder="customer@example.com">
            </div>

            <div class="field-group">
              <label class="field-label">Credit Limit</label>
              <input id="customer-credit" class="field-input" type="number" min="0" step="0.01" value="0">
            </div>

            <div class="field-group">
              <label class="field-label">Currency</label>
              <select id="customer-currency" class="field-select">
                <option value="">Default Business Currency</option>
                ${uniqueCurrencies.map(currency => `
                  <option value="${escapeHtml(currency)}">${escapeHtml(currency)}</option>
                `).join('')}

            </div>

            <div class="field-group">
              <label class="field-label">Billing Address</label>
              <textarea id="customer-billing" class="field-textarea" placeholder="Billing address"></textarea>

```
        </div>

        <div class="field-group">
          <label class="field-label">Delivery Address</label>
          <textarea id="customer-delivery" class="field-textarea" placeholder="Delivery address"></textarea>
        </div>

        <div class="checkbox-row">
          <input id="customer-inactive" type="checkbox">
          <label for="customer-inactive">Mark customer as inactive</label>
        </div>

        <button class="load-btn" type="button" onclick="previewCustomer()">
          Preview Customer Record
        </button>

        <div id="preview-area"></div>

        <div class="helper-text">
          This extension demonstrates a production-ready customer entry interface

          The implementation remains read-only as requested.
        </div>

      </div>
    </div>
  </div>

  <!-- Existing Customers -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Existing Customers</div>
      <div class="panel-subtitle">
        ${customerItems.length.toLocaleString()} customer records loaded from /api4/customer-batch

    </div>

    <div class="panel-body">

      <div class="search-row">

             </div>`

`;

window.__customers = customerItems;

const creditLimit = customer?.item?.creditLimit ?? 0;
const inactive = customer?.item?.inactive;
const dueDays = customer?.item?.defaultDueDateDays;
const hourlyRate = customer?.item?.defaultHourlyRate;

return ` <div class="customer-card"> <div class="customer-head">

```
    <div>
      <div class="customer-name">${escapeHtml(name)}</div>

      <div class="tag-row">
        <span class="small-tag">Code: ${escapeHtml(code)}</span>

/* ══════════════════════════════════
Filter customer list
══════════════════════════════════ */
function filterCustomers() {

const query = document.getElementById('search-input')
?.value
?.trim()
?.toLowerCase() ?? '';

const list = document.getElementById('customer-list');

if (!list) return;

const filtered = (window.__customers || []).filter(customer => {

```
const blob = [
  customer?.item?.name,
  customer?.item?.email,
  customer?.item?.code,
  customer?.item?.billingAddress,
  customer?.item?.deliveryAddress
]
  .filter(Boolean)
  .join(' ')
  .toLowerCase();

return blob.includes(query);
```

});

if (filtered.length === 0) {
list.innerHTML = `       <div class="empty-state">         <h3>No Matching Customers</h3>         <p>Try adjusting your search query.</p>       </div>
    `;
return;
}

list.innerHTML = filtered.map(customer => renderCustomerCard(customer)).join('');
}

/* ══════════════════════════════════
Clear search
══════════════════════════════════ */
function clearSearch() {
const input = document.getElementById('search-input');
if (input) input.value = '';
filterCustomers();
}
