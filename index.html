<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager.io Customer Quick Create</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  :root{
    --bg:#ffffff;
    --panel:#ffffff;
    --soft:#f6f8fa;
    --border:#d0d7de;
    --text:#24292f;
    --muted:#57606a;
    --blue:#0969da;
    --blueHover:#0550ae;
    --green:#1a7f37;
    --greenBg:#dafbe1;
    --red:#cf222e;
    --redBg:#ffebe9;
    --shadow:0 1px 3px rgba(27,31,36,.08);
  }

  body {
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:20px;
  }

  .ctrl-bar {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:12px 16px;
    margin-bottom:18px;
    background:var(--soft);
    border:1px solid var(--border);
    border-radius:12px;
    box-shadow:var(--shadow);
  }

  .load-btn,
  .primary-btn,
  .secondary-btn {
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    transition:all .15s ease;
  }

  .load-btn,
  .primary-btn {
    padding:10px 18px;
    background:var(--blue);
    color:#fff;
  }

  .load-btn:hover,
  .primary-btn:hover {
    background:var(--blueHover);
  }

  .load-btn:disabled,
  .primary-btn:disabled {
    opacity:.5;
    cursor:not-allowed;
  }

  .secondary-btn{
    padding:10px 16px;
    background:#fff;
    border:1px solid var(--border);
    color:var(--text);
  }

  .secondary-btn:hover{
    background:var(--soft);
  }

  .prog-wrap {
    flex:1;
    min-width:100px;
    height:5px;
    background:var(--border);
    border-radius:3px;
    overflow:hidden;
  }

  .prog-bar {
    height:100%;
    width:0%;
    background:var(--blue);
    border-radius:3px;
    transition:width .25s;
  }

  .status-txt {
    font-size:12px;
    color:var(--muted);
    white-space:nowrap;
  }

  .err-box {
    color:var(--red);
    background:var(--redBg);
    border:1px solid #ff818266;
    border-radius:10px;
    padding:14px 16px;
    font-size:13px;
    margin-bottom:16px;
  }

  .success-box{
    color:var(--green);
    background:var(--greenBg);
    border:1px solid #2da44e44;
    border-radius:10px;
    padding:14px 16px;
    font-size:13px;
    margin-bottom:16px;
  }

  .layout{
    display:grid;
    grid-template-columns:420px 1fr;
    gap:20px;
    align-items:start;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    box-shadow:var(--shadow);
  }

  .card-header{
    padding:18px 20px 14px;
    border-bottom:1px solid var(--border);
  }

  .card-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:4px;
  }

  .card-sub{
    font-size:13px;
    color:var(--muted);
  }

  .card-body{
    padding:20px;
  }

  .stats-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-bottom:18px;
  }

  .stat{
    background:var(--soft);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px;
  }

  .stat-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--muted);
    margin-bottom:6px;
  }

  .stat-value{
    font-size:22px;
    font-weight:700;
  }

  .form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .field.full{
    grid-column:1/-1;
  }

  .field label{
    font-size:12px;
    font-weight:700;
    color:var(--muted);
  }

  .field input,
  .field textarea{
    width:100%;
    border:1px solid var(--border);
    border-radius:10px;
    padding:11px 12px;
    font-size:14px;
    background:#fff;
    color:var(--text);
    transition:border-color .15s, box-shadow .15s;
  }

  .field input:focus,
  .field textarea:focus{
    outline:none;
    border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(9,105,218,.12);
  }

  .field textarea{
    min-height:90px;
    resize:vertical;
  }

  .helper{
    font-size:11px;
    color:var(--muted);
  }

  .checkbox-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:8px;
  }

  .checkbox-row input{
    width:16px;
    height:16px;
  }

  .actions{
    display:flex;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
  }

  .search-bar{
    margin-bottom:16px;
  }

  .search-input{
    width:100%;
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
    font-size:14px;
  }

  .table-wrap{
    overflow:auto;
    border:1px solid var(--border);
    border-radius:12px;
  }

  table{
    width:100%;
    border-collapse:collapse;
    min-width:700px;
  }

  th{
    position:sticky;
    top:0;
    background:var(--soft);
    border-bottom:1px solid var(--border);
    text-align:left;
    padding:12px;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:var(--muted);
  }

  td{
    padding:12px;
    border-bottom:1px solid #eaeef2;
    font-size:13px;
    vertical-align:top;
  }

  tbody tr:hover{
    background:#f9fbfd;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:5px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
  }

  .badge.active{
    background:#dafbe1;
    color:#1a7f37;
  }

  .badge.inactive{
    background:#fff1e5;
    color:#9a6700;
  }

  .empty{
    text-align:center;
    padding:40px 20px;
    color:var(--muted);
  }

  .muted{
    color:var(--muted);
  }

  .small{
    font-size:12px;
  }

  .mono{
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  }

  @media (max-width: 1000px){
    .layout{
      grid-template-columns:1fr;
    }
  }

  @media (max-width: 680px){
    .stats-grid,
    .form-grid{
      grid-template-columns:1fr;
    }

    body{
      padding:12px;
    }
  }
</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <div class="prog-wrap">
    <div class="prog-bar" id="prog-bar"></div>
  </div>
  <span class="status-txt" id="status-txt">Press Load to fetch customers from Manager.io</span>
</div>

<div id="app"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getCustomerBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Global state
══════════════════════════════════ */
let ALL_CUSTOMERS = [];

/* ══════════════════════════════════
   Utility helpers
══════════════════════════════════ */
function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatMoney(value) {
  const num = Number(value ?? 0);
  return '$' + num.toLocaleString(undefined, {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

/* ══════════════════════════════════
   Create customer using Manager API
══════════════════════════════════ */
async function createCustomer(payload) {
  return await postMessageWithResponse({
    type: 'api-request',
    method: 'POST',
    path: '/api4/customer',
    body: payload
  });
}

/* ══════════════════════════════════
   Handle customer form submission
══════════════════════════════════ */
async function handleCreateCustomer(event) {
  event.preventDefault();

  const form = event.target;
  const submitBtn = document.getElementById('submit-btn');
  const messageBox = document.getElementById('message-box');

  messageBox.innerHTML = '';

  const formData = new FormData(form);

  const payload = {
    name: formData.get('name')?.trim() || '',
    code: formData.get('code')?.trim() || null,
    email: formData.get('email')?.trim() || null,
    billingAddress: formData.get('billingAddress')?.trim() || '',
    deliveryAddress: formData.get('deliveryAddress')?.trim() || '',
    creditLimit: Number(formData.get('creditLimit') || 0),
    inactive: formData.get('inactive') === 'on',

    hasDefaultBillingAddress: !!formData.get('billingAddress')?.trim(),
    defaultBillingAddress: formData.get('billingAddress')?.trim() || '',

    hasDefaultDeliveryAddress: !!formData.get('deliveryAddress')?.trim(),
    defaultDeliveryAddress: formData.get('deliveryAddress')?.trim() || '',

    hasDefaultDueDateDays: false,
    defaultDueDateDays: null,

    hasDefaultHourlyRate: false,
    defaultHourlyRate: 0,

    currency: null,
    division: null,
    controlAccount: null,
    customFields: null
  };

  if (!payload.name) {
    messageBox.innerHTML = `
      <div class="err-box">
        Customer name is required.
      </div>
    `;
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Creating Customer…';

  try {
    await createCustomer(payload);

    messageBox.innerHTML = `
      <div class="success-box">
        ✓ Customer "${escapeHtml(payload.name)}" created successfully.
      </div>
    `;

    form.reset();

    const refreshed = await getCustomerBatch();
    ALL_CUSTOMERS = refreshed;
    renderCustomerTable(refreshed);

  } catch (err) {
    messageBox.innerHTML = `
      <div class="err-box">
        Failed to create customer.<br><br>
        <strong>${escapeHtml(err?.message || 'Unknown error')}</strong>
      </div>
    `;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '＋ Create Customer';
  }
}

/* ══════════════════════════════════
   Customer table rendering
══════════════════════════════════ */
function renderCustomerTable(items) {
  const container = document.getElementById('customer-table-area');
  const search = document.getElementById('search-input')?.value?.toLowerCase()?.trim() || '';

  let filtered = [...items];

  if (search) {
    filtered = filtered.filter(item => {
      const name = item?.item?.name?.toLowerCase?.() || '';
      const email = item?.item?.email?.toLowerCase?.() || '';
      const code = item?.item?.code?.toLowerCase?.() || '';
      const address = item?.item?.billingAddress?.toLowerCase?.() || '';

      return (
        name.includes(search) ||
        email.includes(search) ||
        code.includes(search) ||
        address.includes(search)
      );
    });
  }

  filtered.sort((a, b) => {
    const aName = a?.item?.name || '';
    const bName = b?.item?.name || '';
    return aName.localeCompare(bName);
  });

  if (!filtered.length) {
    container.innerHTML = `
      <div class="empty">
        <div style="font-size:42px;margin-bottom:10px;">📭</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:6px;">
          No matching customers
        </div>
        <div class="small muted">
          Try a different search term or create a new customer.
        </div>
      </div>
    `;
    return;
  }

  container.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Customer</th>
            <th>Email</th>
            <th>Billing Address</th>
            <th>Credit Limit</th>
            <th>Status</th>
            <th>Key</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.map(item => {
            const customer = item?.item || {};
            const key = item?.key || customer?.key || '—';

            return `
              <tr>
                <td>
                  <div style="font-weight:700;">
                    ${escapeHtml(customer?.name || 'Unnamed')}
                  </div>

                  <div class="small muted">
                    ${escapeHtml(customer?.code || 'No code')}
                  </div>
                </td>

                <td>
                  ${customer?.email
                    ? `<span>${escapeHtml(customer.email)}</span>`
                    : `<span class="muted">—</span>`
                  }
                </td>

                <td style="max-width:260px;">
                  ${customer?.billingAddress
                    ? escapeHtml(customer.billingAddress)
                    : '<span class="muted">—</span>'
                  }
                </td>

                <td>
                  ${formatMoney(customer?.creditLimit)}
                </td>

                <td>
                  <span class="badge ${customer?.inactive ? 'inactive' : 'active'}">
                    ${customer?.inactive ? 'Inactive' : 'Active'}
                  </span>
                </td>

                <td class="mono small muted">
                  ${escapeHtml(String(key).slice(0, 18))}…
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

/* ══════════════════════════════════
   render(items)
══════════════════════════════════ */
function render(items) {
  const app = document.getElementById('app');

  ALL_CUSTOMERS = Array.isArray(items) ? items : [];

  const totalCustomers = ALL_CUSTOMERS.length;

  const activeCustomers = ALL_CUSTOMERS.filter(
    x => !x?.item?.inactive
  ).length;

  const inactiveCustomers = ALL_CUSTOMERS.filter(
    x => x?.item?.inactive
  ).length;

  const avgCreditLimit = totalCustomers
    ? ALL_CUSTOMERS.reduce((sum, item) => {
        return sum + Number(item?.item?.creditLimit || 0);
      }, 0) / totalCustomers
    : 0;

  app.innerHTML = `
    <div id="message-box"></div>

    <div class="layout">

      <!-- LEFT COLUMN -->
      <div class="card">

        <div class="card-header">
          <div class="card-title">New Customer</div>
          <div class="card-sub">
            Create a customer directly from the sales invoice workflow.
          </div>
        </div>

        <div class="card-body">

          <form id="customer-form">

            <div class="form-grid">

              <div class="field full">
                <label>Customer Name *</label>
                <input
                  type="text"
                  name="name"
                  maxlength="200"
                  placeholder="Acme Corporation"
                  required
                />
              </div>

              <div class="field">
                <label>Customer Code</label>
                <input
                  type="text"
                  name="code"
                  maxlength="50"
                  placeholder="CUST-001"
                />
              </div>

              <div class="field">
                <label>Email Address</label>
                <input
                  type="email"
                  name="email"
                  placeholder="billing@example.com"
                />
              </div>

              <div class="field">
                <label>Credit Limit</label>
                <input
                  type="number"
                  name="creditLimit"
                  min="0"
                  step="0.01"
                  value="0"
                />
              </div>

              <div class="field">
                <label>Status</label>
                <div class="checkbox-row">
                  <input type="checkbox" name="inactive" id="inactive-check" />
                  <label for="inactive-check" style="margin:0;font-weight:500;color:var(--text);">
                    Mark customer as inactive
                  </label>
                </div>
              </div>

              <div class="field full">
                <label>Billing Address</label>
                <textarea
                  name="billingAddress"
                  placeholder="123 Main Street&#10;Suite 200&#10;Cheyenne, WY 82001"
                ></textarea>

```
          </div>

          <div class="field full">
            <label>Delivery Address</label>
            <textarea
              name="deliveryAddress"
              placeholder="Shipping or delivery address"
            ></textarea>
          </div>

        </div>

        <div class="helper" style="margin-top:14px;">
          Required fields are validated before submission.
        </div>

        <div class="actions">
          <button
            class="primary-btn"
            type="submit"
            id="submit-btn"
          >
            ＋ Create Customer
          </button>

          <button
            class="secondary-btn"
            type="reset"
          >
            Reset Form
          </button>
        </div>

      </form>

    </div>

  </div>

  <!-- RIGHT COLUMN -->
  <div>

    <div class="stats-grid">

      <div class="stat">
        <div class="stat-label">Total Customers</div>
        <div class="stat-value">
          ${totalCustomers.toLocaleString()}
        </div>
      </div>

      <div class="stat">
        <div class="stat-label">Active</div>
        <div class="stat-value">
          ${activeCustomers.toLocaleString()}
        </div>
      </div>

      <div class="stat">
        <div class="stat-label">Avg Credit Limit</div>
        <div class="stat-value" style="font-size:18px;">
          ${formatMoney(avgCreditLimit)}
        </div>
      </div>

    </div>

    <div class="card">

      <div class="card-header">
        <div class="card-title">Customer Directory</div>
        <div class="card-sub">
          Search and review existing customer records.
        </div>
      </div>

      <div class="card-body">

        <div class="search-bar">
          <input
            id="search-input"
            class="search-input"
            type="text"
            placeholder="Search customers by name, code, email, or address…"
          />
        </div>

        <div id="customer-table-area"></div>

      </div>

    </div>

  </div>

</div>
```

`;

document
.getElementById('customer-form')
.addEventListener('submit', handleCreateCustomer);

document
.getElementById('search-input')
.addEventListener('input', () => renderCustomerTable(ALL_CUSTOMERS));

if (!ALL_CUSTOMERS.length) {
document.getElementById('customer-table-area').innerHTML = `       <div class="empty">         <div style="font-size:42px;margin-bottom:10px;">📂</div>         <div style="font-size:16px;font-weight:700;margin-bottom:6px;">
          No customer records found         </div>         <div class="small muted">
          Create your first customer using the form on the left.         </div>       </div>
    `;
} else {
renderCustomerTable(ALL_CUSTOMERS);
}
} </script>

</body>
</html>
