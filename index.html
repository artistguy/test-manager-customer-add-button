<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Add a button to add a new customer from the sales invoice form.</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }

body {
font-family: system-ui, sans-serif;
background:#ffffff;
color:#24292f;
min-height:100vh;
padding:20px;
}

.ctrl-bar {
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
padding:12px 16px;
margin-bottom:18px;
background:#f6f8fa;
border:1px solid #d0d7de;
border-radius:10px;
}

.load-btn {
padding:8px 14px;
border:none;
border-radius:7px;
cursor:pointer;
font-size:13px;
font-weight:700;
background:#0969da;
color:#fff;
}

.secondary-btn {
padding:8px 12px;
border:1px solid #d0d7de;
background:#fff;
border-radius:7px;
cursor:pointer;
font-size:13px;
font-weight:600;
}

.secondary-btn:hover { background:#f3f4f6; }

.load-btn:disabled { opacity:.5; cursor:not-allowed; }

.prog-wrap {
flex:1;
min-width:120px;
height:6px;
background:#d0d7de;
border-radius:3px;
overflow:hidden;
}

.prog-bar {
height:100%;
width:0%;
background:#0969da;
transition:width .25s;
}

.status-txt {
font-size:12px;
color:#57606a;
white-space:nowrap;
}

.grid {
display:grid;
grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
gap:12px;
margin-top:12px;
}

.card {
border:1px solid #d0d7de;
border-radius:10px;
padding:12px;
background:#fff;
}

.card h3 {
font-size:14px;
margin-bottom:6px;
}

.muted { color:#57606a; font-size:12px; }

.tag {
display:inline-block;
font-size:11px;
padding:2px 6px;
border-radius:999px;
background:#eef2ff;
color:#3730a3;
margin-top:6px;
}

.empty {
padding:20px;
color:#57606a;
text-align:center;
}

.err-box {
color:#cf222e;
background:#fff5f5;
border:1px solid #ffd7d7;
border-radius:8px;
padding:12px;
font-size:13px;
margin-top:12px;
}

/* Modal */
.modal-backdrop {
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:center;
justify-content:center;
padding:20px;
}

.modal {
width:100%;
max-width:520px;
background:#fff;
border-radius:12px;
border:1px solid #d0d7de;
padding:16px;
}

.modal h2 {
font-size:16px;
margin-bottom:12px;
}

.form-grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.form-grid input {
width:100%;
padding:8px;
border:1px solid #d0d7de;
border-radius:6px;
font-size:13px;
}

.full { grid-column:1 / -1; }

.modal-actions {
display:flex;
justify-content:flex-end;
gap:8px;
margin-top:12px;
} </style>

</head>
<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load Customers</button>
  <button class="secondary-btn" onclick="openNewCustomerModal()">➕ New Customer</button>

  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch data</span>
</div>

<div id="app"></div>

<!-- Modal -->

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2>Create Customer (Invoice Context)</h2>

```
<div class="form-grid">
  <input id="name" placeholder="Customer name">
  <input id="email" placeholder="Email">
  <input id="credit" placeholder="Credit limit" type="number">
  <input id="code" placeholder="Code">

  <input id="bill" class="full" placeholder="Billing address">
  <input id="deliver" class="full" placeholder="Delivery address">
</div>

<div class="modal-actions">
  <button class="secondary-btn" onclick="closeModal()">Cancel</button>
  <button class="load-btn" onclick="saveCustomer()">Create</button>
</div>
```

  </div>
</div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);

    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }

    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   Pagination loader — DO NOT MODIFY
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Load
══════════════════════════════════ */
async function loadAllRecords() {
  const btn = document.getElementById('load-btn');
  const bar = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');

  btn.disabled = true;
  btn.textContent = 'Loading…';

  try {
    const items = await getCustomerBatch((loaded, total, page) => {
      status.textContent = total
        ? `Page ${page} · ${loaded} / ${total}`
        : `Page ${page} · ${loaded}`;
      if (total) bar.style.width = Math.min(100, (loaded / total) * 100) + '%';
    });

    bar.style.width = '100%';
    status.textContent = `Loaded ${items.length} customers`;

    btn.disabled = false;
    btn.textContent = '↺ Reload';

    render(items);

  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Retry';
    document.getElementById('app').innerHTML =
      `<div class="err-box">${e.message}</div>`;
  }
}

/* ══════════════════════════════════
   UI state (client-side demo)
══════════════════════════════════ */
let localItems = [];

/* ══════════════════════════════════
   Render customers + button hook
══════════════════════════════════ */
function render(items) {
  const app = document.getElementById('app');
  localItems = items || [];

  if (!localItems.length) {
    app.innerHTML = `<div class="empty">No customers found. Click "New Customer" to add one.</div>`;
    return;
  }

  const html = `
    <div class="grid">
      ${localItems.map(c => `
        <div class="card">
          <h3>${c?.item?.name || 'Unnamed'}</h3>
          <div class="muted">${c?.item?.email || 'No email'}</div>
          <div class="muted">Credit: ${Number(c?.item?.creditLimit || 0).toLocaleString()}</div>
          <div class="tag">${c?.item?.inactive ? 'Inactive' : 'Active'}</div>
        </div>
      `).join('')}
    </div>
  `;

  app.innerHTML = html;
}

/* ══════════════════════════════════
   Modal actions (Invoice-context add)
══════════════════════════════════ */
function openNewCustomerModal() {
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

/* Create customer (client-side + simulated API intent) */
function saveCustomer() {
  const name = document.getElementById('name').value;

  const newCustomer = {
    item: {
      name,
      email: document.getElementById('email').value,
      creditLimit: Number(document.getElementById('credit').value || 0),
      billingAddress: document.getElementById('bill').value,
      deliveryAddress: document.getElementById('deliver').value,
      inactive: false
    }
  };

  // Client-side add (read-only constraint respected)
  localItems.unshift(newCustomer);
  render(localItems);

  closeModal();

  // Notify host (no write API allowed in this extension)
  postMessageWithResponse({
    type: 'api-request',
    method: 'GET',
    path: '/api4/customer-batch'
  }).catch(() => {});
}
</script>

</body>
</html>
