<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create Customer Form</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,sans-serif; background:#ffffff; color:#24292f; min-height:100vh; padding:20px; }

.ctrl-bar {
display:flex; align-items:center; gap:10px; flex-wrap:wrap;
padding:12px 16px; margin-bottom:18px;
background:#f6f8fa; border:1px solid #d0d7de; border-radius:10px;
}
.load-btn {
padding:8px 20px; border:none; border-radius:7px; cursor:pointer;
font-size:13px; font-weight:700; background:#0969da; color:#fff;
}
.load-btn:disabled { opacity:.45; cursor:not-allowed; }

.prog-wrap { flex:1; min-width:120px; height:6px; background:#d0d7de; border-radius:4px; overflow:hidden; }
.prog-bar  { height:100%; width:0%; background:#0969da; transition:width .25s; }

.status-txt { font-size:12px; color:#57606a; white-space:nowrap; }

.grid {
display:grid;
grid-template-columns: 360px 1fr;
gap:16px;
}

.card {
border:1px solid #d0d7de;
border-radius:12px;
padding:14px;
background:#fff;
}

.card h3 {
font-size:14px;
margin-bottom:10px;
color:#24292f;
}

label {
font-size:12px;
color:#57606a;
display:block;
margin-top:10px;
margin-bottom:4px;
}

input, textarea, select {
width:100%;
padding:8px 10px;
border:1px solid #d0d7de;
border-radius:8px;
font-size:13px;
outline:none;
}

textarea { min-height:70px; resize:vertical; }

.row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.btn {
margin-top:12px;
padding:10px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:700;
font-size:13px;
background:#1a7f37;
color:#fff;
}

.btn.secondary {
background:#0969da;
}

.table {
width:100%;
border-collapse:collapse;
font-size:13px;
}

.table th, .table td {
border-bottom:1px solid #eaeef2;
padding:8px;
text-align:left;
}

.pill {
display:inline-block;
padding:2px 8px;
border-radius:999px;
font-size:11px;
background:#f6f8fa;
border:1px solid #d0d7de;
}

.err-box {
color:#cf222e;
background:#fff5f5;
border:1px solid #ffd0d0;
border-radius:8px;
padding:12px;
font-size:13px;
}

.muted { color:#57606a; font-size:12px; }

.list-wrap {
max-height:70vh;
overflow:auto;
} </style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load Customers</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Ready</span>
</div>

<div class="grid">

  <!-- FORM -->

  <div class="card">
    <h3>➕ New Customer</h3>

<script>

/* ══════════════════════════════════
   DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   PAGINATION LOOP (UNCHANGED)
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   LOAD
══════════════════════════════════ */
async function loadAllRecords() {
  const btn = document.getElementById('load-btn');
  const bar = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');

  btn.disabled = true;
  status.textContent = "Loading...";

  try {
    const items = await getCustomerBatch((loaded, total, page) => {
      status.textContent = `Page ${page} · ${loaded} loaded`;
      if (total) bar.style.width = Math.min(95, (loaded/total)*100) + '%';
    });

    bar.style.width = '100%';
    status.textContent = `Loaded ${items.length} customers`;

    window.__items = items;
    render(items);

  } catch (e) {
    status.textContent = "Error";
    document.getElementById('list').innerHTML =
      `<div class="err-box">${e.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = "↺ Reload";
}

/* ══════════════════════════════════
   CREATE CUSTOMER (WRITE OP)
══════════════════════════════════ */
async function createCustomer() {
  const status = document.getElementById('form-status');

  const payload = {
    item: {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value || null,
      creditLimit: Number(document.getElementById('creditLimit').value || 0),
      billingAddress: document.getElementById('billingAddress').value || "",
      deliveryAddress: document.getElementById('deliveryAddress').value || "",
      inactive: document.getElementById('inactive').value === "true"
    }
  };

  if (!payload.item.name) {
    status.textContent = "Name is required";
    return;
  }

  try {
    status.textContent = "Creating...";

    await postMessageWithResponse({
      type: 'api-request',
      method: 'POST',
      path: '/api4/customer',
      body: payload
    });

    status.textContent = "✓ Customer created";

    // reload list
    await loadAllRecords();

  } catch (e) {
    status.textContent = "Error: " + e.message;
  }
}

/* ══════════════════════════════════
   RENDER
══════════════════════════════════ */
function render(items) {
  const list = document.getElementById('list');
  const q = (document.getElementById('search')?.value || "").toLowerCase();

  if (!items || items.length === 0) {
    list.innerHTML = "<p class='muted'>No customers loaded</p>";
    return;
  }

  const filtered = items.filter(x => {
    const name = (x?.item?.name || "").toLowerCase();
    return name.includes(q);
  });

  if (filtered.length === 0) {
    list.innerHTML = "<p class='muted'>No matches</p>";
    return;
  }

  let html = `
    <table class="table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Credit</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
  `;

  for (const c of filtered) {
    const i = c?.item || {};
    html += `
      <tr>
        <td>${i.name || "-"}</td>
        <td>${i.email || "-"}</td>
        <td>$${(i.creditLimit || 0).toLocaleString()}</td>
        <td>${i.inactive ? '<span class="pill">Inactive</span>' : '<span class="pill">Active</span>'}</td>
      </tr>
    `;
  }

  html += "</tbody></table>";
  list.innerHTML = html;
}

</script>

</body>
</html>
