<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Customers — Manager.io Extension</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background:#ffffff;
    color:#24292f;
    padding:18px;
  }

  .ctrl-bar {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:12px 14px;
    margin-bottom:14px;
    background:#f6f8fa;
    border:1px solid #d0d7de;
    border-radius:10px;
  }

  .load-btn {
    padding:8px 14px;
    border:none;
    border-radius:8px;
    background:#0969da;
    color:#fff;
    font-weight:600;
    cursor:pointer;
  }

  .load-btn:disabled { opacity:.5; cursor:not-allowed; }

  .prog-wrap {
    flex:1;
    height:6px;
    background:#d0d7de;
    border-radius:4px;
    overflow:hidden;
    min-width:120px;
  }

  .prog-bar {
    height:100%;
    width:0%;
    background:#0969da;
    transition:width .2s;
  }

  .status-txt {
    font-size:12px;
    color:#57606a;
    white-space:nowrap;
  }

  .layout {
    display:grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap:14px;
  }

  .panel {
    border:1px solid #d0d7de;
    border-radius:10px;
    background:#fff;
    overflow:hidden;
  }

  .panel-header {
    padding:10px 12px;
    background:#f6f8fa;
    border-bottom:1px solid #d0d7de;
    font-size:13px;
    font-weight:600;
  }

  .panel-body { padding:12px; }

  .search {
    width:100%;
    padding:8px 10px;
    border:1px solid #d0d7de;
    border-radius:8px;
    margin-bottom:10px;
    font-size:13px;
  }

  table {
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }

  th, td {
    text-align:left;
    padding:8px;
    border-bottom:1px solid #eaeef2;
  }

  tr:hover { background:#f6f8fa; cursor:pointer; }

  .tag {
    font-size:11px;
    padding:2px 6px;
    border-radius:999px;
    background:#eef2f6;
    display:inline-block;
  }

  .form-grid {
    display:grid;
    gap:10px;
  }

  .field label {
    font-size:12px;
    color:#57606a;
    display:block;
    margin-bottom:4px;
  }

  .field input, .field textarea {
    width:100%;
    padding:8px 10px;
    border:1px solid #d0d7de;
    border-radius:8px;
    font-size:13px;
  }

  textarea { min-height:70px; resize:vertical; }

  .row {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .btn {
    padding:9px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    font-size:13px;
  }

  .btn-primary { background:#0969da; color:#fff; }
  .btn-muted { background:#f6f8fa; border:1px solid #d0d7de; }

  .err-box {
    color:#cf222e;
    background:#fff5f5;
    border:1px solid #ffd0d0;
    padding:10px;
    border-radius:8px;
    font-size:13px;
  }

  .empty {
    padding:20px;
    color:#57606a;
    text-align:center;
  }
</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load Customers</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Ready</span>
</div>

<div id="app" class="layout"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);

    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }

    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   pagination — DO NOT MODIFY
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken = null;
  let pageNum = 0;
  let apiTotal = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type:'api-request', method:'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* state */
let CUSTOMER_DATA = [];
let SELECTED_INDEX = null;

/* load */
async function loadAllRecords() {
  const btn = document.getElementById('load-btn');
  const bar = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');

  btn.disabled = true;
  status.textContent = "Loading...";

  try {
    CUSTOMER_DATA = await getCustomerBatch((loaded, total, page) => {
      status.textContent = total
        ? `Page ${page} · ${loaded} / ${total}`
        : `Page ${page} · ${loaded} loaded`;
      if (total) bar.style.width = Math.min(100, (loaded/total)*100) + "%";
    });

    bar.style.width = "100%";
    status.textContent = `Loaded ${CUSTOMER_DATA.length} customers`;
    btn.disabled = false;
    btn.textContent = "↻ Reload";

    render(CUSTOMER_DATA);

  } catch (e) {
    status.textContent = e.message;
    btn.disabled = false;
  }
}

/* helpers */
const get = (c, p) => c?.item?.[p];

function fmtMoney(v) {
  return (v ?? 0).toLocaleString(undefined, { minimumFractionDigits:2 });
}

/* render */
function render(items) {
  const app = document.getElementById("app");

  if (!items || items.length === 0) {
    app.innerHTML = `<div class="empty">No customers found</div>`;
    return;
  }

  const filtered = items;

  const table = `
    <div class="panel">
      <div class="panel-header">Customers (${items.length})</div>
      <div class="panel-body">
        <input class="search" id="search" placeholder="Search name, email..." oninput="filterList()" />

        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Credit</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="rows">
            ${filtered.map((c,i)=>`
              <tr onclick="selectCustomer(${i})">
                <td>${get(c,'name') || '-'}</td>
                <td>${get(c,'email') || '-'}</td>
                <td>${fmtMoney(get(c,'creditLimit'))}</td>
                <td>${get(c,'inactive') ? '<span class="tag">Inactive</span>' : '<span class="tag">Active</span>'}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;

  const form = `
    <div class="panel">
      <div class="panel-header">Customer Editor (local)</div>
      <div class="panel-body">
        <div class="form-grid">

          <div class="field">
            <label>Name</label>
            <input id="f_name" />
          </div>

          <div class="row">
            <div class="field">
              <label>Code</label>
              <input id="f_code" />
            </div>

            <div class="field">
              <label>Email</label>
              <input id="f_email" />
            </div>
          </div>

          <div class="field">
            <label>Billing Address</label>
            <textarea id="f_bill"></textarea>

```
      </div>

      <div class="field">
        <label>Delivery Address</label>
        <textarea id="f_del"></textarea>
      </div>

      <div class="row">
        <div class="field">
          <label>Credit Limit</label>
          <input id="f_credit" type="number" />
        </div>

        <div class="field">
          <label>Inactive</label>
          <input id="f_inactive" type="checkbox" />
        </div>
      </div>

      <button class="btn btn-primary" onclick="saveLocal()">Save (local)</button>
      <button class="btn btn-muted" onclick="clearForm()">Clear</button>

    </div>
  </div>
</div>
```

`;

app.innerHTML = table + form;
}

/* select */
function selectCustomer(i) {
const c = CUSTOMER_DATA[i];
SELECTED_INDEX = i;

document.getElementById("f_name").value = get(c,'name') || "";
document.getElementById("f_code").value = get(c,'code') || "";
document.getElementById("f_email").value = get(c,'email') || "";
document.getElementById("f_bill").value = get(c,'billingAddress') || "";
document.getElementById("f_del").value = get(c,'deliveryAddress') || "";
document.getElementById("f_credit").value = get(c,'creditLimit') || 0;
document.getElementById("f_inactive").checked = !!get(c,'inactive');
}

/* save locally (no API write allowed) */
function saveLocal() {
if (SELECTED_INDEX === null) return;

const c = CUSTOMER_DATA[SELECTED_INDEX];

c.item.name = document.getElementById("f_name").value;
c.item.code = document.getElementById("f_code").value;
c.item.email = document.getElementById("f_email").value;
c.item.billingAddress = document.getElementById("f_bill").value;
c.item.deliveryAddress = document.getElementById("f_del").value;
c.item.creditLimit = Number(document.getElementById("f_credit").value || 0);
c.item.inactive = document.getElementById("f_inactive").checked;

render(CUSTOMER_DATA);
}

/* clear */
function clearForm() {
SELECTED_INDEX = null;
["f_name","f_code","f_email","f_bill","f_del","f_credit"].forEach(id=>{
const el = document.getElementById(id);
if (el) el.value = "";
});
document.getElementById("f_inactive").checked = false;
}

/* filter */
function filterList() {
const q = document.getElementById("search").value.toLowerCase();

const filtered = CUSTOMER_DATA.filter(c => {
return (
(get(c,'name')||"").toLowerCase().includes(q) ||
(get(c,'email')||"").toLowerCase().includes(q) ||
(get(c,'code')||"").toLowerCase().includes(q)
);
});

render(filtered);
} </script>

</body>
</html>
