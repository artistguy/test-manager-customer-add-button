<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager.io Customer Quick Add Extension</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d1117;
  --panel:#161b22;
  --panel2:#1c2128;
  --border:#30363d;
  --text:#e6edf3;
  --muted:#8b949e;
  --blue:#58a6ff;
  --green:#3fb950;
  --red:#f85149;
  --yellow:#d29922;
}

body{
  font-family:system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:20px;
}

.ctrl-bar{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  padding:14px 18px;
  margin-bottom:20px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
}

.load-btn,
.primary-btn,
.secondary-btn,
.danger-btn{
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:700;
  transition:.15s ease;
}

.load-btn{
  padding:10px 20px;
  background:var(--blue);
  color:#fff;
  font-size:13px;
}

.load-btn:hover,
.primary-btn:hover,
.secondary-btn:hover,
.danger-btn:hover{
  transform:translateY(-1px);
  opacity:.92;
}

.load-btn:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.primary-btn{
  background:var(--green);
  color:#fff;
  padding:11px 18px;
}

.secondary-btn{
  background:#21262d;
  color:var(--text);
  border:1px solid var(--border);
  padding:11px 18px;
}

.danger-btn{
  background:var(--red);
  color:#fff;
  padding:11px 18px;
}

.prog-wrap{
  flex:1;
  min-width:120px;
  height:6px;
  background:#30363d;
  border-radius:999px;
  overflow:hidden;
}

.prog-bar{
  height:100%;
  width:0%;
  background:var(--blue);
  border-radius:999px;
  transition:width .25s;
}

.status-txt{
  font-size:12px;
  color:var(--muted);
  white-space:nowrap;
}

.err-box{
  color:#fff;
  background:rgba(248,81,73,.12);
  border:1px solid rgba(248,81,73,.35);
  border-radius:10px;
  padding:14px 16px;
  font-size:13px;
  margin-bottom:16px;
}

.success-box{
  color:#fff;
  background:rgba(63,185,80,.12);
  border:1px solid rgba(63,185,80,.35);
  border-radius:10px;
  padding:14px 16px;
  font-size:13px;
  margin-bottom:16px;
}

.layout{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:20px;
}

.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
}

.panel-header{
  padding:18px 20px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,#1f2630 0%, #161b22 100%);
}

.panel-title{
  font-size:18px;
  font-weight:800;
}

.panel-sub{
  color:var(--muted);
  font-size:13px;
  margin-top:6px;
}

.panel-body{
  padding:20px;
}

.form-grid{
  display:grid;
  gap:16px;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:7px;
}

label{
  font-size:13px;
  font-weight:700;
  color:#c9d1d9;
}

input,
select,
textarea{
  width:100%;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0d1117;
  color:var(--text);
  font-size:14px;
  outline:none;
  transition:border-color .15s;
}

input:focus,
select:focus,
textarea:focus{
  border-color:var(--blue);
}

textarea{
  resize:vertical;
  min-height:80px;
}

.inline-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.error-text{
  font-size:12px;
  color:var(--red);
}

.actions{
  display:flex;
  gap:12px;
  margin-top:8px;
  flex-wrap:wrap;
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:14px;
  margin-bottom:18px;
}

.stat-card{
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
}

.stat-label{
  font-size:12px;
  color:var(--muted);
  margin-bottom:8px;
}

.stat-value{
  font-size:24px;
  font-weight:800;
}

.table-wrap{
  overflow:auto;
  border-radius:12px;
  border:1px solid var(--border);
}

table{
  width:100%;
  border-collapse:collapse;
}

thead{
  background:#1b2330;
}

th{
  text-align:left;
  padding:14px;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.04em;
  color:#8b949e;
  border-bottom:1px solid var(--border);
}

td{
  padding:14px;
  border-bottom:1px solid rgba(48,54,61,.6);
  font-size:14px;
}

tr:hover{
  background:rgba(88,166,255,.04);
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.badge-green{
  background:rgba(63,185,80,.12);
  color:#3fb950;
}

.badge-yellow{
  background:rgba(210,153,34,.12);
  color:#d29922;
}

.search-box{
  margin-bottom:16px;
}

.empty{
  padding:40px 20px;
  text-align:center;
  color:var(--muted);
}

.modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:999;
}

.modal{
  width:min(640px,100%);
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
}

.modal-header{
  padding:18px 20px;
  border-bottom:1px solid var(--border);
}

.modal-body{
  padding:20px;
}

.modal-footer{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  padding:18px 20px;
  border-top:1px solid var(--border);
}

@media (max-width:980px){
  .layout{
    grid-template-columns:1fr;
  }

  .inline-grid{
    grid-template-columns:1fr;
  }
}
</style>

</head>

<body>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getSalesInvoiceBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
══════════════════════════════════ */
async function getSalesInvoiceBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/sales-invoice-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/sales-invoice-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

let STATE = {
  items: [],
  filtered: [],
  selectedInvoice: null
};

/* ══════════════════════════════════
   Utility helpers
══════════════════════════════════ */
function escapeHtml(v){
  return String(v ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function formatDate(value){
  if(!value) return '—';
  const d = new Date(value);
  if(isNaN(d)) return value;
  return d.toLocaleDateString(undefined,{
    year:'numeric',
    month:'short',
    day:'numeric'
  });
}

function formatCurrency(v){
  return new Intl.NumberFormat(undefined,{
    style:'currency',
    currency:'USD',
    minimumFractionDigits:2
  }).format(Number(v || 0));
}

function showMessage(type,msg){
  const wrap = document.getElementById('messages');
  wrap.innerHTML = `
    <div class="${type === 'error' ? 'err-box' : 'success-box'}">
      ${escapeHtml(msg)}
    </div>
  `;

  setTimeout(()=>{
    wrap.innerHTML = '';
  },5000);
}

/* ══════════════════════════════════
   Write operation
══════════════════════════════════ */
async function createCustomer(payload){
  return await postMessageWithResponse({
    type:'api-request',
    method:'POST',
    path:'/api4/customers',
    body:payload
  });
}

/* ══════════════════════════════════
   Modal controls
══════════════════════════════════ */
function openCustomerModal(){
  document.getElementById('customer-modal').style.display = 'flex';
}

function closeCustomerModal(){
  document.getElementById('customer-modal').style.display = 'none';

  [
    'customer-name',
    'customer-email',
    'customer-phone',
    'customer-address',
    'customer-tax',
    'customer-code'
  ].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.value = '';
  });

  [
    'err-customer-name',
    'err-customer-email'
  ].forEach(id=>{
    document.getElementById(id).textContent = '';
  });
}

/* ══════════════════════════════════
   Validation
══════════════════════════════════ */
function validateCustomerForm(){
  let valid = true;

  const name = document.getElementById('customer-name').value.trim();
  const email = document.getElementById('customer-email').value.trim();

  document.getElementById('err-customer-name').textContent = '';
  document.getElementById('err-customer-email').textContent = '';

  if(!name){
    document.getElementById('err-customer-name').textContent = 'Customer name is required';
    valid = false;
  }

  if(email){
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailRegex.test(email)){
      document.getElementById('err-customer-email').textContent = 'Invalid email address';
      valid = false;
    }
  }

  return valid;
}

/* ══════════════════════════════════
   Save customer
══════════════════════════════════ */
async function saveCustomer(){
  if(!validateCustomerForm()) return;

  const btn = document.getElementById('save-customer-btn');

  btn.disabled = true;
  btn.textContent = 'Saving…';

  try{
    const payload = {
      name: document.getElementById('customer-name').value.trim(),
      email: document.getElementById('customer-email').value.trim() || null,
      phone: document.getElementById('customer-phone').value.trim() || null,
      billing_address: document.getElementById('customer-address').value.trim() || null,
      tax_number: document.getElementById('customer-tax').value.trim() || null,
      code: document.getElementById('customer-code').value.trim() || null
    };

    await createCustomer(payload);

    closeCustomerModal();

    showMessage('success','Customer created successfully.');

  }catch(err){
    showMessage('error','Unable to create customer: ' + err.message);
  }finally{
    btn.disabled = false;
    btn.textContent = 'Save Customer';
  }
}

/* ══════════════════════════════════
   Search invoices
══════════════════════════════════ */
function filterInvoices(q){
  q = String(q || '').toLowerCase();

  STATE.filtered = STATE.items.filter(item=>{
    const str = JSON.stringify(item || {}).toLowerCase();
    return str.includes(q);
  });

  renderTable();
}

/* ══════════════════════════════════
   Render table
══════════════════════════════════ */
function renderTable(){
  const tbody = document.getElementById('invoice-tbody');

  if(!tbody) return;

  if(!STATE.filtered.length){
    tbody.innerHTML = `
      <tr>
        <td colspan="6">
          <div class="empty">
            No invoices found
          </div>
        </td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = STATE.filtered.map((item,idx)=>{

    const customer =
      item?.customer?.name ??
      item?.customer_name ??
      item?.name ??
      'Unknown Customer';

    const invoiceNo =
      item?.reference ??
      item?.invoice_number ??
      item?.number ??
      ('INV-' + (idx + 1));

    const amount =
      item?.total ??
      item?.amount ??
      item?.balance ??
      0;

    const status =
      amount > 0
        ? '<span class="badge badge-green">Open</span>'
        : '<span class="badge badge-yellow">Draft</span>';

    return `
      <tr>
        <td>${escapeHtml(invoiceNo)}</td>
        <td>${escapeHtml(customer)}</td>
        <td>${formatDate(item?.date || item?.created_at)}</td>
        <td>${formatCurrency(amount)}</td>
        <td>${status}</td>
        <td>
          <button class="secondary-btn" onclick="editInvoice(${idx})">
            Edit
          </button>
        </td>
      </tr>
    `;
  }).join('');
}

/* ══════════════════════════════════
   Edit invoice
══════════════════════════════════ */
function editInvoice(index){
  const item = STATE.filtered[index];

  STATE.selectedInvoice = item;

  showMessage(
    'success',
    'Invoice selected. You can now add a customer directly from this screen.'
  );
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {

  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';
  app.innerHTML = '';

  try {

    const items = await getSalesInvoiceBatch((loaded, total, page) => {

      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()} records`
        : `Page ${page} · ${loaded.toLocaleString()} records loaded…`;

      if (total) {
        bar.style.width = Math.min(95, Math.round(loaded / total * 100)) + '%';
      }
    });

    bar.style.width = '100%';
    status.textContent = `✓ ${items.length.toLocaleString()} records loaded`;

    btn.textContent = '↺ Reload';
    btn.disabled = false;

    render(items);

  } catch (err) {

    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry';
    btn.disabled = false;

    app.innerHTML = `
      <div class="err-box">
        ⚠ ${escapeHtml(err.message)}
        <br><br>
        <small>
          Make sure this extension is running inside Manager.io
        </small>
      </div>
    `;
  }
}

/* ══════════════════════════════════
   Main render
══════════════════════════════════ */
function render(items){

  STATE.items = Array.isArray(items) ? items : [];
  STATE.filtered = [...STATE.items];

  const app = document.getElementById('app');

  if(!items.length){
    app.innerHTML = `
      <div class="panel">
        <div class="panel-body">
          <div class="empty">
            <h2 style="margin-bottom:12px">No Invoice Records Found</h2>
            <p>No records were returned from /api4/sales-invoice-batch</p>
          </div>
        </div>
      </div>
    `;
    return;
  }

  const total = items.length;

  const totalAmount = items.reduce((a,b)=>{
    return a + Number(
      b?.total ??
      b?.amount ??
      b?.balance ??
      0
    );
  },0);

  const draftCount = items.filter(i=>{
    const amount = Number(i?.total ?? i?.amount ?? 0);
    return amount <= 0;
  }).length;

  app.innerHTML = `
    <div class="layout">

      <!-- LEFT -->
      <div class="panel">

        <div class="panel-header">
          <div class="panel-title">Quick Customer Add</div>
          <div class="panel-sub">
            Create or edit customer records directly from invoice workflow
          </div>
        </div>

        <div class="panel-body">

          <div class="form-grid">

            <div class="form-group">
              <label>Selected Invoice</label>
              <input type="text"
                     readonly
                     value="${escapeHtml(
                       STATE.selectedInvoice?.reference ||
                       STATE.selectedInvoice?.invoice_number ||
                       'No invoice selected'
                     )}">
            </div>

            <div class="form-group">
              <label>Invoice Customer</label>
              <input type="text"
                     readonly
                     value="${escapeHtml(
                       STATE.selectedInvoice?.customer?.name ||
                       STATE.selectedInvoice?.customer_name ||
                       'Not assigned'
                     )}">
            </div>

            <div class="actions">
              <button class="primary-btn" onclick="openCustomerModal()">
                ＋ Add New Customer
              </button>

              <button class="secondary-btn" onclick="loadAllRecords()">
                Refresh Data
              </button>
            </div>

          </div>

        </div>
      </div>

      <!-- RIGHT -->
      <div>

        <div class="stats-grid">

          <div class="stat-card">
            <div class="stat-label">Total Invoices</div>
            <div class="stat-value">${total.toLocaleString()}</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Total Invoice Value</div>
            <div class="stat-value">${formatCurrency(totalAmount)}</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Draft Invoices</div>
            <div class="stat-value">${draftCount.toLocaleString()}</div>
          </div>

        </div>

        <div class="panel">

          <div class="panel-header">
            <div class="panel-title">Invoice Records</div>
            <div class="panel-sub">
              Select an invoice and add customers without leaving the page
            </div>
          </div>

          <div class="panel-body">

            <div class="search-box">
              <input
                type="text"
                placeholder="Search invoices, customer names, references..."
                oninput="filterInvoices(this.value)"
              >
            </div>

            <div class="table-wrap">

              <table>

                <thead>
                  <tr>
                    <th>Invoice</th>
                    <th>Customer</th>
                    <th>Date</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Action</th>
                  </tr>
                </thead>

                <tbody id="invoice-tbody"></tbody>

              </table>

            </div>

          </div>

        </div>

      </div>

    </div>
  `;

  renderTable();
}
</script>

</body>
</html>
