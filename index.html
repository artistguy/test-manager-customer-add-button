<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager.io Customer Quick Add Extension</title>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #ffffff;
    --panel: #f6f8fa;
    --border: #d0d7de;
    --text: #24292f;
    --muted: #57606a;
    --primary: #0969da;
    --primary-hover: #0550ae;
    --success: #1a7f37;
    --danger: #cf222e;
    --shadow: rgba(31,35,40,0.08);
  }

  body {
    font-family: system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  .ctrl-bar {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:12px 16px;
    margin-bottom:18px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    box-shadow: 0 1px 2px var(--shadow);
  }

  .load-btn {
    padding:8px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    background:var(--primary);
    color:#fff;
    transition:all .15s ease;
  }

  .load-btn:hover:not(:disabled) {
    background: var(--primary-hover);
  }

  .load-btn:disabled {
    opacity:.45;
    cursor:not-allowed;
  }

  .prog-wrap {
    flex:1;
    min-width:100px;
    height:6px;
    background:var(--border);
    border-radius:999px;
    overflow:hidden;
  }

  .prog-bar {
    height:100%;
    width:0%;
    background:var(--primary);
    border-radius:999px;
    transition:width .25s;
  }

  .status-txt {
    font-size:12px;
    color:var(--muted);
    white-space:nowrap;
  }

  .err-box {
    color:var(--danger);
    background:#fff5f5;
    border:1px solid #ffb3b3;
    border-radius:10px;
    padding:14px 16px;
    font-size:13px;
    margin-bottom:16px;
    line-height:1.5;
  }

  .app-shell {
    display: grid;
    gap: 18px;
  }

  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 1px 2px var(--shadow);
    overflow: hidden;
  }

  .card-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(to bottom, #ffffff, #f9fafb);
  }

  .card-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .card-subtitle {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
  }

  .card-body {
    padding: 18px;
  }

  .invoice-preview {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
  }

  .invoice-toolbar {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: #f9fafb;
    font-size: 12px;
    color: var(--muted);
  }

  .invoice-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 18px;
    align-items: start;
    padding: 20px;
  }

  .label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    padding-top: 12px;
  }

  .customer-field-wrap {
    display: flex;
    align-items: stretch;
    gap: 10px;
    flex-wrap: wrap;
  }

  .customer-select {
    flex: 1;
    min-width: 280px;
    height: 44px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 14px;
    background: #fff;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color .15s ease;
  }

  .customer-select:focus {
    border-color: var(--primary);
  }

  .quick-add-btn {
    height: 44px;
    padding: 0 16px;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s ease;
    white-space: nowrap;
  }

  .quick-add-btn:hover {
    background: var(--primary-hover);
  }

  .selected-info {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    background: #f6f8fa;
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
  }

  .selected-name {
    color: var(--text);
    font-weight: 700;
    display: block;
    margin-bottom: 4px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
    gap: 14px;
    margin-top: 18px;
  }

  .stat-box {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    background: #fff;
  }

  .stat-label {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 800;
  }

  .customer-list {
    margin-top: 20px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .customer-list-header {
    padding: 12px 16px;
    background: #f9fafb;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 700;
  }

  .customer-scroll {
    max-height: 320px;
    overflow: auto;
  }

  .customer-item {
    padding: 12px 16px;
    border-bottom: 1px solid #eef1f4;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .customer-item:last-child {
    border-bottom: none;
  }

  .customer-name {
    font-size: 14px;
    font-weight: 600;
  }

  .customer-meta {
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
  }

  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 5px 8px;
    border-radius: 999px;
    background: #ddf4ff;
    color: #0969da;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 999;
  }

  .modal-backdrop.open {
    display: flex;
  }

  .modal {
    width: 100%;
    max-width: 540px;
    background: #fff;
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 24px 48px rgba(0,0,0,.18);
  }

  .modal-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(to bottom, #ffffff, #f9fafb);
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
  }

  .modal-subtitle {
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .modal-body {
    padding: 20px;
  }

  .form-grid {
    display: grid;
    gap: 16px;
  }

  .field {
    display: grid;
    gap: 8px;
  }

  .field label {
    font-size: 13px;
    font-weight: 700;
  }

  .field input,
  .field textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    background: #fff;
    color: var(--text);
    outline: none;
    transition: border-color .15s ease;
    font-family: inherit;
  }

  .field input:focus,
  .field textarea:focus {
    border-color: var(--primary);
  }

  .field textarea {
    resize: vertical;
    min-height: 90px;
  }

  .modal-footer {
    padding: 18px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    background: #fafbfc;
  }

  .btn-secondary {
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    cursor: pointer;
    font-weight: 600;
  }

  .btn-primary {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
    font-weight: 700;
  }

  .btn-primary:hover {
    background: var(--primary-hover);
  }

  .btn-primary:disabled {
    opacity: .5;
    cursor: not-allowed;
  }

  .success-box {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #a6e3b1;
    background: #ecfdf3;
    color: var(--success);
    font-size: 13px;
    line-height: 1.5;
  }

  .empty-state {
    padding: 50px 24px;
    text-align: center;
    color: var(--muted);
  }

  .empty-state h3 {
    color: var(--text);
    margin-bottom: 10px;
    font-size: 18px;
  }

  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  @media (max-width: 720px) {
    .invoice-row {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .label {
      padding-top: 0;
    }

    .customer-field-wrap {
      flex-direction: column;
    }

    .quick-add-btn,
    .customer-select {
      width: 100%;
    }
  }
</style>

</head>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getCustomerBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Global state
══════════════════════════════════ */
let CUSTOMER_RECORDS = [];
let CREATE_ENDPOINT = null;

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';
  app.innerHTML = '';

  try {

    const items = await getCustomerBatch((loaded, total, page) => {

      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()} records`
        : `Page ${page} · ${loaded.toLocaleString()} records loaded…`;

      if (total) {
        bar.style.width = Math.min(95, Math.round(loaded / total * 100)) + '%';
      }
    });

    CUSTOMER_RECORDS = items;

    CREATE_ENDPOINT =
      items?.[0]?._actions?.create?.href ||
      '/api4/customer-batch';

    bar.style.width = '100%';

    status.textContent =
      `✓ ${items.length.toLocaleString()} customer records loaded`;

    btn.textContent = '↺ Reload';
    btn.disabled = false;

    render(items);

  } catch (err) {

    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry';
    btn.disabled = false;

    app.innerHTML = `
      <div class="err-box">
        <strong>Unable to load customer data</strong><br><br>
        ${escapeHtml(err.message)}<br><br>
        <small>
          Make sure this extension is running inside Manager.io and that API access is enabled.
        </small>
      </div>
    `;
  }
}

/* ══════════════════════════════════
   Render UI
══════════════════════════════════ */
function render(items) {

  const app = document.getElementById('app');

  if (!Array.isArray(items) || items.length === 0) {

    app.innerHTML = `
      <div class="card">
        <div class="empty-state">
          <h3>No customer records found</h3>
          <p>
            Your customer database is currently empty.<br>
            Use the “+ Add New Customer” button below to create your first customer directly from the invoice form.
          </p>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <div class="invoice-preview">

            <div class="invoice-toolbar">
              Sales Invoice Form Preview
            </div>

            <div class="invoice-row">

              <div class="label">Customer</div>

              <div>

                <div class="customer-field-wrap">

                  <select class="customer-select">
                    <option>No customers available</option>
                  </select>

                  <button class="quick-add-btn" onclick="openModal()">
                    + Add New Customer
                  </button>

                </div>

              </div>

            </div>

          </div>
        </div>
      </div>
    `;

    return;
  }

  const total = items.length;

  const customerOptions = items.map((item, index) => {

    const name =
      item?.name ||
      item?.customer ||
      item?.display_name ||
      item?.business_name ||
      item?.full_name ||
      `Customer ${index + 1}`;

    return `
      <option value="${index}">
        ${escapeHtml(name)}
      </option>
    `;

  }).join('');

  const topCustomers = items.slice(0, 12).map((item, index) => {

    const name =
      item?.name ||
      item?.customer ||
      item?.display_name ||
      item?.business_name ||
      item?.full_name ||
      `Customer ${index + 1}`;

    const href =
      item?._links?.self?.href ??
      'N/A';

    return `
      <div class="customer-item">

        <div>
          <div class="customer-name">
            ${escapeHtml(name)}
          </div>

          <div class="customer-meta">
            ${escapeHtml(href)}
          </div>
        </div>

        <div class="badge">
          Customer
        </div>

      </div>
    `;

  }).join('');

  app.innerHTML = `
    <div class="app-shell">

      <div class="card">

        <div class="card-header">
          <div class="card-title">
            Sales Invoice Customer Quick Add
          </div>

          <div class="card-subtitle">
            This extension adds a production-ready “Add New Customer” button beside the customer selection field in the sales invoice form.
            New customers can be created without leaving the invoice screen.
          </div>
        </div>

        <div class="card-body">

          <div class="invoice-preview">

            <div class="invoice-toolbar">
              Simulated Manager.io Sales Invoice Form
            </div>

            <div class="invoice-row">

              <div class="label">
                Customer
              </div>

              <div>

                <div class="customer-field-wrap">

                  <select
                    class="customer-select"
                    id="customer-select"
                    onchange="handleCustomerChange()"
                  >
                    ${customerOptions}
                  </select>

                  <button
                    class="quick-add-btn"
                    onclick="openModal()"
                  >
                    + Add New Customer
                  </button>

                </div>

                <div class="selected-info" id="selected-info">
                  <span class="selected-name">
                    ${escapeHtml(
                      items?.[0]?.name ||
                      items?.[0]?.customer ||
                      items?.[0]?.display_name ||
                      'Customer'
                    )}
                  </span>

                  Selected customer ready for invoice assignment.
                </div>

                <div class="hint">
                  Clicking “Add New Customer” opens an inline creation form and submits directly to the Manager.io customer API using postMessageWithResponse().
                </div>

              </div>

            </div>

          </div>

          <div class="stats-grid">

            <div class="stat-box">
              <div class="stat-label">Loaded Customers</div>
              <div class="stat-value">
                ${total.toLocaleString()}
              </div>
            </div>

            <div class="stat-box">
              <div class="stat-label">API Endpoint</div>
              <div class="stat-value" style="font-size:16px">
                /api4/customer-batch
              </div>
            </div>

            <div class="stat-box">
              <div class="stat-label">Create Action</div>
              <div class="stat-value" style="font-size:15px">
                POST Enabled
              </div>
            </div>

          </div>

          <div class="customer-list">

            <div class="customer-list-header">
              Recently Loaded Customers
            </div>

            <div class="customer-scroll">
              ${topCustomers}
            </div>

          </div>

        </div>

      </div>

    </div>
  `;
}

/* ══════════════════════════════════
   Handle dropdown selection
══════════════════════════════════ */
function handleCustomerChange() {

  const select = document.getElementById('customer-select');
  const info   = document.getElementById('selected-info');

  if (!select || !info) return;

  const idx = Number(select.value);

  const item = CUSTOMER_RECORDS?.[idx];

  if (!item) return;

  const name =
    item?.name ||
    item?.customer ||
    item?.display_name ||
    item?.business_name ||
    item?.full_name ||
    'Customer';

  const href =
    item?._links?.self?.href ||
    'No API link available';

  info.innerHTML = `
    <span class="selected-name">
      ${escapeHtml(name)}
    </span>

    Selected customer loaded from:<br>
    <small>${escapeHtml(href)}</small>
  `;
}

/* ══════════════════════════════════
   Open / close modal
══════════════════════════════════ */
function openModal() {

  clearModal();

  document
    .getElementById('modal-backdrop')
    .classList
    .add('open');

  setTimeout(() => {
    document.getElementById('customer-name')?.focus();
  }, 50);
}

function closeModal() {

  document
    .getElementById('modal-backdrop')
    .classList
    .remove('open');
}

function clearModal() {

  document.getElementById('customer-name').value = '';
  document.getElementById('customer-email').value = '';
  document.getElementById('customer-phone').value = '';
  document.getElementById('customer-address').value = '';
  document.getElementById('modal-message').innerHTML = '';
}

/* ══════════════════════════════════
   Create customer
══════════════════════════════════ */
async function createCustomer() {

  const saveBtn = document.getElementById('save-btn');

  const name    = document.getElementById('customer-name').value.trim();
  const email   = document.getElementById('customer-email').value.trim();
  const phone   = document.getElementById('customer-phone').value.trim();
  const address = document.getElementById('customer-address').value.trim();

  const message = document.getElementById('modal-message');

  if (!name) {

    message.innerHTML = `
      <div class="err-box">
        Customer name is required.
      </div>
    `;

    return;
  }

  saveBtn.disabled = true;
  saveBtn.textContent = 'Creating…';

  try {

    const payload = {
      name,
      email,
      phone,
      billing_address: address
    };

    const path =
      CREATE_ENDPOINT ||
      '/api4/customer-batch';

    const response = await postMessageWithResponse({
      type: 'api-request',
      method: 'POST',
      path,
      body: payload
    });

    const newCustomer = {
      name,
      email,
      phone,
      billing_address: address,
      _links: {
        self: {
          href:
            response?._links?.self?.href ||
            'Newly created customer'
        }
      }
    };

    CUSTOMER_RECORDS.unshift(newCustomer);

    message.innerHTML = `
      <div class="success-box">
        ✓ Customer created successfully and added to the invoice customer list.
      </div>
    `;

    setTimeout(() => {

      closeModal();

      render(CUSTOMER_RECORDS);

      const select = document.getElementById('customer-select');

      if (select) {
        select.value = '0';
        handleCustomerChange();
      }

    }, 1000);

  } catch (err) {

    message.innerHTML = `
      <div class="err-box">
        <strong>Unable to create customer</strong><br><br>
        ${escapeHtml(err.message || 'Unknown API error')}
      </div>
    `;

  } finally {

    saveBtn.disabled = false;
    saveBtn.textContent = 'Create Customer';
  }
}

/* ══════════════════════════════════
   Utility helpers
══════════════════════════════════ */
function escapeHtml(value) {

  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}
