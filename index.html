<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager.io Customer Quick Add</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  body {
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:#ffffff;
    color:#24292f;
    min-height:100vh;
    padding:20px;
  }

  .ctrl-bar {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:12px 16px;
    margin-bottom:18px;
    background:#f6f8fa;
    border:1px solid #d0d7de;
    border-radius:12px;
  }

  .load-btn,
  .primary-btn,
  .secondary-btn {
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    transition:all .15s ease;
  }

  .load-btn {
    background:#0969da;
    color:#fff;
  }

  .primary-btn {
    background:#1a7f37;
    color:#fff;
  }

  .secondary-btn {
    background:#f6f8fa;
    color:#24292f;
    border:1px solid #d0d7de;
  }

  .load-btn:hover,
  .primary-btn:hover,
  .secondary-btn:hover {
    transform:translateY(-1px);
  }

  .load-btn:disabled,
  .primary-btn:disabled,
  .secondary-btn:disabled {
    opacity:.55;
    cursor:not-allowed;
    transform:none;
  }

  .prog-wrap {
    flex:1;
    min-width:120px;
    height:6px;
    background:#d8dee4;
    border-radius:999px;
    overflow:hidden;
  }

  .prog-bar {
    height:100%;
    width:0%;
    background:#0969da;
    transition:width .25s;
  }

  .status-txt {
    font-size:12px;
    color:#57606a;
    white-space:nowrap;
  }

  .err-box {
    color:#cf222e;
    background:#fff8f8;
    border:1px solid #ffcecb;
    border-radius:10px;
    padding:14px 16px;
    font-size:13px;
    margin-bottom:16px;
  }

  .success-box {
    color:#1a7f37;
    background:#f0fff4;
    border:1px solid #8ddb9b;
    border-radius:10px;
    padding:14px 16px;
    font-size:13px;
    margin-bottom:16px;
  }

  .grid {
    display:grid;
    grid-template-columns: 1.2fr .8fr;
    gap:20px;
  }

  @media (max-width: 1000px) {
    .grid {
      grid-template-columns:1fr;
    }
  }

  .card {
    background:#ffffff;
    border:1px solid #d0d7de;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 1px 2px rgba(27,31,36,.04);
  }

  .card-header {
    padding:16px 18px;
    border-bottom:1px solid #d8dee4;
    background:#f6f8fa;
  }

  .card-title {
    font-size:16px;
    font-weight:700;
    margin-bottom:4px;
  }

  .card-sub {
    font-size:12px;
    color:#57606a;
  }

  .card-body {
    padding:18px;
  }

  .stats {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
    gap:12px;
    margin-bottom:20px;
  }

  .stat {
    border:1px solid #d0d7de;
    border-radius:12px;
    padding:14px;
    background:#fff;
  }

  .stat-label {
    font-size:12px;
    color:#57606a;
    margin-bottom:6px;
  }

  .stat-value {
    font-size:24px;
    font-weight:800;
  }

  .search-wrap {
    margin-bottom:16px;
  }

  .search-input {
    width:100%;
    padding:12px 14px;
    border:1px solid #d0d7de;
    border-radius:10px;
    font-size:14px;
    background:#fff;
  }

  .search-input:focus,
  .field input:focus,
  .field textarea:focus {
    outline:none;
    border-color:#0969da;
    box-shadow:0 0 0 3px rgba(9,105,218,.12);
  }

  .invoice-list {
    max-height:600px;
    overflow:auto;
    border:1px solid #d8dee4;
    border-radius:12px;
  }

  .invoice-item {
    padding:14px 16px;
    border-bottom:1px solid #eef1f4;
    cursor:pointer;
    transition:background .15s;
  }

  .invoice-item:hover {
    background:#f6f8fa;
  }

  .invoice-item:last-child {
    border-bottom:none;
  }

  .invoice-top {
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-bottom:8px;
  }

  .invoice-number {
    font-weight:700;
    font-size:14px;
  }

  .invoice-date {
    color:#57606a;
    font-size:12px;
  }

  .invoice-customer {
    font-size:13px;
    margin-bottom:4px;
  }

  .invoice-amount {
    font-weight:700;
    color:#0969da;
    font-size:13px;
  }

  .empty-state {
    text-align:center;
    padding:50px 20px;
    color:#57606a;
  }

  .form-grid {
    display:grid;
    gap:14px;
  }

  .field {
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .field label {
    font-size:12px;
    font-weight:700;
    color:#57606a;
  }

  .field input,
  .field textarea,
  .field select {
    width:100%;
    padding:11px 12px;
    border:1px solid #d0d7de;
    border-radius:10px;
    font-size:14px;
    background:#fff;
  }

  .field textarea {
    min-height:80px;
    resize:vertical;
  }

  .two-col {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }

  @media (max-width:700px) {
    .two-col {
      grid-template-columns:1fr;
    }
  }

  .pill {
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#ddf4ff;
    color:#0969da;
    border-radius:999px;
    padding:5px 10px;
    font-size:11px;
    font-weight:700;
  }

  .customer-preview {
    border:1px solid #d0d7de;
    border-radius:12px;
    padding:14px;
    background:#f9fbfc;
  }

  .customer-preview h4 {
    margin-bottom:6px;
  }

  .toolbar {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:18px;
  }

  .muted {
    color:#57606a;
    font-size:12px;
  }

  .divider {
    height:1px;
    background:#d8dee4;
    margin:18px 0;
  }

</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <div class="prog-wrap">
    <div class="prog-bar" id="prog-bar"></div>
  </div>
  <span class="status-txt" id="status-txt">Press Load to fetch data from Manager</span>
</div>

<div id="app"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getSalesInvoiceBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
══════════════════════════════════ */
async function getSalesInvoiceBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/sales-invoice-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/sales-invoice-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;

    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);

    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Fetch all customers with pagination
══════════════════════════════════ */
async function getCustomerBatch() {
  const allItems = [];
  let nextToken = null;
  let pageNum = 0;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({
      type: 'api-request',
      method: 'GET',
      path
    });

    const page = Array.isArray(data)
      ? data
      : (data.items || data.data || []);

    allItems.push(...page);

    nextToken =
      data.next_page_token ||
      data.nextPageToken ||
      data._links?.next?.href ||
      null;

    pageNum++;

    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* ══════════════════════════════════
   Save customer
══════════════════════════════════ */
async function saveCustomer(payload) {
  return await postMessageWithResponse({
    type: 'api-request',
    method: 'POST',
    path: '/api4/customer-batch',
    body: payload
  });
}

/* ══════════════════════════════════
   Utility formatters
══════════════════════════════════ */
function fmtCurrency(v) {
  const n = Number(v || 0);
  return '$' + n.toLocaleString(undefined, {
    minimumFractionDigits:2,
    maximumFractionDigits:2
  });
}

function fmtDate(v) {
  if (!v) return '—';

  try {
    return new Date(v).toLocaleDateString(undefined, {
      year:'numeric',
      month:'short',
      day:'numeric'
    });
  } catch {
    return v;
  }
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';
  app.innerHTML = '';

  try {

    const items = await getSalesInvoiceBatch((loaded, total, page) => {
      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()} invoices`
        : `Page ${page} · ${loaded.toLocaleString()} invoices loaded`;

      if (total) {
        bar.style.width = Math.min(95, Math.round(loaded / total * 100)) + '%';
      }
    });

    const customers = await getCustomerBatch();

    bar.style.width = '100%';

    status.textContent =
      `✓ ${items.length.toLocaleString()} invoices · ${customers.length.toLocaleString()} customers loaded`;

    btn.textContent = '↺ Reload';
    btn.disabled = false;

    render(items, customers);

  } catch (err) {

    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry';
    btn.disabled = false;

    app.innerHTML = `
      <div class="err-box">
        <strong>Unable to load Manager.io data</strong><br><br>
        ${err.message}<br><br>
        <small>Make sure this extension is running inside Manager.io and the API endpoints are enabled.</small>
      </div>
    `;
  }
}

/* ══════════════════════════════════
   Main render
══════════════════════════════════ */
function render(items, customers) {

  const app = document.getElementById('app');

  if (!Array.isArray(items) || items.length === 0) {
    app.innerHTML = `
      <div class="card">
        <div class="empty-state">
          <h2 style="margin-bottom:10px;">No Sales Invoices Found</h2>
          <p>No invoice records were returned from <strong>/api4/sales-invoice-batch</strong>.</p>
        </div>
      </div>
    `;
    return;
  }

  const totalInvoices = items.length;
  const totalCustomers = customers?.length || 0;

  const searchData = [...items];

  app.innerHTML = `
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Sales Invoices</div>
        <div class="stat-value">${totalInvoices.toLocaleString()}</div>
      </div>

      <div class="stat">
        <div class="stat-label">Customers</div>
        <div class="stat-value">${totalCustomers.toLocaleString()}</div>
      </div>

      <div class="stat">
        <div class="stat-label">Extension Mode</div>
        <div class="pill">WRITE ENABLED</div>
      </div>
    </div>

    <div id="message-area"></div>

    <div class="grid">

      <div class="card">
        <div class="card-header">
          <div class="card-title">Sales Invoice Records</div>
          <div class="card-sub">Browse invoices and quickly add new customers directly from the invoice workflow.</div>
        </div>

        <div class="card-body">

          <div class="search-wrap">
            <input
              id="invoice-search"
              class="search-input"
              type="text"
              placeholder="Search invoice number, customer, amount, or reference..."
            />
          </div>

          <div class="invoice-list" id="invoice-list"></div>

        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Quick Add Customer</div>
          <div class="card-sub">Create a new customer directly from the sales invoice process.</div>
        </div>

        <div class="card-body">

          <div class="form-grid">

            <div class="field">
              <label>Customer Name *</label>
              <input type="text" id="customer-name" placeholder="Customer name">
            </div>

            <div class="two-col">

              <div class="field">
                <label>Customer Code</label>
                <input type="text" id="customer-code" placeholder="Optional code">
              </div>

              <div class="field">
                <label>Email</label>
                <input type="email" id="customer-email" placeholder="name@example.com">
              </div>

            </div>

            <div class="field">
              <label>Billing Address</label>
              <textarea id="billing-address" placeholder="Billing address"></textarea>

```
        </div>

        <div class="field">
          <label>Delivery Address</label>
          <textarea id="delivery-address" placeholder="Delivery address"></textarea>
        </div>

        <div class="two-col">

          <div class="field">
            <label>Credit Limit</label>
            <input type="number" id="credit-limit" value="0" min="0" step="0.01">
          </div>

          <div class="field">
            <label>Default Hourly Rate</label>
            <input type="number" id="hourly-rate" value="0" min="0" step="0.01">
          </div>

        </div>

        <div class="customer-preview">
          <h4>Preview</h4>
          <div class="muted" id="preview-text">
            Enter customer details to preview the payload before saving.
          </div>
        </div>

        <div class="divider"></div>

        <div class="toolbar">
          <button class="primary-btn" id="save-btn">
            💾 Save Customer
          </button>

          <button class="secondary-btn" id="reset-btn">
            Reset Form
          </button>
        </div>

      </div>

    </div>
  </div>

</div>
```

`;

/* ══════════════════════════════════
Invoice list rendering
══════════════════════════════════ */

const invoiceList = document.getElementById('invoice-list');

function drawInvoices(list) {

```
if (!list.length) {
  invoiceList.innerHTML = `
    <div class="empty-state">
      <h3 style="margin-bottom:8px;">No matching invoices</h3>
      <p>Try a different search term.</p>
    </div>
  `;
  return;
}

invoiceList.innerHTML = list.map(item => {

  const number =
    item?.reference ||
    item?.invoiceNumber ||
    item?.number ||
    'Invoice';

  const customer =
    item?.customer?.name ||
    item?.customerName ||
    item?.name ||
    'Unknown Customer';

  const total =
    item?.total ||
    item?.amount ||
    item?.balance ||
    0;

  const date =
    item?.date ||
    item?.issueDate ||
    item?.createdDate ||
    null;

  return `
    <div class="invoice-item">

      <div class="invoice-top">
        <div class="invoice-number">${number}</div>
        <div class="invoice-date">${fmtDate(date)}</div>
      </div>

      <div class="invoice-customer">${customer}</div>

      <div class="invoice-amount">${fmtCurrency(total)}</div>

    </div>
  `;
}).join('');
```

}

drawInvoices(searchData);

/* ══════════════════════════════════
Search functionality
══════════════════════════════════ */

document.getElementById('invoice-search').addEventListener('input', e => {

```
const q = e.target.value.trim().toLowerCase();

if (!q) {
  drawInvoices(searchData);
  return;
}

const filtered = searchData.filter(item => {

  const haystack = JSON.stringify(item || {})
    .toLowerCase();

  return haystack.includes(q);
});

drawInvoices(filtered);
```

});

/* ══════════════════════════════════
Preview updater
══════════════════════════════════ */

const previewFields = [
'customer-name',
'customer-code',
'customer-email',
'billing-address',
'delivery-address',
'credit-limit',
'hourly-rate'
];

previewFields.forEach(id => {
document.getElementById(id).addEventListener('input', updatePreview);
});

function updatePreview() {

```
const payload = buildPayload();

document.getElementById('preview-text').innerHTML = `
  <strong>${payload.item.name || 'Unnamed Customer'}</strong><br>
  Code: ${payload.item.code || '—'}<br>
  Email: ${payload.item.email || '—'}<br>
  Credit Limit: ${fmtCurrency(payload.item.creditLimit)}<br>
  Billing Address: ${payload.item.billingAddress || '—'}
`;
```

}

updatePreview();

/* ══════════════════════════════════
Reset form
══════════════════════════════════ */

document.getElementById('reset-btn').addEventListener('click', () => {

```
[
  'customer-name',
  'customer-code',
  'customer-email',
  'billing-address',
  'delivery-address'
].forEach(id => {
  document.getElementById(id).value = '';
});

document.getElementById('credit-limit').value = 0;
document.getElementById('hourly-rate').value = 0;

updatePreview();
```

});

/* ══════════════════════════════════
Save customer
══════════════════════════════════ */

document.getElementById('save-btn').addEventListener('click', async () => {

```
const msg = document.getElementById('message-area');
const btn = document.getElementById('save-btn');

msg.innerHTML = '';

const payload = buildPayload();

if (!payload.item.name?.trim()) {

  msg.innerHTML = `
    <div class="err-box">
      Customer name is required before saving.
    </div>
  `;

  return;
}

try {

  btn.disabled = true;
  btn.textContent = 'Saving…';

  await saveCustomer(payload);

  msg.innerHTML = `
    <div class="success-box">
      <strong>Customer saved successfully.</strong><br><br>
      ${payload.item.name} was added to Manager.io.
    </div>
  `;

  customers.push(payload);

  btn.disabled = false;
  btn.textContent = '💾 Save Customer';

} catch (err) {

  btn.disabled = false;
  btn.textContent = '💾 Save Customer';

  msg.innerHTML = `
    <div class="err-box">
      <strong>Failed to save customer</strong><br><br>
      ${err.message || 'Unknown API error'}
    </div>
  `;
}
```

});

/* ══════════════════════════════════
Payload builder
══════════════════════════════════ */

function buildPayload() {

```
const billing = document.getElementById('billing-address').value || '';

const delivery =
  document.getElementById('delivery-address').value || billing;

return {
  item: {
    name: document.getElementById('customer-name').value?.trim() || '',
    code: document.getElementById('customer-code').value?.trim() || null,
    creditLimit: Number(document.getElementById('credit-limit').value || 0),
    currency: null,
    billingAddress: billing,
    deliveryAddress: delivery,
    email: document.getElementById('customer-email').value?.trim() || null,
    division: null,
    controlAccount: null,
    hasDefaultDueDateDays: false,
    defaultDueDateDays: null,
    hasDefaultHourlyRate: Number(document.getElementById('hourly-rate').value || 0) > 0,
    defaultHourlyRate: Number(document.getElementById('hourly-rate').value || 0),
    inactive: false,
    customFields: null,
    customFields2: {
      strings: null,
      decimals: null,
      dates: null,
      booleans: null,
      stringArrays: null,
      images: null
    },
    obsolete_StartingBalance2: 0,
    obsolete_ExchangeRate2: 0,
    obsolete_ExchangeRateIsInverse2: false,
    obsolete_BusinessIdentifier: null,
    obsolete_SouthAfrica_VAT_Number: null,
    obsolete_Philippines_TIN_Number: null,
    obsolete_Telephone: null,
    obsolete_Fax: null,
    obsolete_Mobile: null,
    obsolete_Notes: null,
    obsolete_HasStartingBalance: false,
    obsolete_StartingBalanceType: 0,
    obsolete_StartingBalance: 0,
    obsolete_CustomerPortal: false,
    hasDefaultBillingAddress: !!billing,
    defaultBillingAddress: billing || null,
    hasDefaultDeliveryAddress: !!delivery,
    defaultDeliveryAddress: delivery || null
  }
};
```

}
} </script>

</body>
</html>
