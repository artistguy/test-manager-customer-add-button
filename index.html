<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Add a button to add a new customer from the sales invoice form.</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,sans-serif; background:#ffffff; color:#24292f; min-height:100vh; padding:20px; }

.ctrl-bar {
display:flex; align-items:center; gap:10px; flex-wrap:wrap;
padding:12px 16px; margin-bottom:18px;
background:#f6f8fa; border:1px solid #d0d7de; border-radius:10px;
}

.load-btn, .add-btn {
padding:8px 14px; border:none; border-radius:7px; cursor:pointer;
font-size:13px; font-weight:700; transition:opacity .15s;
}
.load-btn { background:#0969da; color:#fff; }
.add-btn { background:#1a7f37; color:#fff; }

.load-btn:disabled, .add-btn:disabled { opacity:.45; cursor:not-allowed; }

.prog-wrap { flex:1; min-width:100px; height:5px; background:#d0d7de; border-radius:3px; overflow:hidden; }
.prog-bar  { height:100%; width:0%; background:#0969da; border-radius:3px; transition:width .25s; }
.status-txt { font-size:12px; color:#57606a; white-space:nowrap; }

.err-box {
color:#cf222e; background:#f6f8fa; border:1px solid #d0d7de;
border-radius:8px; padding:12px 16px; font-size:13px; margin-bottom:16px;
}

/* Table UI */
.table-wrap {
border:1px solid #d0d7de;
border-radius:10px;
overflow:hidden;
}

table { width:100%; border-collapse:collapse; }
th, td {
text-align:left;
padding:10px 12px;
border-bottom:1px solid #eaeef2;
font-size:13px;
}
th {
background:#f6f8fa;
font-size:12px;
text-transform:uppercase;
letter-spacing:.04em;
color:#57606a;
}

.tag {
display:inline-block;
padding:2px 8px;
border-radius:999px;
font-size:11px;
background:#eef2ff;
color:#3730a3;
}

.muted { color:#57606a; }

/* Modal */
.modal-backdrop {
position:fixed; inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:center;
justify-content:center;
padding:20px;
}

.modal {
width:100%;
max-width:520px;
background:#fff;
border-radius:12px;
border:1px solid #d0d7de;
padding:16px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.modal h3 {
font-size:16px;
margin-bottom:12px;
}

.form-grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.form-grid .full { grid-column:1 / -1; }

input {
width:100%;
padding:8px 10px;
border:1px solid #d0d7de;
border-radius:8px;
font-size:13px;
}

.modal-actions {
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:12px;
}

.btn {
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
font-size:13px;
}

.btn-primary { background:#0969da; color:#fff; }
.btn-secondary { background:#f6f8fa; border:1px solid #d0d7de; }

</style>
</head>
<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <button class="add-btn" onclick="openModal()">＋ Add Customer</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch data from Manager</span>
</div>

<div id="app"></div>

<!-- Modal -->

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h3>Create New Customer</h3>

<div class="form-grid">

</div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   pagination loader (DO NOT MODIFY)
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

/* UI state */
let customers = [];

/* Load data */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';
  document.getElementById('app').innerHTML = '';

  try {
    const items = await getCustomerBatch((loaded, total, page) => {
      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()}`
        : `Page ${page} · ${loaded.toLocaleString()} loaded…`;

      if (total) bar.style.width = Math.min(95, Math.round(loaded / total * 100)) + '%';
    });

    customers = items;

    bar.style.width = '100%';
    status.textContent = `✓ ${items.length.toLocaleString()} customers loaded`;

    btn.textContent = '↺ Reload';
    btn.disabled = false;

    render(items);

  } catch (err) {
    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry';
    btn.disabled = false;

    document.getElementById('app').innerHTML =
      `<div class="err-box">⚠ ${err.message}<br><small>Must run inside Manager.io</small></div>`;
  }
}

/* Modal controls */
function openModal() {
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

/* Create customer via API */
async function createCustomer() {
  const payload = {
    item: {
      name: document.getElementById('name').value || '',
      email: document.getElementById('email').value || null,
      creditLimit: Number(document.getElementById('credit').value || 0),
      currency: document.getElementById('currency').value || null,
      billingAddress: document.getElementById('billing').value || '',
      deliveryAddress: document.getElementById('delivery').value || ''
    }
  };

  try {
    await postMessageWithResponse({
      type: 'api-request',
      method: 'POST',
      path: '/api4/customer',
      body: payload
    });

    closeModal();
    await loadAllRecords(); // refresh list
  } catch (e) {
    alert('Failed to create customer: ' + e.message);
  }
}

/* ══════════════════════════════════
   render(items)
══════════════════════════════════ */
function render(items) {
  const app = document.getElementById('app');

  if (!items || items.length === 0) {
    app.innerHTML = `<div class="err-box">No customers found.</div>`;
    return;
  }

  const rows = items.map((r, i) => {
    const c = r?.item || {};

    return `
      <tr>
        <td>${c.name || '—'}</td>
        <td class="muted">${c.email || '—'}</td>
        <td>${(c.creditLimit ?? 0).toLocaleString()}</td>
        <td><span class="tag">${c.inactive ? 'Inactive' : 'Active'}</span></td>
        <td class="muted">${c.billingAddress || ''}</td>
      </tr>
    `;
  }).join('');

  app.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Credit</th>
            <th>Status</th>
            <th>Billing Address</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}
</script>

</body>
</html>
