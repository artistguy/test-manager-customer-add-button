<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager.io Customer Creator</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  :root{
    --bg:#ffffff;
    --card:#ffffff;
    --muted:#f6f8fa;
    --border:#d0d7de;
    --text:#24292f;
    --sub:#57606a;
    --blue:#0969da;
    --blue2:#1f6feb;
    --green:#1a7f37;
    --red:#cf222e;
    --shadow:0 1px 3px rgba(0,0,0,.06);
    --radius:12px;
  }

  body {
    font-family:system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:20px;
  }

  .ctrl-bar {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:12px 16px;
    margin-bottom:18px;
    background:var(--muted);
    border:1px solid var(--border);
    border-radius:10px;
  }

  .load-btn {
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    background:var(--blue);
    color:#fff;
    transition:.15s;
  }

  .load-btn:hover { opacity:.92; }
  .load-btn:disabled { opacity:.45; cursor:not-allowed; }

  .prog-wrap {
    flex:1;
    min-width:100px;
    height:6px;
    background:#d8dee4;
    border-radius:999px;
    overflow:hidden;
  }

  .prog-bar {
    height:100%;
    width:0%;
    background:var(--blue);
    border-radius:999px;
    transition:width .25s;
  }

  .status-txt {
    font-size:12px;
    color:var(--sub);
    white-space:nowrap;
  }

  .err-box {
    color:var(--red);
    background:#fff8f8;
    border:1px solid #ffd8d3;
    border-radius:10px;
    padding:14px 16px;
    font-size:13px;
    margin-bottom:16px;
  }

  .grid {
    display:grid;
    grid-template-columns:420px 1fr;
    gap:20px;
    align-items:start;
  }

  @media (max-width: 1100px){
    .grid{
      grid-template-columns:1fr;
    }
  }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }

  .card-header{
    padding:18px 20px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }

  .card-title{
    font-size:18px;
    font-weight:700;
  }

  .card-sub{
    margin-top:4px;
    font-size:12px;
    color:var(--sub);
  }

  .card-body{
    padding:20px;
  }

  .stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    margin-bottom:20px;
  }

  .stat{
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px;
    background:#fbfcfd;
  }

  .stat-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.5px;
    color:var(--sub);
    margin-bottom:8px;
  }

  .stat-value{
    font-size:24px;
    font-weight:700;
  }

  form{
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  .field-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  @media (max-width:700px){
    .field-grid{
      grid-template-columns:1fr;
    }
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  label{
    font-size:13px;
    font-weight:600;
    color:var(--text);
  }

  input,
  textarea,
  select{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--border);
    border-radius:9px;
    background:#fff;
    color:var(--text);
    font-size:14px;
    outline:none;
    transition:border-color .15s, box-shadow .15s;
  }

  textarea{
    resize:vertical;
    min-height:90px;
  }

  input:focus,
  textarea:focus,
  select:focus{
    border-color:var(--blue2);
    box-shadow:0 0 0 3px rgba(9,105,218,.12);
  }

  .checkbox-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 0;
  }

  .checkbox-row input{
    width:auto;
  }

  .btn-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:4px;
  }

  .btn{
    border:none;
    border-radius:9px;
    cursor:pointer;
    padding:11px 16px;
    font-size:14px;
    font-weight:700;
    transition:.15s;
  }

  .btn-primary{
    background:var(--blue);
    color:#fff;
  }

  .btn-primary:hover{
    opacity:.92;
  }

  .btn-secondary{
    background:#f3f4f6;
    color:var(--text);
    border:1px solid var(--border);
  }

  .btn-secondary:hover{
    background:#eceff3;
  }

  .msg{
    margin-top:16px;
    border-radius:10px;
    padding:12px 14px;
    font-size:13px;
    display:none;
  }

  .msg.success{
    display:block;
    background:#f0fff4;
    color:var(--green);
    border:1px solid #b7ebc6;
  }

  .msg.error{
    display:block;
    background:#fff5f5;
    color:var(--red);
    border:1px solid #ffd8d3;
  }

  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }

  .search{
    flex:1;
    min-width:240px;
  }

  .customer-table-wrap{
    overflow:auto;
    border:1px solid var(--border);
    border-radius:12px;
  }

  table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
  }

  thead{
    background:#f6f8fa;
    position:sticky;
    top:0;
    z-index:1;
  }

  th, td{
    padding:12px 14px;
    border-bottom:1px solid #edf0f2;
    text-align:left;
    vertical-align:top;
    font-size:13px;
  }

  th{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.4px;
    color:var(--sub);
  }

  tbody tr:hover{
    background:#fafcff;
  }

  .pill{
    display:inline-flex;
    align-items:center;
    padding:4px 8px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
  }

  .pill.active{
    background:#dcfce7;
    color:#166534;
  }

  .pill.inactive{
    background:#fee2e2;
    color:#991b1b;
  }

  .small{
    font-size:12px;
    color:var(--sub);
  }

  .empty{
    padding:40px 20px;
    text-align:center;
    color:var(--sub);
  }

  .loading-overlay{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,.7);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
    backdrop-filter:blur(2px);
  }

  .loading-overlay.show{
    display:flex;
  }

  .spinner{
    width:42px;
    height:42px;
    border:4px solid #d0d7de;
    border-top-color:var(--blue);
    border-radius:50%;
    animation:spin .7s linear infinite;
  }

  @keyframes spin{
    to{ transform:rotate(360deg); }
  }
</style>

</head>

<body>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch customers from Manager.io</span>
</div>

<div id="app"></div>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
</div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   getCustomerBatch
   Fetches ALL pages — DO NOT SIMPLIFY.
══════════════════════════════════ */
async function getCustomerBatch(onProgress) {
  const allItems = [];
  let nextToken  = null;
  let pageNum    = 0;
  let apiTotal   = null;

  do {
    const path = nextToken
      ? '/api4/customer-batch?PageSize=99999&next_page_token=' + encodeURIComponent(nextToken)
      : '/api4/customer-batch?PageSize=99999';

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    allItems.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(allItems.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return allItems;
}

let CUSTOMER_CACHE = [];

/* ══════════════════════════════════
   Utility Helpers
══════════════════════════════════ */
function escapeHtml(value){
  return String(value ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}

function fmtCurrency(value){
  const num = Number(value ?? 0);
  return '$' + num.toLocaleString(undefined,{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  });
}

function setMessage(type, text){
  const box = document.getElementById('form-message');
  if(!box) return;

  box.className = 'msg ' + type;
  box.innerHTML = text;
}

function clearMessage(){
  const box = document.getElementById('form-message');
  if(!box) return;

  box.className = 'msg';
  box.innerHTML = '';
}

function toggleLoading(show){
  document.getElementById('loading-overlay').classList.toggle('show', show);
}

/* ══════════════════════════════════
   Create Customer (WRITE API)
══════════════════════════════════ */
async function createCustomer(event){
  event.preventDefault();

  clearMessage();

  const submitBtn = document.getElementById('submit-btn');

  try{
    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving...';

    toggleLoading(true);

    const payload = {
      item: {
        name: document.getElementById('name').value.trim(),
        code: document.getElementById('code').value.trim() || null,
        email: document.getElementById('email').value.trim() || null,
        billingAddress: document.getElementById('billingAddress').value.trim() || '',
        deliveryAddress: document.getElementById('deliveryAddress').value.trim() || '',
        creditLimit: Number(document.getElementById('creditLimit').value || 0),
        inactive: document.getElementById('inactive').checked,
        hasDefaultBillingAddress: !!document.getElementById('billingAddress').value.trim(),
        hasDefaultDeliveryAddress: !!document.getElementById('deliveryAddress').value.trim(),
        defaultBillingAddress: document.getElementById('billingAddress').value.trim() || '',
        defaultDeliveryAddress: document.getElementById('deliveryAddress').value.trim() || '',
        hasDefaultDueDateDays: false,
        defaultDueDateDays: null,
        hasDefaultHourlyRate: false,
        defaultHourlyRate: 0
      }
    };

    if(!payload.item.name){
      throw new Error('Customer name is required.');
    }

    const response = await postMessageWithResponse({
      type: 'api-request',
      method: 'POST',
      path: '/api4/customer-batch',
      body: payload
    });

    setMessage(
      'success',
      '✓ Customer created successfully. Reloading customer list...'
    );

    document.getElementById('customer-form').reset();

    setTimeout(() => {
      loadAllRecords();
    }, 700);

    console.log('Create response:', response);

  }catch(err){
    console.error(err);

    setMessage(
      'error',
      '⚠ Unable to create customer.<br><small>' + escapeHtml(err.message || 'Unknown error') + '</small>'
    );
  }finally{
    submitBtn.disabled = false;
    submitBtn.textContent = '➕ Create Customer';
    toggleLoading(false);
  }
}

/* ══════════════════════════════════
   Search/filter table
══════════════════════════════════ */
function filterCustomers(){
  const q = document.getElementById('search-box')?.value?.toLowerCase() ?? '';
  const rows = document.querySelectorAll('.customer-row');

  rows.forEach(row => {
    const txt = row.textContent.toLowerCase();
    row.style.display = txt.includes(q) ? '' : 'none';
  });
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';
  app.innerHTML = '';

  try {
    const items = await getCustomerBatch((loaded, total, page) => {
      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()} records`
        : `Page ${page} · ${loaded.toLocaleString()} records loaded…`;

      if (total) {
        bar.style.width = Math.min(95, Math.round(loaded / total * 100)) + '%';
      }
    });

    CUSTOMER_CACHE = items;

    bar.style.width = '100%';
    status.textContent = `✓ ${items.length.toLocaleString()} records loaded`;

    btn.textContent = '↺ Reload';
    btn.disabled = false;

    render(items);

  } catch (err) {
    status.textContent = '⚠ ' + err.message;

    btn.textContent = '↺ Retry';
    btn.disabled = false;

    app.innerHTML = `
      <div class="err-box">
        ⚠ ${escapeHtml(err.message)}
        <br><br>
        <small>Make sure this extension is running inside Manager.io.</small>
      </div>
    `;
  }
}

/* ══════════════════════════════════
   Render UI
══════════════════════════════════ */
function render(items) {

  const app = document.getElementById('app');

  const totalCustomers = items.length;

  const activeCustomers = items.filter(i => !i?.item?.inactive).length;

  const totalCredit = items.reduce((sum, i) => {
    return sum + Number(i?.item?.creditLimit ?? 0);
  }, 0);

  const rows = items.map((entry, index) => {

    const item = entry?.item ?? {};

    const name = item?.name ?? 'Unnamed';
    const email = item?.email ?? '—';
    const code = item?.code ?? '—';
    const billing = item?.billingAddress ?? '—';
    const creditLimit = item?.creditLimit ?? 0;
    const inactive = item?.inactive ?? false;

    return `
      <tr class="customer-row">
        <td>${index + 1}</td>
        <td>
          <strong>${escapeHtml(name)}</strong>
          <div class="small">${escapeHtml(item?.uniqueName ?? '')}</div>
        </td>
        <td>${escapeHtml(code)}</td>
        <td>${escapeHtml(email)}</td>
        <td>${escapeHtml(billing)}</td>
        <td>${fmtCurrency(creditLimit)}</td>
        <td>
          ${
            inactive
              ? '<span class="pill inactive">Inactive</span>'
              : '<span class="pill active">Active</span>'
          }
        </td>
      </tr>
    `;
  }).join('');

  app.innerHTML = `
    <div class="grid">

      <!-- Left Panel -->
      <div class="card">

        <div class="card-header">
          <div>
            <div class="card-title">New Customer</div>
            <div class="card-sub">
              Create customers directly from the sales invoice workflow
            </div>
          </div>
        </div>

        <div class="card-body">

          <form id="customer-form">

            <div class="field">
              <label for="name">Customer Name *</label>
              <input
                id="name"
                type="text"
                placeholder="Enter customer name"
                required
              >
            </div>

            <div class="field-grid">

              <div class="field">
                <label for="code">Customer Code</label>
                <input
                  id="code"
                  type="text"
                  placeholder="Optional code"
                >
              </div>

              <div class="field">
                <label for="email">Email</label>
                <input
                  id="email"
                  type="email"
                  placeholder="customer@email.com"
                >
              </div>

            </div>

            <div class="field">
              <label for="billingAddress">Billing Address</label>
              <textarea
                id="billingAddress"
                placeholder="Billing address"
              ></textarea>

```
        </div>

        <div class="field">
          <label for="deliveryAddress">Delivery Address</label>
          <textarea
            id="deliveryAddress"
            placeholder="Delivery address"
          ></textarea>
        </div>

        <div class="field">
          <label for="creditLimit">Credit Limit</label>
          <input
            id="creditLimit"
            type="number"
            step="0.01"
            min="0"
            value="0"
          >
        </div>

        <div class="checkbox-row">
          <input id="inactive" type="checkbox">
          <label for="inactive">Mark customer as inactive</label>
        </div>

        <div class="btn-row">
          <button
            id="submit-btn"
            type="submit"
            class="btn btn-primary"
          >
            ➕ Create Customer
          </button>

          <button
            type="reset"
            class="btn btn-secondary"
            onclick="clearMessage()"
          >
            Reset
          </button>
        </div>

        <div id="form-message" class="msg"></div>

      </form>

    </div>

  </div>

  <!-- Right Panel -->
  <div>

    <div class="stats">

      <div class="stat">
        <div class="stat-label">Total Customers</div>
        <div class="stat-value">
          ${totalCustomers.toLocaleString()}
        </div>
      </div>

      <div class="stat">
        <div class="stat-label">Active Customers</div>
        <div class="stat-value">
          ${activeCustomers.toLocaleString()}
        </div>
      </div>

      <div class="stat">
        <div class="stat-label">Combined Credit Limit</div>
        <div class="stat-value" style="font-size:18px">
          ${fmtCurrency(totalCredit)}
        </div>
      </div>

    </div>

    <div class="card">

      <div class="card-header">
        <div>
          <div class="card-title">Customer Directory</div>
          <div class="card-sub">
            Live customer records loaded from /api4/customer-batch
          </div>
        </div>
      </div>

      <div class="card-body">

        <div class="toolbar">

          <input
            id="search-box"
            class="search"
            type="text"
            placeholder="Search customers..."
            oninput="filterCustomers()"
          >

        </div>

        ${
          items.length === 0
            ? `
              <div class="empty">
                No customer records found.
              </div>
            `
            : `
              <div class="customer-table-wrap">

                <table>

                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Name</th>
                      <th>Code</th>
                      <th>Email</th>
                      <th>Billing Address</th>
                      <th>Credit Limit</th>
                      <th>Status</th>
                    </tr>
                  </thead>

                  <tbody>
                    ${rows}
                  </tbody>

                </table>

              </div>
            `
        }

      </div>

    </div>

  </div>

</div>
```

`;

document
.getElementById('customer-form')
.addEventListener('submit', createCustomer);
} </script>

</body>
</html>
